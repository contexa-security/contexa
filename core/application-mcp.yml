# MCP (Model Context Protocol) Configuration
# Spring AI MCP Server 설정

spring:
  # Web Application 비활성화 (STDIO 모드에서는 필요 없음)
  main:
    web-application-type: none  # STDIO 모드
    # web-application-type: servlet  # SSE/WebMVC 모드일 때
    # web-application-type: reactive  # WebFlux 모드일 때
    
  ai:
    mcp:
      # MCP Server 설정 - Tool을 외부에 노출
      server:
        enabled: true
        name: "SOAR Security Tools Server"
        version: "1.0.0"
        type: SYNC  # SYNC (동기) or ASYNC (비동기)
        
        # Server capabilities
        capabilities:
          tools: true       # Tool 노출 (구현됨)
          resources: true   # Resource 노출 (구현됨)
          prompts: true     # Prompt 템플릿 노출 (구현됨)
          completion: true  # Completion 제공 (구현됨)
          
      # MCP Client 설정 (다른 MCP 서버 연결시 사용)
      client:
        enabled: false
        type: SYNC
        
        # STDIO 연결
        stdio:
          connections:
            example-server:
              command: "python"
              args: ["-m", "example_mcp_server"]
              enabled: false
              
        # SSE 연결  
        sse:
          connections:
            remote-server:
              url: "http://remote-mcp-server:8080/mcp"
              enabled: false

# Tool 자동 검색 설정
tool:
  discovery:
    enabled: true
    packages:
      - io.contexa.contexacore.soar.tools
      - io.contexa.contexacore.tools
    
  # Tool 필터링
  filter:
    enabled: false
    included:
      - network_scan
      - log_analysis
      - threat_intelligence
    excluded: []
    
  # Tool 승인 설정
  approval:
    mode: RISK_BASED  # NONE, ALL, RISK_BASED
    auto-approved:
      - network_scan
      - log_analysis
    blocked: []
    
# 로깅 설정
logging:
  level:
    org.springframework.ai.mcp: DEBUG
    io.contexa.contexacore.config: INFO
    io.contexa.contexacore.soar.tools: INFO