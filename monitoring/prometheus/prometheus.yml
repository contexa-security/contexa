# Prometheus 설정 파일
# contexa VectorStore 메트릭 수집

global:
  scrape_interval: 15s # 기본 스크랩 간격 (15초마다 메트릭 수집)
  evaluation_interval: 15s # 규칙 평가 간격
  scrape_timeout: 10s # 스크랩 타임아웃

  external_labels:
    monitor: 'contexa-monitor'
    environment: 'development'

# 스크랩 대상 설정
scrape_configs:
  # contexa aicore 모듈 (VectorStore 메트릭 포함)
  - job_name: 'contexa-core'
    metrics_path: '/actuator/prometheus'
    scrape_interval: 5s # VectorStore는 5초마다 수집 (더 정밀한 모니터링)
    static_configs:
      - targets: ['host.docker.internal:8080'] # Spring Boot 애플리케이션
        labels:
          application: 'contexa'
          module: 'aicore'
          tier: 'backend'

  # Prometheus 자체 메트릭
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          application: 'prometheus'

