# Grafana 설정 파일
# contexa 프로젝트 - iframe 임베딩을 위한 익명 접근 활성화

[server]
# 서버 설정
protocol = http
http_port = 3000
domain = localhost
root_url = http://localhost:3000

[security]
# 보안 설정 - iframe 임베딩 허용
allow_embedding = true
cookie_samesite = lax
# admin 계정 설정
admin_user = admin
admin_password = contexa

[auth.anonymous]
# 익명 접근 활성화 (iframe 임베딩에 필수)
enabled = true
org_name = Main Org.
org_role = Viewer

[users]
# 신규 사용자 가입 비활성화
allow_sign_up = false

[plugins]
# 플러그인 설정
enable_alpha = false
