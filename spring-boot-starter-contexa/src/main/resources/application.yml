contexa:
  hcad:
    enable-simulated-user-agent: true
spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/identity
    username: admin
    password: 1111
    driver-class-name: org.postgresql.Driver

  ai:
    chat:
      model:
        # vLLM 사용 시: vllm,ollama,openai (vLLM 서버 실행 필요)
        priority: ollama,openai  # Anthropic 제거 (enabled: false)

      embedding:
        model:
          priority: ollama,openai

    anthropic:
      api-key: ${ANTHROPIC_API_KEY:sk-ant-dummy-key-for-disabled}
      chat:
        enabled: false
        options:
          model: claude-sonnet-4-20250514
          temperature: 0.3
