  jpa:
    database: POSTGRESQL
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: update
        jdbc:
          lob:
            non_contextual_creation: true
        query:
          in_clause_parameter_padding: true
    show-sql: false

  cache:
    type: redis
    redis:
      cache-null-values: false
      time-to-live: 3600000  # 1 hour (milliseconds)

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 200000
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: 5s
      ssl:
        enabled: false
