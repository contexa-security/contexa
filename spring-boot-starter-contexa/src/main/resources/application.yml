spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.actuate.autoconfigure.tracing.otlp.OtlpAutoConfiguration

  datasource:
    url: jdbc:postgresql://localhost:5432/identity
    username: admin
    password: 1111
    driver-class-name: org.postgresql.Driver

  # AuthContextProperties 매핑 (spring.auth)
  auth:
    token-issuer: internal
    token-transport-type: header_cookie
    token-store-type: REDIS
    state-type: oauth2

    # 토큰 유효 시간
    access-token-validity: 3600000      # 1시간 (밀리초)
    refresh-token-validity: 604800000   # 7일 (밀리초)
    refresh-rotate-threshold: 43200000  # 12시간 (밀리초)

    # 기타 설정
    enable-refresh-token: true
    allow-multiple-logins: false
    max-concurrent-logins: 3
    cookie-secure: false
    token-prefix: "Bearer "
    roles-claim: "roles"
    scopes-claim: "scopes"

    # MFA 설정
    mfa:
      initiate-url: "/mfa/initiate"
      select-factor-url: "/mfa/select-factor"
      failure-url: "/mfa/failure"
      otp-token-validity-seconds: 300   # 5분
      session-timeout-ms: 600000        # 10분
      challenge-timeout-ms: 300000      # 5분
      max-retry-attempts: 5
      minimum-delay-ms: 500
      state-machine-pool-size: 100
      circuit-breaker-failure-threshold: 5
      detailed-logging-enabled: true
      metrics-enabled: true
      audit-logging-enabled: true
      session-storage-type: redis
    factor-selection-type: auto

  ai:
    chat:
      model:
        priority: ollama,openai  # Anthropic 제거 (enabled: false)

      embedding:
        model:
          priority: ollama,openai

    anthropic:
      api-key: ${ANTHROPIC_API_KEY:sk-ant-dummy-key-for-disabled}
      chat:
        enabled: false
        options:
          model: claude-sonnet-4-20250514
          temperature: 0.3

    ollama:
      base-url: http://127.0.0.1:11434
      embedding:
        enabled: true
        model: mxbai-embed-large
      chat:
        options:
          model: exaone3.5
          temperature: 0.3
          timeout: 10s

    openai:
      api-key: ${OPENAI_API_KEY:sk-dummy-key}
      base-url: https://api.openai.com
      chat:
        enabled: false
      embedding:
        enabled: false
        options:
          model: text-embedding-3-small

    vectorstore:
      pgvector:
        table-name: vector_store
        index-type: HNSW
        distance-type: COSINE_DISTANCE  # COSINE_DISTANCE, EUCLIDEAN_DISTANCE, NEGATIVE_INNER_PRODUCT
        dimensions: 1536
        initialize-schema: true
        max-document-batch-size: 10000

  jpa:
    database: POSTGRESQL
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: update
        jdbc:
          lob:
            non_contextual_creation: true
        query:
          in_clause_parameter_padding: true
    show-sql: false

  cache:
    type: redis
    redis:
      cache-null-values: false
      time-to-live: 3600000  # 1시간 (밀리초)

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 200000
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: 5s
      ssl:
        enabled: false

  mail:
    host: smtp.gmail.com
    port: 587
    username: leaven73@gmail.com
    password: kyilbzbhynwnndwp
    protocol: smtp
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          ssl:
            trust: smtp.gmail.com

management:
  tracing:
    enabled: false  # 개발 환경에서는 OpenTelemetry 비활성화
  otlp:
    metrics:
      export:
        enabled: false
    tracing:
      endpoint: http://localhost:4317

# StateMachineProperties 매핑 (security.statemachine)
security:
  statemachine:
    enabled: true

    mfa:
      enable-metrics: true
      max-retries: 3
      session-timeout-minutes: 30

    redis:
      enabled: true
      ttl-minutes: 30
      key-prefix: "mfa:statemachine:"

  # ZeroTrustPolicyEvaluator 설정 추가
  zerotrust:
    thresholds:
      skip: 0.3      # MFA 생략 임계값
      optional: 0.5  # 선택적 MFA 임계값
      required: 0.7  # 필수 MFA 임계값
      strict: 0.9    # 강화 MFA 임계값
    redis:
      timeout: 5000  # Redis 타임아웃 (밀리초) - 5초

# 로깅 설정
logging:
  level:
    io.contexa.contexaidentity.security.statemachine: DEBUG
    org.springframework.statemachine: DEBUG

---
# 개발 환경 프로파일
spring:
  config:
    activate:
      on-profile: dev
  data:
    redis:
      host: localhost
      port: 6379

security:
  statemachine:
    redis:
      enabled: false  # 개발 환경에서는 In-Memory 사용

logging:
  level:
    io.contexa.contexaidentity: DEBUG
    org.springframework.statemachine: DEBUG

---
# 운영 환경 프로파일
spring:
  config:
    activate:
      on-profile: prod
  data:
    redis:
      host: ${REDIS_HOST:redis-cluster.example.com}
      port: ${REDIS_PORT:6379}
      ssl:
        enabled: true
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5
      cluster:
        nodes:
          - ${REDIS_CLUSTER_NODE1:redis-1.example.com:6379}
          - ${REDIS_CLUSTER_NODE2:redis-2.example.com:6379}
          - ${REDIS_CLUSTER_NODE3:redis-3.example.com:6379}

security:
  statemachine:
    redis:
      enabled: true
      ttl-minutes: 60

logging:
  level:
    io.contexa.contexaidentity: INFO
    org.springframework.data.redis: WARN

---
# 테스트 환경 프로파일
spring:
  config:
    activate:
      on-profile: test
  data:
    redis:
      host: localhost
      port: 6370

security:
  statemachine:
    mfa:
      enable-metrics: false
      max-retries: 2
      session-timeout-minutes: 10
    redis:
      enabled: false

logging:
  level:
    io.contexa.contexaidentity: DEBUG
    org.springframework.statemachine: DEBUG
