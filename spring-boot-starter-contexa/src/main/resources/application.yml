contexa:
  hcad:
    enable-simulated-user-agent: true
spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/identity
    username: admin
    password: 1111
    driver-class-name: org.postgresql.Driver

  ai:
    chat:
      model:
        # When using vLLM: vllm,ollama,openai (vLLM server required)
        priority: ollama,openai  # Anthropic removed (enabled: false)

      embedding:
        model:
          priority: ollama,openai

    anthropic:
      api-key: ${ANTHROPIC_API_KEY:sk-ant-dummy-key-for-disabled}
      chat:
        enabled: false
        options:
          model: claude-sonnet-4-20250514
          temperature: 0.3
#
