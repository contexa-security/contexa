<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOAR Approval Result</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif; line-height: 1.6; color: #1f2933; max-width: 640px; margin: 0 auto; padding: 24px; background-color: #f3f5f7; }
        .container { background: #ffffff; border-radius: 12px; overflow: hidden; box-shadow: 0 18px 40px rgba(15, 23, 42, 0.08); }
        .header { color: #ffffff; padding: 28px 24px; }
        .header.approved { background: linear-gradient(135deg, #166534 0%, #16a34a 100%); }
        .header.rejected { background: linear-gradient(135deg, #991b1b 0%, #dc2626 100%); }
        .header h1 { margin: 0; font-size: 24px; }
        .content { padding: 28px 24px; }
        .panel { background: #f8fafc; border: 1px solid #d8dee6; border-radius: 10px; padding: 18px; margin: 18px 0; }
        .row { display: flex; gap: 12px; padding: 8px 0; border-bottom: 1px solid #e5e7eb; }
        .row:last-child { border-bottom: none; }
        .label { width: 160px; font-weight: 700; color: #475569; }
        .value { flex: 1; color: #0f172a; }
        .comment { background: #eef2ff; border-left: 4px solid #4f46e5; border-radius: 8px; padding: 14px; margin-top: 20px; }
        .actions { margin-top: 24px; text-align: center; }
        .btn { display: inline-block; padding: 12px 22px; border-radius: 8px; background: #2563eb; color: #ffffff; text-decoration: none; font-weight: 700; }
        .footer { padding: 20px 24px 28px; color: #64748b; font-size: 13px; border-top: 1px solid #e5e7eb; }
        .footer a { color: #2563eb; text-decoration: none; }
    </style>
</head>
<body>
<div class="container">
    <div class="header" th:classappend="${approved} ? ' approved' : ' rejected'">
        <h1 th:text="${approved} ? 'Approval granted' : 'Approval rejected'">Approval granted</h1>
    </div>
    <div class="content">
        <p th:text="${approved} ? 'The approval request has been granted and the governed SOAR execution may proceed.' : 'The approval request has been rejected and execution has been stopped.'">
            Result summary.
        </p>

        <div class="panel">
            <div class="row"><div class="label">Approval ID</div><div class="value" th:text="${approvalId}">APR-0001</div></div>
            <div class="row"><div class="label">Reviewer</div><div class="value" th:text="${reviewer}">operator</div></div>
            <div class="row"><div class="label">Completed at</div><div class="value" th:text="${timestamp}">2026-03-11 21:10:00</div></div>
            <div class="row"><div class="label">Status</div><div class="value" th:text="${approved} ? 'APPROVED' : 'REJECTED'">APPROVED</div></div>
        </div>

        <div class="comment" th:if="${comment != null and !comment.isBlank()}">
            <div style="font-weight:700; margin-bottom:6px;">Reviewer comment</div>
            <div th:text="${comment}">Looks safe to proceed.</div>
        </div>

        <div class="actions">
            <a class="btn" th:href="${approvalDetailUrl}">Open approval detail</a>
        </div>
    </div>
    <div class="footer">
        <div><a th:href="${approvalListUrl}">Open approval inbox</a> · <a th:href="${baseUrl}" th:text="${baseUrl}">https://contexa.example.com</a></div>
        <div style="margin-top:10px;">Generated at <span th:text="${timestamp}">2026-03-11 21:10:00</span> · Support <a th:href="${'mailto:' + supportEmail}" th:text="${supportEmail}">support@example.com</a></div>
    </div>
</div>
</body>
</html>
