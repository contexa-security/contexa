# 시뮬레이션 전용 설정
simulation:
  # 공격 시뮬레이션용 IP 주소
  attack-ips:
    # 세션 하이재킹 시뮬레이션
    session-hijacking:
      original: "192.168.1.100"
      hijacked: "45.33.32.156"  # 의심스러운 외부 IP

    # Impossible Travel 시뮬레이션
    impossible-travel:
      korea: "211.234.110.123"    # 한국 서울
      usa: "74.125.224.72"         # 미국 뉴욕
      russia: "185.220.101.45"     # 러시아 모스크바
      china: "223.255.255.254"     # 중국 베이징

    # 일반 공격자 IP
    suspicious:
      - "1.2.3.4"
      - "5.6.7.8"
      - "185.220.101.45"
      - "45.33.32.156"
      - "74.125.224.72"

    # 정상 사용자 IP 범위
    normal:
      subnet: "192.168.1.0/24"
      trusted:
        - "192.168.1.100"
        - "192.168.1.101"
        - "192.168.1.102"
        - "192.168.1.103"
        - "192.168.1.104"

  # User-Agent 패턴
  user-agents:
    normal:
      - "Mozilla/5.0 (Windows NT 10.0; Win64; x64) Chrome/120.0"
      - "Mozilla/5.0 (Macintosh; Intel Mac OS X 10_15_7) Safari/17.0"
      - "Mozilla/5.0 (X11; Linux x86_64) Firefox/120.0"
      - "Mozilla/5.0 (Windows NT 10.0; Win64; x64) Edge/120.0"

    suspicious:
      - "bot"
      - "scanner"
      - "sqlmap"
      - "nikto"
      - "curl"
      - "wget"
      - "python-requests"

  # 공격 패턴 설정
  attack-patterns:
    credential-stuffing:
      attempts:
        - username: "admin"
          password: "admin123"
        - username: "admin"
          password: "password"
        - username: "admin"
          password: "1234"
        - username: "user1"
          password: "pass123"
        - username: "test"
          password: "test"

    privilege-escalation:
      endpoints:
        admin:
          - "/admin/users"
          - "/admin/settings"
          - "/admin/system-config"
          - "/admin/audit-logs"
        finance:
          - "/api/protectable/getAllCustomerData"
          - "/financial/reports"
          - "/customer/payment"
        infrastructure:
          - "/infrastructure/deploy"
          - "/monitoring/alerts"
        development:
          - "/dev/deploy"
          - "/api/keys"
          - "/source/code"

    api-abuse:
      rate-limits:
        normal: 10         # requests per second
        elevated: 50       # suspicious rate
        abusive: 100       # definite abuse
      time-window: 10      # seconds

    mfa-bypass:
      methods:
        - "Session Cookie Replay"
        - "Direct API Call"
        - "Legacy Endpoint"
        - "Token Manipulation"

  # 위치 정보 매핑
  locations:
    ip-to-location:
      "211.234.110.123": "Seoul, Korea"
      "74.125.224.72": "New York, USA"
      "185.220.101.45": "Moscow, Russia"
      "223.255.255.254": "Beijing, China"
      "45.33.32.156": "Unknown VPN"
      "192.168.1.100": "Seoul, Korea"
      "192.168.1.101": "Seoul, Korea"
      "192.168.1.102": "Seoul, Korea"
      "192.168.1.103": "Seoul, Korea"
      "192.168.1.104": "Seoul, Korea"

  # 거리 계산 (km)
  distances:
    "Seoul-NewYork": 10950
    "Seoul-Moscow": 6600
    "Seoul-Beijing": 950
    "NewYork-Moscow": 7500
    "NewYork-Beijing": 11000
    "Moscow-Beijing": 5800

  # 시간대 정보
  timezones:
    normal-hours:
      start: 9    # 9 AM
      end: 18     # 6 PM
    suspicious-hours:
      early-morning: [0, 6]   # 0 AM - 6 AM
      late-night: [22, 24]    # 10 PM - 12 AM

  # 리스크 점수 설정
  risk-scores:
    ip-change: 0.15
    device-change: 0.20
    location-change: 0.25
    impossible-travel: 0.40
    suspicious-agent: 0.30
    off-hours: 0.10
    repeated-attempts: 0.25

  # 테스트 계정 설정 (시뮬레이션 환경에서만 사용)
  test-accounts:
    enabled: false  # 프로덕션에서는 false로 설정
    accounts:
      - username: "attacker"
        threat-score: 0.85
        role: "ROLE_ATTACKER"
      - username: "compromised_user"
        threat-score: 0.75
        role: "ROLE_COMPROMISED"