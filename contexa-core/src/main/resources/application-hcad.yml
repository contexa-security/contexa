# HCAD (Hyper-lightweight Context Anomaly Detector) 설정
# 실시간 이상 탐지 및 차단 시스템 구성

hcad:
  # HCAD 시스템 활성화
  enabled: true

  # 필터 설정
  filter:
    # Spring Security 필터 체인 내 순서 (낮을수록 먼저 실행)
    order: 100  # SecurityContextHolderFilter 직후

  # AI 모델 설정
  model:
    # 사용할 초경량 모델 (Ollama에서 실행)
    # 옵션: tinyllama:latest, phi-3-mini, gemma-2b
    type: tinyllama:latest

    # Ollama 서버 URL
    base-url: http://127.0.0.1:11434

    # 모델 응답 타임아웃 (밀리초)
    # 목표: 10-50ms 내 응답
    timeout-ms: 50

    # 모델 온도 (창의성 vs 일관성)
    temperature: 0.1  # 낮은 값으로 일관된 판단

  # 이상 탐지 임계값
  threshold:
    # 즉시 차단 임계값
    block: 0.9      # 0.9 이상이면 즉시 차단

    # 경고 임계값 (심층 분석 트리거)
    warn: 0.7       # 0.7-0.9 사이면 감시 모드 + BehavioralAnalysisLab 트리거

    # 통과 임계값
    pass: 0.7       # 0.7 미만이면 정상 통과

  # 캐싱 설정 (성능 향상)
  cache:
    # 캐시 활성화
    enabled: true

    # 캐시 TTL (초)
    ttl-seconds: 30

    # 최대 캐시 항목 수
    max-size: 10000

    # 애플리케이션 시작 시 캐시 초기화 (패키지 마이그레이션 시 true로 설정)
    clear-on-startup: true

  # 기준선 벡터 설정
  baseline:
    # ✅ 기준선 업데이트 알파 값 (지수 이동 평균)
    # 낮을수록 기존 패턴 유지, 높을수록 새 패턴 빠르게 학습
    # 0.1 → 0.3 변경: HOT_PATH 진입 시간 단축 (18회 → 5.3회)
    update-alpha: 0.3

    # 기준선 업데이트 간격 (초)
    update-interval-seconds: 3600  # 1시간

    # 벡터 차원 수
    vector-dimensions: 384

    # 최소 신뢰도 (기준선 사용 전 필요한 학습량)
    min-confidence: 0.3

    # Bootstrap 단계 설정 (신규 사용자 초기 학습)
    bootstrap:
      # Bootstrap 단계 활성화
      enabled: true

      # Bootstrap에 필요한 초기 샘플 수
      initial-samples: 10

      # Bootstrap 단계의 최대 이상 점수 (더 관대한 학습)
      max-anomaly-score: 0.85  # Bootstrap에서는 0.85까지 학습 허용

    # 통계적 이상치 탐지 설정
    statistical:
      # 통계적 탐지 활성화
      enabled: true

      # Z-score 임계값 (표준편차의 배수)
      z-score-threshold: 3.0  # 3 시그마 밖의 값은 이상치로 간주

  # Redis 설정
  redis:
    # Redis 키 접두사
    key-prefix: "hcad:baseline:context:"

    # 기준선 TTL (일)
    ttl-days: 30

    # 메트릭 TTL (시간)
    metrics-ttl-hours: 24

  # 폴백 설정
  fallback:
    # AI 모델 실패 시 기준선만 사용
    use-baseline: true

    # 기본 이상 점수 (모든 것이 실패했을 때)
    default-score: 0.5

  # 성능 모니터링
  monitoring:
    # 메트릭 수집 활성화
    enabled: true

    # 로그 레벨
    log-level: INFO

    # 상세 디버그 로깅
    debug: false

  # 차단 정책
  blocking:
    # 차단 지속 시간 (일)
    duration-days: 30

    # 긴급 차단 모드 (오류 시에도 차단)
    emergency-mode: true

    # 차단 시 세션 무효화
    invalidate-sessions: true

    # 차단 시 MFA 강제
    enforce-mfa: true

  # 통합 설정
  integration:
    # BehavioralAnalysisLab과 연동
    behavioral-lab:
      enabled: true
      # 중간 위험(0.7-0.9) 시 트리거
      trigger-on-warning: true

    # SOAR 시스템과 연동
    soar:
      enabled: true
      # 차단 시 SOAR 워크플로우 트리거
      trigger-on-block: true

  # 제외 경로 (필터링하지 않을 경로)
  exclude-paths:
    - /static/**
    - /css/**
    - /js/**
    - /images/**
    - /health
    - /actuator/health
    - /login
    - /logout

# Spring AI 설정 (Ollama 통합)
spring:
  ai:
    ollama:
      base-url: ${hcad.model.base-url:http://127.0.0.1:11434}
      chat:
        enabled: true
        options:
          model: ${hcad.model.type:tinyllama:latest}
          temperature: ${hcad.model.temperature:0.1}
          num-predict: 10  # 짧은 응답 (점수만)
          num-ctx: 512     # 작은 컨텍스트 윈도우
          num-gpu: 0       # CPU 사용 (빠른 응답)
          num-thread: 4    # 병렬 처리

# 로깅 설정
logging:
  level:
    io.spring.aicore.security.hcad: ${hcad.monitoring.log-level:INFO}
    io.spring.aicore.autonomous.security.processor: INFO
    org.springframework.ai.ollama: WARN