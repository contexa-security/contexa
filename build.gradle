plugins {
    id 'java'
    id 'org.springframework.boot' version '3.5.4'
    id 'io.spring.dependency-management' version '1.1.7'
    id 'java-library'
}

bootJar.enabled = false
jar.enabled = true

repositories {
    mavenCentral()
    maven { url = 'https://repo.spring.io/milestone' }
    maven { url = 'https://repo.spring.io/snapshot' }
}

allprojects {
    group = 'io.contexa'
    version = '0.1.0'
    description = 'contexa'
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
    // Maven Central 배포 요구사항: 소스 JAR, Javadoc JAR 생성 (Maven Central requirement: Generate source and Javadoc JARs)
    withSourcesJar()
    withJavadocJar()
}

// Javadoc 생성 설정 (Javadoc generation configuration)
tasks.withType(Javadoc) {
    options.encoding = 'UTF-8'
    options.charSet = 'UTF-8'
    // 한국어 주석 에러 무시 (Ignore Korean comment errors)
    options.addStringOption('Xdoclint:none', '-quiet')
}

subprojects {
    apply plugin: 'java'
    apply plugin: 'java-library'
    apply plugin: 'org.springframework.boot'
    apply plugin: 'io.spring.dependency-management'
    apply plugin: 'maven-publish'
    apply plugin: 'signing'

    java {
        withSourcesJar()
        withJavadocJar()
    }

    repositories {
        mavenCentral()
        maven { url = 'https://repo.spring.io/milestone' }
        maven { url = 'https://repo.spring.io/snapshot' }
        maven {
            name = 'Central Portal Snapshots'
            url = 'https://central.sonatype.com/repository/maven-snapshots/'
        }
    }

    configurations {
        compileOnly {
            extendsFrom annotationProcessor
        }
    }

    tasks.withType(JavaCompile) {
        options.encoding = 'UTF-8'
    }

    // bootRun 콘솔 한글 인코딩 설정
    tasks.withType(org.springframework.boot.gradle.tasks.run.BootRun).configureEach {
        jvmArgs = ['-Dfile.encoding=UTF-8', '-Dconsole.encoding=UTF-8', '-Dstdout.encoding=UTF-8', '-Dstderr.encoding=UTF-8']
    }

    // Javadoc 오류 무시 설정
    tasks.withType(Javadoc) {
        options.encoding = 'UTF-8'
        options.addStringOption('Xdoclint:none', '-quiet')
        failOnError = false
    }

    // Common dependencies shared by all subprojects
    dependencies {
        implementation 'org.springframework.boot:spring-boot-starter-data-jpa'
        implementation 'org.springframework.boot:spring-boot-starter-web'
        implementation 'org.springframework.boot:spring-boot-starter-data-redis'

        annotationProcessor "jakarta.annotation:jakarta.annotation-api"
        annotationProcessor "jakarta.persistence:jakarta.persistence-api"

        implementation 'org.postgresql:postgresql:42.7.6'
        implementation 'com.fasterxml.jackson.datatype:jackson-datatype-jsr310'
        implementation 'com.fasterxml.jackson.core:jackson-databind'

        implementation platform("org.springframework.ai:spring-ai-bom:1.0.0")

        // JWT
        implementation 'io.jsonwebtoken:jjwt-api:0.12.6'
        runtimeOnly 'io.jsonwebtoken:jjwt-impl:0.12.6'
        runtimeOnly 'io.jsonwebtoken:jjwt-jackson:0.12.6'

        implementation("com.github.ben-manes.caffeine:caffeine:3.2.2")

        // Observability
        implementation 'io.opentelemetry:opentelemetry-api:1.32.0'

        implementation 'org.apache.commons:commons-pool2:2.12.1'
        compileOnly 'org.projectlombok:lombok'
        annotationProcessor 'org.projectlombok:lombok'
        annotationProcessor "org.springframework.boot:spring-boot-configuration-processor"
        implementation 'org.modelmapper:modelmapper:3.2.3'
    }

    dependencyManagement {
        imports {
            mavenBom "org.springframework.cloud:spring-cloud-dependencies:2022.0.4"
            mavenBom "io.github.resilience4j:resilience4j-bom:2.1.0"
            mavenBom "org.springframework.statemachine:spring-statemachine-bom:4.0.0"
        }
    }

    // Maven 저장소 배포 설정 (Maven repository publishing configuration)
    publishing {
        publications {
            mavenJava(MavenPublication) {
                from components.java

                pom {
                    name = project.name
                    description = 'Contexa - AI-Native IAM & Autonomous Security Platform'
                    url = 'https://github.com/contexa-security/contexa'

                    licenses {
                        license {
                            name = 'The Apache License, Version 2.0'
                            url = 'https://www.apache.org/licenses/LICENSE-2.0.txt'
                        }
                    }

                    developers {
                        developer {
                            id = 'contexa'
                            name = 'Contexa Team'
                        }
                    }

                    scm {
                        connection = 'scm:git:git://github.com/contexa-security/contexa.git'
                        developerConnection = 'scm:git:ssh://github.com/contexa-security/contexa.git'
                        url = 'https://github.com/contexa-security/contexa'
                    }
                }
            }
        }

        repositories {
            mavenLocal()
            maven {
                name = 'sonatype'
                def releasesUrl = 'https://ossrh-staging-api.central.sonatype.com/service/local/staging/deploy/maven2/'
                def snapshotsUrl = 'https://central.sonatype.com/repository/maven-snapshots/'
                url = version.endsWith('SNAPSHOT') ? snapshotsUrl : releasesUrl
                credentials {
                    username = findProperty('ossrhUsername') ?: System.getenv('OSSRH_USERNAME') ?: ''
                    password = findProperty('ossrhPassword') ?: System.getenv('OSSRH_PASSWORD') ?: ''
                }
            }
        }
    }

    signing {
        def signingKey = findProperty('signing.key') ?: System.getenv('GPG_SIGNING_KEY')
        def signingPassword = findProperty('signing.password') ?: System.getenv('GPG_SIGNING_PASSWORD')
        if (signingKey) {
            useInMemoryPgpKeys(signingKey, signingPassword)
        }
        sign publishing.publications.mavenJava
        required { signingKey != null && !version.endsWith('SNAPSHOT') }
    }

}
