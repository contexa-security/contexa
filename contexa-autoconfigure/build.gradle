// contexa-autoconfigure는 subprojects 설정을 상속받으므로
// plugins, java, configurations는 이미 적용됨

dependencies {
    // Contexa 모듈 의존성
    api project(':contexa-core')
    api project(':contexa-common')

    // Spring Boot AutoConfiguration (subprojects 공통 의존성 외 추가)
    implementation 'org.springframework.boot:spring-boot-autoconfigure'
    annotationProcessor 'org.springframework.boot:spring-boot-autoconfigure-processor'
    // spring-boot-configuration-processor는 subprojects에서 이미 추가됨
}

// 라이브러리 모듈이므로 bootJar 비활성화
bootJar.enabled = false
jar.enabled = true

tasks.named('test') {
    useJUnitPlatform()
}
