  ai:
    # MCP Server Configuration
    mcp:
      server:
        enabled: true
        name: Contexa SOAR Platform
        version: 1.0.0
        type: SYNC  # 동기 서버 (ASYNC 사용 가능)
        sse-message-endpoint: /mcp/message  # SSE 엔드포인트
        resource-change-notification: false  # 리소스 미사용
        tool-change-notification: true      # 도구 변경 알림 활성화
        prompt-change-notification: false   # 프롬프트 미사용
        request-timeout: 30000              # 30초 타임아웃
        instructions: "Security orchestration and automated response tools for contexa platform"
        capabilities:
          tool: true        # 도구 기능 활성화
          resource: false   # 리소스 기능 비활성화
          prompt: false     # 프롬프트 기능 비활성화
          completion: false # 자동완성 기능 비활성화
        base-url: http://localhost:9000

    chat:
      model:
        priority: ollama,anthropic,openai  # 원하는 순서로 변경 가능

      embedding:
        model:
          priority: ollama,openai  # 원하는 순서로 변경 가능

    anthropic:
      api-key: ${ANTHROPIC_API_KEY}
      chat:
        enabled: false
        options:
          model: claude-sonnet-4-20250514
          temperature: 0.3  # JSON 생성에는 낮은 temperature가 좋음

    ollama:
      base-url: http://127.0.0.1:11434
      embedding:
        enabled: true
        model: mxbai-embed-large
      chat:
        options:
          #          model: llama3.2:1b    # 🚀 가벼운 모델로 변경 (44초 → 5-10초 예상)
          model: exaone3.5     # 무거운 모델 (44초 소모)
          temperature: 0.3      # 🚀 빠른 응답을 위해 낮춤 (0.7 → 0.3)
          timeout: 10s          # 🚀 AI 호출 타임아웃 10초 명시
    #          keep_alive: -1

    # OpenAI는 embedding용으로만 사용
    openai:
      api-key: ${OPENAI_API_KEY}
      base-url: https://api.openai.com
      chat:
        enabled: false  # chat 비활성화, embedding만 사용
      embedding:
        enabled: false
        options:
          model: text-embedding-3-small

    vectorstore:
      pgvector:
        table-name: vector_store
        index-type: HNSW
        distance-type: COSINE_DISTANCE  # COSINE_DISTANCE, EUCLIDEAN_DISTANCE, NEGATIVE_INNER_PRODUCT
        dimensions: 1536
        initialize-schema: true
        max-document-batch-size: 10000

  datasource:
    url: jdbc:postgresql://localhost:5432/identity
    username: admin
    password: 1111
    hikari:
      auto-commit: false
    driver-class-name: org.postgresql.Driver