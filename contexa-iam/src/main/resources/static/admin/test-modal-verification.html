<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOAR 승인 모달 검증 테스트</title>
    
    <!-- Bootstrap & Font Awesome -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- SOAR Components -->
    <script src="/js/soar-approval-modal.js"></script>
    <script src="/js/soar-websocket-enhanced.js"></script>
    <script src="/js/soar-approval-handler.js"></script>
    
    <!-- SockJS and STOMP -->
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1.6.1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
    
    <style>
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #e2e8f0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            padding: 2rem;
        }
        
        .test-container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .test-header {
            background: rgba(30, 41, 59, 0.8);
            padding: 2rem;
            border-radius: 1rem;
            margin-bottom: 2rem;
            border: 1px solid rgba(71, 85, 105, 0.3);
        }
        
        .test-section {
            background: rgba(30, 41, 59, 0.6);
            padding: 1.5rem;
            border-radius: 1rem;
            margin-bottom: 1.5rem;
            border: 1px solid rgba(71, 85, 105, 0.3);
        }
        
        .test-button {
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            font-weight: 600;
            border: none;
            margin: 0.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .test-button:hover {
            transform: translateY(-2px);
        }
        
        .btn-direct {
            background: linear-gradient(135deg, #8b5cf6, #7c3aed);
            color: white;
        }
        
        .btn-websocket {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
        }
        
        .btn-api {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
        }
        
        .btn-connect {
            background: linear-gradient(135deg, #22c55e, #16a34a);
            color: white;
        }
        
        .status-indicator {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            background: rgba(15, 23, 42, 0.8);
            border-radius: 0.5rem;
            margin: 0.5rem;
        }
        
        .status-connected {
            border: 1px solid rgba(34, 197, 94, 0.5);
            color: #22c55e;
        }
        
        .status-disconnected {
            border: 1px solid rgba(239, 68, 68, 0.5);
            color: #ef4444;
        }
        
        .log-container {
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(71, 85, 105, 0.3);
            border-radius: 0.5rem;
            padding: 1rem;
            height: 400px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 0.875rem;
        }
        
        .log-entry {
            padding: 0.25rem 0;
            border-bottom: 1px solid rgba(71, 85, 105, 0.2);
        }
        
        .log-success { color: #22c55e; }
        .log-error { color: #ef4444; }
        .log-info { color: #3b82f6; }
        .log-warning { color: #f59e0b; }
        .log-modal { color: #8b5cf6; font-weight: bold; }
        
        .verification-result {
            margin-top: 1rem;
            padding: 1rem;
            border-radius: 0.5rem;
            font-weight: 600;
        }
        
        .result-success {
            background: rgba(34, 197, 94, 0.2);
            border: 1px solid rgba(34, 197, 94, 0.5);
            color: #22c55e;
        }
        
        .result-failure {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid rgba(239, 68, 68, 0.5);
            color: #ef4444;
        }
    </style>
</head>
<body>
    <div class="test-container">
        <!-- Header -->
        <div class="test-header">
            <h1><i class="fas fa-check-circle"></i> SOAR 승인 모달 검증 테스트</h1>
            <p class="mb-0">WebSocket 연결 시 승인 모달이 실제로 표시되는지 검증합니다.</p>
        </div>
        
        <!-- WebSocket 연결 상태 -->
        <div class="test-section">
            <h3><i class="fas fa-plug"></i> WebSocket 연결 상태</h3>
            <div id="connectionStatus" class="status-indicator status-disconnected">
                <i class="fas fa-circle"></i>
                <span>연결 끊김</span>
            </div>
            <button class="test-button btn-connect" onclick="connectWebSocket()">
                <i class="fas fa-link"></i> WebSocket 연결
            </button>
            <button class="test-button btn-connect" onclick="disconnectWebSocket()">
                <i class="fas fa-unlink"></i> 연결 끊기
            </button>
        </div>
        
        <!-- 모달 테스트 버튼들 -->
        <div class="test-section">
            <h3><i class="fas fa-vial"></i> 모달 표시 테스트</h3>
            
            <h5>1. 직접 모달 테스트</h5>
            <button class="test-button btn-direct" onclick="testDirectModal()">
                <i class="fas fa-window-restore"></i> 직접 모달 표시
            </button>
            <button class="test-button btn-direct" onclick="testModalWithApprovalHandler()">
                <i class="fas fa-layer-group"></i> ApprovalHandler로 모달 표시
            </button>
            
            <h5 class="mt-3">2. WebSocket 메시지 테스트</h5>
            <button class="test-button btn-websocket" onclick="simulateWebSocketMessage()">
                <i class="fas fa-envelope"></i> WebSocket 메시지 시뮬레이션
            </button>
            
            <h5 class="mt-3">3. API 트리거 테스트</h5>
            <button class="test-button btn-api" onclick="triggerApprovalViaAPI('HIGH')">
                <i class="fas fa-exclamation-triangle"></i> HIGH 위험도 승인 요청
            </button>
            <button class="test-button btn-api" onclick="triggerApprovalViaAPI('CRITICAL')">
                <i class="fas fa-radiation"></i> CRITICAL 위험도 승인 요청
            </button>
            
            <div id="verificationResult"></div>
        </div>
        
        <!-- 실시간 로그 -->
        <div class="test-section">
            <h3><i class="fas fa-terminal"></i> 실시간 로그</h3>
            <button class="btn btn-sm btn-secondary mb-2" onclick="clearLogs()">
                <i class="fas fa-trash"></i> 로그 지우기
            </button>
            <div id="logContainer" class="log-container"></div>
        </div>
        
        <!-- 모달 상태 -->
        <div class="test-section">
            <h3><i class="fas fa-info-circle"></i> 모달 상태</h3>
            <div id="modalStatus">
                <p>활성 모달: <span id="activeModalStatus">없음</span></p>
                <p>대기열 크기: <span id="queueSize">0</span></p>
                <p>처리된 승인: <span id="processedCount">0</span></p>
            </div>
        </div>
    </div>
    
    <script>
        // 전역 변수
        let websocket = null;
        let approvalModal = null;
        let approvalHandler = null;
        let processedCount = 0;
        
        // 로그 추가 함수
        function addLog(message, type = 'info') {
            const logContainer = document.getElementById('logContainer');
            const entry = document.createElement('div');
            entry.className = `log-entry log-${type}`;
            const timestamp = new Date().toLocaleTimeString();
            entry.textContent = `[${timestamp}] ${message}`;
            logContainer.appendChild(entry);
            logContainer.scrollTop = logContainer.scrollHeight;
            
            // 콘솔에도 출력
            console.log(`[${type.toUpperCase()}] ${message}`);
        }
        
        // 로그 지우기
        function clearLogs() {
            document.getElementById('logContainer').innerHTML = '';
            addLog('로그가 지워졌습니다', 'info');
        }
        
        // 모달 상태 업데이트
        function updateModalStatus() {
            document.getElementById('activeModalStatus').textContent = 
                approvalModal && approvalModal.activeModal ? '표시 중' : '없음';
            document.getElementById('queueSize').textContent = 
                approvalModal ? approvalModal.getQueueSize() : '0';
            document.getElementById('processedCount').textContent = processedCount;
        }
        
        // 검증 결과 표시
        function showVerificationResult(success, message) {
            const resultDiv = document.getElementById('verificationResult');
            resultDiv.className = `verification-result ${success ? 'result-success' : 'result-failure'}`;
            resultDiv.innerHTML = `
                <i class="fas ${success ? 'fa-check-circle' : 'fa-times-circle'}"></i>
                ${message}
            `;
            
            // 5초 후 자동 제거
            setTimeout(() => {
                resultDiv.innerHTML = '';
            }, 5000);
        }
        
        // WebSocket 연결
        function connectWebSocket() {
            addLog('WebSocket 연결 시도...', 'info');
            
            try {
                // WebSocket 클라이언트 생성
                websocket = new EnhancedWebSocketClient('/ws-soar');
                
                // WebSocket 이벤트 리스너 설정 (연결 전에 설정)
                websocket.onConnect = () => {
                    addLog('WebSocket 연결 성공!', 'success');
                    document.getElementById('connectionStatus').className = 'status-indicator status-connected';
                    document.getElementById('connectionStatus').innerHTML = 
                        '<i class="fas fa-circle"></i><span>연결됨</span>';
                    
                    // STOMP 프로토콜 구독 - 서버의 @SubscribeMapping을 트리거하기 위해 필요
                    if (websocket.stompClient) {
                        // /app/soar/approvals 구독 - 서버 세션 등록용
                        const appSubscription = websocket.stompClient.subscribe('/app/soar/approvals', (message) => {
                            addLog(`📡 /app/soar/approvals 초기 응답: ${message.body}`, 'info');
                            try {
                                const data = JSON.parse(message.body);
                                if (data.type === 'SUBSCRIPTION_CONFIRMED') {
                                    addLog(`서버 세션 등록 확인: ${data.userId}`, 'success');
                                }
                            } catch (e) {
                                // JSON 파싱 실패 무시
                            }
                        });
                        addLog('📡 /app/soar/approvals 구독 시도 (서버 세션 등록)', 'info');
                    }
                    
                    // 서버가 응답할 수 있도록 약간의 지연 후 초기화
                    setTimeout(() => {
                        // 연결 완료 후 모달과 핸들러 초기화 (중요: 연결 후에 초기화)
                        addLog('연결 완료 후 컴포넌트 초기화 시작...', 'info');
                        
                        // 모달 생성
                        approvalModal = new SoarApprovalModal();
                        addLog('SoarApprovalModal 인스턴스 생성됨', 'success');
                        
                        // 승인 핸들러 생성 및 초기화
                        approvalHandler = new SoarApprovalHandler();
                        approvalHandler.initialize(websocket, approvalModal);
                        addLog('SoarApprovalHandler 초기화 완료', 'success');
                    }, 100);
                    
                    // 디버깅용 추가 리스너 (중복 구독이 아닌 이벤트 리스너)
                    websocket.on('approvals', (data) => {
                        addLog(`📨 [RAW] 승인 이벤트 수신: ${JSON.stringify(data)}`, 'modal');
                        
                        // 메시지 타입 확인
                        if (data.type) {
                            addLog(`📨 메시지 타입: ${data.type}`, 'modal');
                        }
                        
                        // APPROVAL_REQUEST 타입 명시적 처리
                        if (data.type === 'APPROVAL_REQUEST') {
                            addLog(`🎯 APPROVAL_REQUEST 타입 감지! approvalId: ${data.approvalId}`, 'modal');
                            
                            // 핸들러가 이 메시지를 처리하는지 확인
                            if (approvalHandler) {
                                addLog('📌 ApprovalHandler 존재 확인', 'modal');
                                // 핸들러의 리스너가 호출되는지 확인하기 위한 추가 로그
                                const listeners = websocket.listeners.get('approvals');
                                if (listeners) {
                                    addLog(`📌 현재 등록된 approvals 리스너 수: ${listeners.length}`, 'modal');
                                }
                            }
                        }
                        
                        // 모달이 실제로 표시되는지 확인
                        setTimeout(() => {
                            const modalElement = document.querySelector('.soar-approval-modal-overlay');
                            if (modalElement) {
                                addLog('모달이 화면에 표시됨!', 'modal');
                            } else {
                                addLog('모달이 아직 표시되지 않음', 'warning');
                            }
                        }, 100);
                    });
                    
                    // 연결 상태 확인
                    addLog(`WebSocket 연결 상태: ${websocket.getConnectionState()}`, 'info');
                    addLog(`활성 구독: ${Array.from(websocket.subscriptions.keys()).join(', ')}`, 'info');
                };
                
                websocket.onDisconnect = () => {
                    addLog('WebSocket 연결 끊김', 'warning');
                    document.getElementById('connectionStatus').className = 'status-indicator status-disconnected';
                    document.getElementById('connectionStatus').innerHTML = 
                        '<i class="fas fa-circle"></i><span>연결 끊김</span>';
                    
                    // 연결 끊김 시 핸들러 정리
                    approvalHandler = null;
                    approvalModal = null;
                };
                
                // 연결 오류 처리
                websocket.onError = (error) => {
                    addLog(`WebSocket 오류: ${error.message || error}`, 'error');
                };
                
                // 실제 연결 시작
                websocket.connect().then(() => {
                    addLog('WebSocket 연결 프로세스 시작됨', 'info');
                }).catch((error) => {
                    addLog(`WebSocket 연결 프로세스 실패: ${error.message}`, 'error');
                });
                
            } catch (error) {
                addLog(`WebSocket 초기화 실패: ${error.message}`, 'error');
                console.error('WebSocket 초기화 오류:', error);
            }
        }
        
        // WebSocket 연결 끊기
        function disconnectWebSocket() {
            if (websocket) {
                websocket.disconnect();
                websocket = null;
                approvalHandler = null;
                addLog('WebSocket 연결 해제', 'info');
            }
        }
        
        // 1. 직접 모달 테스트
        function testDirectModal() {
            addLog('직접 모달 표시 테스트 시작', 'info');
            
            if (!approvalModal) {
                approvalModal = new SoarApprovalModal();
            }
            
            const testRequest = {
                approvalId: 'DIRECT-TEST-' + Date.now(),
                toolName: '직접 테스트 도구',
                description: '이것은 직접 모달 표시 테스트입니다. 모달이 정상적으로 표시되는지 확인합니다.',
                riskLevel: 'MEDIUM',
                parameters: {
                    testType: 'DIRECT',
                    timestamp: new Date().toISOString()
                }
            };
            
            addLog('모달 show() 메서드 호출...', 'info');
            
            approvalModal.show(testRequest).then(result => {
                addLog(`모달 결과: ${result.approved ? '승인' : '거부'} - ${result.reason}`, 'modal');
                processedCount++;
                updateModalStatus();
                
                if (result.approved || !result.approved) {
                    showVerificationResult(true, '모달이 정상적으로 표시되고 응답을 받았습니다!');
                }
            });
            
            // 모달이 DOM에 추가되었는지 확인
            setTimeout(() => {
                const modalElement = document.querySelector('.soar-approval-modal-overlay');
                if (modalElement) {
                    addLog('모달이 DOM에 성공적으로 추가됨!', 'modal');
                    addLog(`모달 요소: ${modalElement.className}`, 'success');
                    showVerificationResult(true, '모달이 화면에 표시되었습니다!');
                } else {
                    addLog('모달이 DOM에 추가되지 않음', 'error');
                    showVerificationResult(false, '모달이 표시되지 않았습니다');
                }
                updateModalStatus();
            }, 100);
        }
        
        // 2. ApprovalHandler로 모달 테스트
        function testModalWithApprovalHandler() {
            addLog('ApprovalHandler를 통한 모달 테스트', 'info');
            
            if (!approvalHandler) {
                if (!approvalModal) {
                    approvalModal = new SoarApprovalModal();
                }
                approvalHandler = new SoarApprovalHandler();
                approvalHandler.initialize(null, approvalModal);
            }
            
            const testRequest = {
                type: 'APPROVAL_REQUEST',
                approvalId: 'HANDLER-TEST-' + Date.now(),
                toolName: 'Handler 테스트 도구',
                description: 'ApprovalHandler를 통한 모달 표시 테스트',
                riskLevel: 'HIGH',
                parameters: {
                    testType: 'HANDLER',
                    timestamp: new Date().toISOString()
                }
            };
            
            addLog('ApprovalHandler.handleApprovalRequest() 호출...', 'info');
            approvalHandler.handleApprovalRequest(testRequest);
            
            // 모달 확인
            setTimeout(() => {
                const modalElement = document.querySelector('.soar-approval-modal-overlay');
                if (modalElement) {
                    addLog('ApprovalHandler를 통해 모달이 표시됨!', 'modal');
                    showVerificationResult(true, 'ApprovalHandler 테스트 성공!');
                } else {
                    addLog('ApprovalHandler 모달 표시 실패', 'error');
                    showVerificationResult(false, 'ApprovalHandler 테스트 실패');
                }
                updateModalStatus();
            }, 100);
        }
        
        // 3. WebSocket 메시지 시뮬레이션
        function simulateWebSocketMessage() {
            addLog('WebSocket 메시지 시뮬레이션', 'info');
            
            if (!approvalHandler) {
                addLog('ApprovalHandler가 초기화되지 않음. 먼저 WebSocket을 연결하세요.', 'error');
                showVerificationResult(false, 'WebSocket이 연결되지 않았습니다');
                return;
            }
            
            const simulatedMessage = {
                type: 'APPROVAL_REQUEST',
                approvalId: 'WS-SIM-' + Date.now(),
                toolName: 'WebSocket 시뮬레이션 도구',
                description: 'WebSocket 메시지를 통한 승인 요청 시뮬레이션',
                riskLevel: 'CRITICAL',
                parameters: {
                    source: 'WEBSOCKET_SIMULATION',
                    timestamp: new Date().toISOString()
                }
            };
            
            addLog('시뮬레이션 메시지 전송...', 'info');
            
            // WebSocket 이벤트 직접 트리거
            if (websocket) {
                websocket.notifyListeners('approvals', simulatedMessage);
            } else {
                // WebSocket 없이 직접 처리
                approvalHandler.handleApprovalRequest(simulatedMessage);
            }
            
            // 모달 확인
            setTimeout(() => {
                const modalElement = document.querySelector('.soar-approval-modal-overlay');
                if (modalElement) {
                    addLog('WebSocket 시뮬레이션으로 모달 표시 성공!', 'modal');
                    showVerificationResult(true, 'WebSocket 메시지 처리 성공!');
                } else {
                    addLog('WebSocket 시뮬레이션 모달 표시 실패', 'error');
                    showVerificationResult(false, 'WebSocket 메시지 처리 실패');
                }
                updateModalStatus();
            }, 100);
        }
        
        // 4. API를 통한 승인 요청
        async function triggerApprovalViaAPI(riskLevel) {
            addLog(`API를 통한 ${riskLevel} 승인 요청 트리거`, 'info');
            
            try {
                const response = await fetch(`/api/test/websocket/trigger-approval?riskLevel=${riskLevel}`, {
                    method: 'POST'
                });
                
                const result = await response.json();
                
                if (result.success) {
                    addLog(`API 호출 성공: ${result.approvalId}`, 'success');
                    addLog(`서버 메시지: ${result.message}`, 'info');
                    
                    // 모달 확인 (API는 서버에서 WebSocket으로 전송하므로 약간의 지연 필요)
                    setTimeout(() => {
                        const modalElement = document.querySelector('.soar-approval-modal-overlay');
                        if (modalElement) {
                            addLog('API 트리거로 모달 표시 성공!', 'modal');
                            showVerificationResult(true, '서버 API를 통한 모달 표시 성공!');
                        } else {
                            addLog('모달이 아직 표시되지 않음 (WebSocket 연결 확인 필요)', 'warning');
                            showVerificationResult(false, 'WebSocket 연결을 확인하세요');
                        }
                        updateModalStatus();
                    }, 500);
                } else {
                    addLog(`API 호출 실패: ${result.error}`, 'error');
                    showVerificationResult(false, `API 호출 실패: ${result.error}`);
                }
            } catch (error) {
                addLog(`API 요청 오류: ${error.message}`, 'error');
                showVerificationResult(false, `API 요청 오류: ${error.message}`);
            }
        }
        
        // 페이지 로드 시 초기화
        window.addEventListener('DOMContentLoaded', () => {
            addLog('모달 검증 테스트 페이지 로드 완료', 'info');
            addLog('테스트 버튼을 클릭하여 모달이 표시되는지 확인하세요', 'info');
            updateModalStatus();
        });
        
        // 전역 오류 캐처
        window.addEventListener('error', (event) => {
            addLog(`전역 오류: ${event.error?.message || event.message}`, 'error');
        });
    </script>
</body>
</html>
