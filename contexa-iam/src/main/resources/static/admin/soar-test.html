<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOAR System Test Page</title>
    
    <!-- External Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- SOAR Components -->
    <script src="/js/soar-websocket-enhanced.js"></script>
    <script src="/js/soar-approval-modal.js"></script>
    <script src="/js/soar-state-manager.js"></script>
    <script src="/js/soar-error-handler.js"></script>
    <script src="/js/soar-pipeline-visualization.js"></script>
    <script src="/js/soar-monitoring-dashboard.js"></script>
    <script src="/js/soar-analysis-enhanced.js"></script>
    
    <style>
        body {
            background: linear-gradient(135deg, #1e3a5f 0%, #0f172a 100%);
            color: #e2e8f0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        }
        
        .test-section {
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid rgba(100, 116, 139, 0.3);
            border-radius: 0.75rem;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            backdrop-filter: blur(10px);
        }
        
        .status-indicator {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 0.5rem;
        }
        
        .status-connected { background: #22c55e; }
        .status-disconnected { background: #ef4444; }
        .status-pending { background: #facc15; }
        
        .test-button {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            margin: 0.25rem;
        }
        
        .test-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(59, 130, 246, 0.3);
        }
        
        .test-button:disabled {
            background: #475569;
            cursor: not-allowed;
            transform: none;
        }
        
        .log-area {
            background: rgba(15, 23, 42, 0.9);
            border: 1px solid rgba(100, 116, 139, 0.2);
            border-radius: 0.5rem;
            padding: 1rem;
            height: 200px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 0.875rem;
        }
        
        .log-entry {
            padding: 0.25rem 0;
            border-bottom: 1px solid rgba(100, 116, 139, 0.1);
        }
        
        .log-success { color: #22c55e; }
        .log-error { color: #ef4444; }
        .log-warning { color: #facc15; }
        .log-info { color: #3b82f6; }
    </style>
</head>
<body class="min-h-screen p-6">
    <div class="max-w-6xl mx-auto">
        <h1 class="text-3xl font-bold mb-6 text-center">
            <i class="fas fa-shield-alt text-blue-400"></i>
            SOAR System Test Dashboard
        </h1>
        
        <!-- System Status -->
        <div class="test-section">
            <h2 class="text-xl font-semibold mb-4">
                <i class="fas fa-heartbeat text-green-400"></i> System Status
            </h2>
            <div class="grid grid-cols-3 gap-4">
                <div>
                    <span class="status-indicator status-disconnected" id="wsStatusIndicator"></span>
                    <span>WebSocket: <span id="wsStatus">Disconnected</span></span>
                </div>
                <div>
                    <span class="status-indicator status-disconnected" id="soarStatusIndicator"></span>
                    <span>SOAR System: <span id="soarStatus">Not Initialized</span></span>
                </div>
                <div>
                    <span>Session ID: <span id="currentSessionId" class="text-yellow-400">None</span></span>
                </div>
            </div>
        </div>
        
        <!-- Component Status -->
        <div class="test-section">
            <h2 class="text-xl font-semibold mb-4">
                <i class="fas fa-puzzle-piece text-purple-400"></i> Component Status
            </h2>
            <div class="grid grid-cols-2 gap-4" id="componentStatus">
                <!-- Will be populated by JavaScript -->
            </div>
        </div>
        
        <!-- Test Controls -->
        <div class="test-section">
            <h2 class="text-xl font-semibold mb-4">
                <i class="fas fa-flask text-yellow-400"></i> Test Controls
            </h2>
            <div class="flex flex-wrap gap-2">
                <button class="test-button" onclick="testConnection()">
                    <i class="fas fa-plug"></i> Test Connection
                </button>
                <button class="test-button" onclick="testInitialization()">
                    <i class="fas fa-rocket"></i> Test Initialization
                </button>
                <button class="test-button" onclick="testSimulation()">
                    <i class="fas fa-play"></i> Start Test Simulation
                </button>
                <button class="test-button" onclick="testWebSocket()">
                    <i class="fas fa-broadcast-tower"></i> Test WebSocket
                </button>
                <button class="test-button" onclick="testMCPStatus()">
                    <i class="fas fa-server"></i> Test MCP Status
                </button>
                <button class="test-button" onclick="clearLogs()">
                    <i class="fas fa-eraser"></i> Clear Logs
                </button>
            </div>
        </div>
        
        <!-- Test Results -->
        <div class="test-section">
            <h2 class="text-xl font-semibold mb-4">
                <i class="fas fa-terminal text-cyan-400"></i> Test Results
            </h2>
            <div class="log-area" id="testLog">
                <div class="log-entry log-info">Test console ready...</div>
            </div>
        </div>
        
        <!-- WebSocket Messages -->
        <div class="test-section">
            <h2 class="text-xl font-semibold mb-4">
                <i class="fas fa-comments text-blue-400"></i> WebSocket Messages
            </h2>
            <div class="log-area" id="wsLog">
                <div class="log-entry log-info">WebSocket log ready...</div>
            </div>
        </div>
    </div>
    
    <script>
        // Logging functions
        function log(message, type = 'info') {
            const logEl = document.getElementById('testLog');
            const entry = document.createElement('div');
            entry.className = `log-entry log-${type}`;
            const timestamp = new Date().toLocaleTimeString('ko-KR');
            entry.textContent = `[${timestamp}] ${message}`;
            logEl.appendChild(entry);
            logEl.scrollTop = logEl.scrollHeight;
            console.log(`[TEST] ${message}`);
        }
        
        function wsLog(message, type = 'info') {
            const logEl = document.getElementById('wsLog');
            const entry = document.createElement('div');
            entry.className = `log-entry log-${type}`;
            const timestamp = new Date().toLocaleTimeString('ko-KR');
            entry.textContent = `[${timestamp}] ${message}`;
            logEl.appendChild(entry);
            logEl.scrollTop = logEl.scrollHeight;
        }
        
        function clearLogs() {
            document.getElementById('testLog').innerHTML = '<div class="log-entry log-info">Test console cleared.</div>';
            document.getElementById('wsLog').innerHTML = '<div class="log-entry log-info">WebSocket log cleared.</div>';
            log('Logs cleared', 'info');
        }
        
        // Component status check
        function checkComponents() {
            const components = [
                { name: 'EnhancedWebSocketClient', display: 'WebSocket Client' },
                { name: 'SoarApprovalModal', display: 'Approval Modal' },
                { name: 'SessionStateManager', display: 'State Manager' },
                { name: 'SoarErrorHandler', display: 'Error Handler' },
                { name: 'SoarPipelineVisualization', display: 'Pipeline Visualization' },
                { name: 'SoarMonitoringDashboard', display: 'Monitoring Dashboard' },
                { name: 'SoarAnalysisEnhanced', display: 'Analysis System' },
                { name: 'soarEnhanced', display: 'SOAR Instance' }
            ];
            
            const statusEl = document.getElementById('componentStatus');
            statusEl.innerHTML = '';
            
            components.forEach(comp => {
                const exists = typeof window[comp.name] !== 'undefined';
                const div = document.createElement('div');
                div.innerHTML = `
                    <span class="status-indicator ${exists ? 'status-connected' : 'status-disconnected'}"></span>
                    <span>${comp.display}: ${exists ? 'Loaded' : 'Not Found'}</span>
                `;
                statusEl.appendChild(div);
            });
        }
        
        // Test functions
        async function testConnection() {
            log('Testing connection...', 'info');
            
            try {
                const response = await fetch('/api/soar/simulation/mcp-status');
                if (response.ok) {
                    const data = await response.json();
                    log('Server connection successful', 'success');
                    log(`MCP Status: ${JSON.stringify(data)}`, 'info');
                } else {
                    log(`Server connection failed: ${response.status}`, 'error');
                }
            } catch (error) {
                log(`Connection error: ${error.message}`, 'error');
            }
        }
        
        async function testInitialization() {
            log('Testing SOAR initialization...', 'info');
            
            if (!window.soarEnhanced) {
                log('Creating SOAR instance...', 'info');
                window.soarEnhanced = new SoarAnalysisEnhanced();
            }
            
            try {
                await window.soarEnhanced.initialize();
                log('SOAR system initialized successfully', 'success');
                updateSystemStatus();
            } catch (error) {
                log(`Initialization failed: ${error.message}`, 'error');
            }
        }
        
        async function testSimulation() {
            log('Starting test simulation...', 'info');
            
            if (!window.soarEnhanced) {
                log('SOAR system not initialized', 'error');
                return;
            }
            
            const testData = {
                incidentId: `TEST-${Date.now()}`,
                threatType: 'Test Threat',
                description: 'This is a test simulation from the test page',
                affectedAssets: ['test-server-1', 'test-database-1'],
                detectedSource: 'Test Dashboard',
                severity: 'MEDIUM',
                organizationId: 'test_org',
                userQuery: 'Test simulation query',
                metadata: {
                    source: 'Test Page',
                    timestamp: new Date().toISOString()
                }
            };
            
            try {
                const response = await fetch('/api/soar/simulation/start', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(testData)
                });
                
                if (response.ok) {
                    const data = await response.json();
                    log(`Simulation started: ${JSON.stringify(data)}`, 'success');
                    
                    if (data.sessionId) {
                        document.getElementById('currentSessionId').textContent = data.sessionId;
                    }
                } else {
                    const error = await response.text();
                    log(`Simulation failed: ${error}`, 'error');
                }
            } catch (error) {
                log(`Simulation error: ${error.message}`, 'error');
            }
        }
        
        function testWebSocket() {
            log('Testing WebSocket connection...', 'info');
            
            if (!window.soarEnhanced?.websocket) {
                log('WebSocket client not available', 'error');
                return;
            }
            
            const ws = window.soarEnhanced.websocket;
            
            if (ws.isConnected()) {
                log('WebSocket already connected', 'success');
                ws.send('/app/test', { 
                    message: 'Test message from test page',
                    timestamp: new Date().toISOString()
                });
                log('Test message sent', 'info');
            } else {
                log('Connecting WebSocket...', 'info');
                ws.connect().then(() => {
                    log('WebSocket connected successfully', 'success');
                    updateSystemStatus();
                }).catch(err => {
                    log(`WebSocket connection failed: ${err.message}`, 'error');
                });
            }
        }
        
        async function testMCPStatus() {
            log('Testing MCP server status...', 'info');
            
            try {
                const response = await fetch('/api/soar/simulation/mcp-status');
                if (response.ok) {
                    const data = await response.json();
                    log('MCP Status retrieved', 'success');
                    
                    Object.entries(data).forEach(([server, status]) => {
                        log(`${server}: ${status}`, status === 'connected' ? 'success' : 'warning');
                    });
                } else {
                    log(`MCP status request failed: ${response.status}`, 'error');
                }
            } catch (error) {
                log(`MCP status error: ${error.message}`, 'error');
            }
        }
        
        // Update system status
        function updateSystemStatus() {
            // WebSocket status
            if (window.soarEnhanced?.websocket?.isConnected()) {
                document.getElementById('wsStatus').textContent = 'Connected';
                document.getElementById('wsStatusIndicator').className = 'status-indicator status-connected';
            } else {
                document.getElementById('wsStatus').textContent = 'Disconnected';
                document.getElementById('wsStatusIndicator').className = 'status-indicator status-disconnected';
            }
            
            // SOAR status
            if (window.soarEnhanced) {
                document.getElementById('soarStatus').textContent = 'Initialized';
                document.getElementById('soarStatusIndicator').className = 'status-indicator status-connected';
            } else {
                document.getElementById('soarStatus').textContent = 'Not Initialized';
                document.getElementById('soarStatusIndicator').className = 'status-indicator status-disconnected';
            }
        }
        
        // Setup WebSocket message logging
        function setupWebSocketLogging() {
            if (window.soarEnhanced?.websocket) {
                const ws = window.soarEnhanced.websocket;
                
                // Log all WebSocket events
                ws.on('connected', () => {
                    wsLog('WebSocket connected', 'success');
                    updateSystemStatus();
                });
                
                ws.on('disconnected', () => {
                    wsLog('WebSocket disconnected', 'warning');
                    updateSystemStatus();
                });
                
                ws.on('error', (data) => {
                    wsLog(`WebSocket error: ${data.error}`, 'error');
                });
                
                // Log messages from specific topics
                ws.on('sessions', (data) => {
                    wsLog(`Session update: ${JSON.stringify(data)}`, 'info');
                });
                
                ws.on('pipeline', (data) => {
                    wsLog(`Pipeline update: ${JSON.stringify(data)}`, 'info');
                });
                
                ws.on('tools', (data) => {
                    wsLog(`Tool update: ${JSON.stringify(data)}`, 'info');
                });
                
                ws.on('approvals', (data) => {
                    wsLog(`Approval request: ${JSON.stringify(data)}`, 'warning');
                });
            }
        }
        
        // Initialize on page load
        window.addEventListener('DOMContentLoaded', function() {
            log('Test page initialized', 'info');
            
            // Check components
            checkComponents();
            
            // Update status
            updateSystemStatus();
            
            // Setup WebSocket logging if available
            setTimeout(() => {
                setupWebSocketLogging();
                checkComponents();
                updateSystemStatus();
            }, 1000);
            
            // Auto-check every 5 seconds
            setInterval(() => {
                checkComponents();
                updateSystemStatus();
            }, 5000);
        });
    </script>
</body>
</html>
