<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>WebSocket 승인 시스템 통합 테스트</title>
    <style>
        body{background:#0f172a;color:#e2e8f0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;padding:2rem;line-height:1.6}
        .container{max-width:1200px;margin:0 auto}
        h1{color:#f97316;border-bottom:2px solid #334155;padding-bottom:1rem;margin-bottom:2rem}
        .test-section{background:rgba(30,41,59,.5);border:1px solid rgba(71,85,105,.3);border-radius:.75rem;padding:1.5rem;margin-bottom:1.5rem}
        .test-button{background:linear-gradient(135deg,#3b82f6 0%,#1e40af 100%);color:#fff;border:none;padding:.75rem 1.5rem;border-radius:.5rem;cursor:pointer;font-size:1rem;margin:.5rem;transition:all .3s ease}
        .test-button:hover{transform:translateY(-2px);box-shadow:0 10px 20px rgba(59,130,246,.3)}
        .log-container{background:rgba(15,23,42,.8);border:1px solid rgba(71,85,105,.3);border-radius:.5rem;padding:1rem;height:400px;overflow-y:auto;font-family:'Courier New',monospace;font-size:.85rem}
        .log-entry{padding:.25rem;border-bottom:1px solid rgba(71,85,105,.2);white-space:pre-wrap;word-break:break-word}
        .log-success{color:#4ade80}.log-error{color:#f87171}.log-warning{color:#fbbf24}.log-info{color:#60a5fa}.log-modal{color:#c084fc}
        .status-indicator{display:inline-flex;align-items:center;gap:.5rem;padding:.5rem 1rem;border-radius:.5rem;font-weight:500}
        .status-connected{background:rgba(34,197,94,.2);color:#4ade80}
        .status-disconnected{background:rgba(239,68,68,.2);color:#f87171}
        .small{opacity:.8;font-size:.8em}
    </style>
</head>
<body>
<div class="container">
    <h1>🔬 WebSocket 승인 시스템 통합 테스트</h1>

    <div class="test-section">
        <h2>연결 상태</h2>
        <div id="connectionStatus" class="status-indicator status-disconnected">
            <span>⚫</span>
            <span>연결 안됨</span>
        </div>
    </div>

    <div class="test-section">
        <h2>테스트 컨트롤</h2>
        <button class="test-button" onclick="runFullTest()">🚀 전체 시스템 테스트</button>
        <button class="test-button" onclick="testWebSocketConnection()">1️⃣ WebSocket 연결</button>
        <button class="test-button" onclick="testDirectModal()">2️⃣ 직접 모달 표시</button>
        <button class="test-button" onclick="testAPITrigger()">3️⃣ API 트리거 테스트</button>
        <button class="test-button" onclick="testSimpleBroadcast()">4️⃣ 간단한 브로드캐스트</button>
        <button class="test-button" onclick="testPingPong()">5️⃣ Ping-Pong 테스트</button>
        <button class="test-button" onclick="clearLogs()">🗑️ 로그 지우기</button>
    </div>

    <div class="test-section">
        <h2>테스트 로그</h2>
        <div id="logContainer" class="log-container"></div>
    </div>
</div>

<!-- 라이브러리 -->
<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>

<!-- 앱 스크립트 -->
<script src="/js/soar/soar-websocket-enhanced.js"></script>
<script src="/js/soar/soar-approval-modal.js"></script>
<script src="/js/soar/soar-approval-handler.js"></script>

<script>
    /** =========================
     *  공통 로깅 & 유틸 (강화)
     *  ========================= */
    let websocket = null;
    let stompClient = null;
    let approvalModal = null;
    let approvalHandler = null;
    let testResults = [];
    window.__soarSessionId = null;
    window.__sessionQuery = '';

    const SUB_MAP = new Map();      // destination -> subId
    const SUB_ID_MAP = new Map();   // subId -> destination
    const PENDING_RECEIPTS = new Set();

    function ts() {
        return new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit',second:'2-digit',fractionalSecondDigits:3});
    }
    function addLog(message, type='info') {
        const el = document.createElement('div');
        el.className = `log-entry log-${type}`;
        el.textContent = `[${ts()}] ${message}`;
        const box = document.getElementById('logContainer');
        box.appendChild(el);
        box.scrollTop = box.scrollHeight;
    }
    function addLogBlock(title, obj, type='info') {
        const el = document.createElement('div');
        el.className = `log-entry log-${type}`;
        el.innerHTML = `[${ts()}] ${title}\n<pre class="small">${escapeHtml(pretty(obj))}</pre>`;
        const box = document.getElementById('logContainer');
        box.appendChild(el);
        box.scrollTop = box.scrollHeight;
    }
    function clearLogs() {
        document.getElementById('logContainer').innerHTML = '';
        addLog('로그가 초기화되었습니다','info');
    }
    function setConnectedUI(connected) {
        const el = document.getElementById('connectionStatus');
        if (connected) { el.className='status-indicator status-connected'; el.innerHTML='<span>🟢</span><span>연결됨</span>'; }
        else { el.className='status-indicator status-disconnected'; el.innerHTML='<span>⚫</span><span>연결 안됨</span>'; }
    }
    function isConnected() { return !!(stompClient && stompClient.connected); }
    const delay = (ms)=>new Promise(r=>setTimeout(r,ms));
    function pretty(v){ try{ return typeof v==='string'?v:JSON.stringify(v,null,2);}catch{ return String(v);} }
    function escapeHtml(s){ return String(s).replace(/[&<>"']/g, m=>({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[m])); }

    // 전역 에러 훅: 텍스트 로그로 즉시 표출
    window.onerror = function(message, source, lineno, colno, error) {
        logError('window.onerror', error || message, { source, lineno, colno });
    };
    window.onunhandledrejection = function(e) {
        logError('unhandledrejection', e.reason || e, null);
    };

    // 에러 표준화 로거
    function logError(context, err, extra) {
        const info = { context };
        try {
            if (err && typeof err === 'object') {
                info.name = err.name || undefined;
                info.message = err.message || (err.toString?.() ?? String(err));
                if (err.stack) info.stack = err.stack;
                if ('status' in err && 'statusText' in err) { // Response 같은 것
                    info.http = { status: err.status, statusText: err.statusText };
                }
                if (err.cause) info.cause = err.cause;
            } else {
                info.message = typeof err === 'string' ? err : pretty(err);
            }
            if (extra) info.extra = extra;
        } catch {}
        addLogBlock('실패 상세', info, 'error');
    }
    // STOMP 상태 덤프
    function dumpStompState(tag='상태 덤프') {
        const subs = [];
        for (const [dest, id] of SUB_MAP.entries()) subs.push({ destination: dest, id });
        addLogBlock(`🔎 STOMP ${tag}`, {
            connected: !!(stompClient && stompClient.connected),
            subscriptions: subs,
            pendingReceipts: Array.from(PENDING_RECEIPTS)
        }, 'warning');
    }

    /** =========================
     *  SUBSCRIBE 래핑 (목적지 추적)
     *  ========================= */
    function wrapSubscribeOnce(client){
        if (client.__wrappedSubscribe) return;
        const originalSubscribe = client.subscribe.bind(client);
        client.subscribe = function(destination, callback, headers={}) {
            // id가 없으면 생성
            if (!headers.id) headers.id = `sub-${Math.random().toString(36).slice(2)}`;
            const sub = originalSubscribe(destination, function(frame){
                callback(frame);
            }, headers);
            SUB_MAP.set(destination, headers.id);
            SUB_ID_MAP.set(headers.id, destination);
            addLog(`📡 STOMP 구독 완료: ${destination} (id=${headers.id})`,'success');
            return sub;
        };
        client.__wrappedSubscribe = true;
    }

    /** =========================
     *  RECEIPT 지원 구독 도우미
     *  ========================= */
    async function subscribeWithReceipt(client, destination, callback, timeoutMs=3000) {
        return new Promise((resolve, reject) => {
            try {
                const receiptId = `rcpt-${Date.now()}-${Math.random().toString(36).slice(2)}`;
                const subId     = `sub-${Math.random().toString(36).slice(2)}`;
                const prevOnReceipt = client.onreceipt;
                const headers = { id: subId, ack: 'auto', receipt: receiptId };
                PENDING_RECEIPTS.add(receiptId);

                client.onreceipt = (frame) => {
                    try {
                        const rid = frame?.headers?.['receipt-id'];
                        if (rid === receiptId) {
                            PENDING_RECEIPTS.delete(receiptId);
                            addLog(`SUBSCRIBE 확정: ${destination} (receipt=${rid})`, 'success');
                            resolve(subscription);
                        }
                    } finally {
                        if (prevOnReceipt) { try { prevOnReceipt(frame); } catch {} }
                    }
                };
                const subscription = client.subscribe(destination, callback, headers);
                SUB_MAP.set(destination, subId);
                SUB_ID_MAP.set(subId, destination);

                const t = setTimeout(() => {
                    client.onreceipt = prevOnReceipt || null;
                    const hint = [
                        '• destination 오탈자 또는 서버 전송 경로 불일치(/user/queue vs /topic)',
                        '• 브로커 지연/해제 타이밍',
                        '• 서버 컨트롤러 convertAndSendToUser 목적지 확인 필요'
                    ].join('\n');
                    dumpStompState('SUBSCRIBE receipt timeout');
                    reject(new Error(`SUBSCRIBE receipt timeout for ${destination}\n가능한 원인:\n${hint}`));
                }, timeoutMs);

                // resolve/ reject 시 타이머 정리
                const _resolve = resolve;
                resolve = (...args)=>{ clearTimeout(t); _resolve(...args); };

                const _reject = reject;
                reject = (err)=>{ clearTimeout(t); _reject(err); };

            } catch (e) {
                reject(e);
            }
        });
    }

    /** =========================
     *  연결 및 테스트 시나리오
     *  ========================= */
    function testWebSocketConnection() {
        addLog('=== WebSocket 연결 테스트 시작 ===','info');
        return new Promise((resolve,reject)=>{
            try{
                approvalModal = new SoarApprovalModal();
                approvalHandler = new SoarApprovalHandler();

                websocket = new EnhancedWebSocketClient('/ws-soar');
                approvalHandler.initialize(websocket, approvalModal);
                addLog('승인 시스템 초기화 완료','success');

                websocket.onConnect = () => {
                    try {
                        stompClient = websocket.stompClient;
                        if (!stompClient) throw new Error('stompClient 생성 실패');

                        // STOMP 디버그
                        stompClient.debug = (s) => {
                            if (typeof s === 'string') addLog(`[STOMP] ${s.trim()}`,'info');
                        };
                        wrapSubscribeOnce(stompClient);

                        addLog('WebSocket 연결 성공','success');
                        setConnectedUI(true);

                        // 고정 구독 (요청-응답 큐)
                        stompClient.subscribe('/user/queue/test/pong', (msg)=>{
                            addLog(`🏓 /user/queue/test/pong 수신: ${msg.body}`,'success');
                        });
                        // 브로드캐스트
                        stompClient.subscribe('/topic/test', (msg)=>{
                            addLog(`/topic/test 수신: ${msg.body}`,'success');
                        });

                        // 세션 등록 (@SubscribeMapping)
                        stompClient.subscribe('/app/soar/approvals', (message)=>{
                            addLog(`📡 [/app/soar/approvals] 초기 응답: ${message.body}`,'info');
                            try {
                                const data = JSON.parse(message.body);
                                if (data.sessionId) {
                                    window.__soarSessionId = data.sessionId;
                                    window.__sessionQuery  = `&sessionId=${encodeURIComponent(data.sessionId)}`;
                                    addLog(`🔐 세션 ID 저장 완료: ${data.sessionId}`,'success');
                                }
                            } catch (e) {
                                logError('세션 파싱 오류', e, { body: message?.body });
                            }
                        });

                        resolve(true);
                    } catch (e) {
                        logError('onConnect 처리 실패', e);
                        reject(e);
                    }
                };

                websocket.on('error', (e)=> logError('WebSocket 오류', e));
                websocket.connect().catch(err => { logError('WebSocket 연결 실패', err); setConnectedUI(false); reject(err); });

            } catch (e) {
                logError('WebSocket 초기화 실패', e);
                setConnectedUI(false);
                reject(e);
            }
        });
    }

    async function testDirectModal() {
        addLog('=== 직접 모달 표시 테스트 ===','info');
        if (!approvalModal) { addLog('모달이 초기화되지 않음','error'); return false; }
        const req = { approvalId:'DIRECT-TEST-'+Date.now(), toolName:'직접 테스트 도구', description:'직접 모달 표시 테스트', riskLevel:'MEDIUM' };
        try{
            const p = approvalModal.show(req);
            setTimeout(()=>{
                const overlay = document.querySelector('.soar-approval-modal-overlay');
                if (overlay) {
                    addLog('직접 모달 표시 성공','success');
                    const ok = overlay.querySelector('.soar-approval-btn-approve');
                    if (ok) { ok.click(); addLog('모달 자동 승인 처리','success'); }
                } else {
                    addLog('직접 모달 표시 실패: overlay를 찾을 수 없음','error');
                }
            }, 500);
            await p.catch(()=>{});
            return true;
        } catch (e) {
            logError('직접 모달 표시 실패', e);
            return false;
        }
    }

    async function testAPITrigger() {
        addLog('=== API 트리거 테스트 시작 ===','info');
        if (!isConnected()) { addLog('WebSocket 미연결','error'); dumpStompState('API 직전 상태'); return; }

        const approvalId = `TEST-${Date.now()}-${Math.random().toString(16).slice(2)}`;
        const resultTopic = `/topic/soar/approval-results/${approvalId}`;
        addLog(`🆔 approvalId=${approvalId}`,'info');

        let sub;
        try {
            // Receipt 확인 없이 직접 구독 (동적 토픽에 대한 STOMP receipt 문제 해결)
            sub = stompClient.subscribe(resultTopic, (frame)=>{
                addLog(`✨ 결과 수신(${resultTopic}): ${frame.body}`,'success');
                received = true; // 수신 플래그 설정
            });
            addLog(`📡 토픽 구독 완료: ${resultTopic}`, 'success');
        } catch (e) {
            logError('결과 토픽 구독 실패', e, { resultTopic });
            return;
        }

        const qs = `riskLevel=HIGH&approvalId=${encodeURIComponent(approvalId)}${window.__sessionQuery||''}`;
        addLog(`📤 API 호출: /api/test/websocket/trigger-approval?${qs}`,'info');
        try {
            const resp = await fetch(`/api/test/websocket/trigger-approval?${qs}`, { method:'POST' });
            if (!resp.ok) {
                const text = await safeText(resp);
                logError('API 응답 오류', { status: resp.status, statusText: resp.statusText, body: text }, { url: resp.url });
            } else {
                const data = await resp.json().catch(()=>({raw:'<json parse fail>'}));
                addLogBlock('API 응답', data, 'info');
            }
        } catch (e) {
            logError('API 호출 실패', e);
        }

        // 5초 내 미수신 시 상세 원인 힌트
        let received = false;
        const checker = setTimeout(()=>{
            if (!received) {
                dumpStompState('API 결과 미수신');
                addLog([
                    '5초 내 결과 미수신. 가능한 원인:',
                    '• 서버가 /topic/soar/approval-results/{id} 가 아닌 다른 경로로 전송',
                    '• /user/queue 기반 라우팅을 쓰지 않아 대상 불일치',
                    '• approvalId 미일치',
                ].join('\n'),'error');
            }
            try { sub.unsubscribe(); } catch {}
        }, 5000);

        async function safeText(resp){ try { return await resp.text(); } catch { return '<no-body>'; } }
    }

    async function testSimpleBroadcast() {
        addLog('=== 간단 브로드캐스트 테스트 시작 ===','info');
        if (!isConnected()) { addLog('WebSocket 미연결','error'); dumpStompState('브로드캐스트 직전'); return; }
        const payload = { message:'Broadcast probe', timestamp:new Date().toISOString() };
        try{
            stompClient.send('/app/test/ping', {'content-type':'application/json'}, JSON.stringify(payload));
            addLog(`📤 /app/test/ping 전송(브로드캐스트 유도): ${JSON.stringify(payload)}`,'info');
            // 3초 내 /topic/test 수신 없으면 상세 덤프
            let got = false;
            const dest = '/topic/test';
            const guard = setTimeout(()=>{
                if (!got) {
                    dumpStompState('브로드캐스트 미수신');
                    addLog([
                        `3초 내 미수신: ${dest}`,
                        '가능한 원인:',
                        '• 서버 컨트롤러가 /topic/test 로 브로드캐스트를 전송하지 않음',
                        '• 다른 목적지로 전송(/user/queue/...) 또는 오탈자',
                        '• 구독 해제/중복 컨피그 문제'
                    ].join('\n'),'error');
                }
            }, 3000);
            // 구독 콜백 감시: 이미 고정 구독되어 있으므로 SUB_ID_MAP에서 목적지 찾아서 감시
            // 간단히 전역 listener 훅 없이 성공 로그가 들어오면 got=true 처리(아래 subscribe 콜백에서 이미 success 로깅함)
            const origAddLog = addLog;
            addLog = function(msg, type) {
                if (typeof msg === 'string' && msg.includes('/topic/test 수신')) { got = true; clearTimeout(guard); }
                return origAddLog(msg, type);
            };
            setTimeout(()=>{ addLog = origAddLog; }, 4000);
        } catch (e) {
            logError('브로드캐스트 전송 실패', e, { destination:'/app/test/ping', payload });
        }
    }

    async function testPingPong() {
        addLog('=== Ping-Pong 테스트 시작 ===','info');
        if (!isConnected()) { addLog('WebSocket 미연결','error'); dumpStompState('Ping 직전'); return; }
        const payload = { message:'Hello from client', timestamp:new Date().toISOString() };
        try{
            stompClient.send('/app/test/ping', {'content-type':'application/json'}, JSON.stringify(payload));
            addLog(`🏓 PING 전송: ${JSON.stringify(payload)}`,'info');

            // 3초 내 /user/queue/test/pong 수신 확인
            let got = false;
            const guard = setTimeout(()=>{
                if (!got) {
                    dumpStompState('PONG 미수신');
                    addLog([
                        '3초 내 PONG 미수신 (/user/queue/test/pong)',
                        '가능한 원인:',
                        '• 서버 전송 목적지가 /queue/test/pong 이 아님(오탈자/누락)',
                        '• Handshake Principal 미적용 → /user 라우팅 불가',
                        '• 로드밸런서 세션 고정/ SockJS 세션 유지 문제'
                    ].join('\n'),'error');
                }
            }, 3000);

            // 성공 콜백 감시(고정 구독의 로깅을 후킹)
            const origAddLog = addLog;
            addLog = function(msg, type) {
                if (typeof msg === 'string' && msg.includes('/user/queue/test/pong 수신')) {
                    got = true; clearTimeout(guard);
                }
                return origAddLog(msg, type);
            };
            setTimeout(()=>{ addLog = origAddLog; }, 4000);

        } catch (e) {
            logError('PING 전송 실패', e, { destination:'/app/test/ping', payload });
        }
    }

    async function runFullTest() {
        addLog('🚀 전체 시스템 테스트 시작','info');
        testResults = [];
        try {
            await testWebSocketConnection();
            await delay(600);
            await testDirectModal();
            await delay(600);
            await testAPITrigger();
            await delay(1500);
            await testSimpleBroadcast();
            await delay(600);
            await testPingPong();
            addLog('=== 끝 ===','info');
        } catch (e) {
            logError('전체 테스트 실패', e);
        }
    }

    /** =========================
     *  부가: 초기 안내
     *  ========================= */
    window.addEventListener('DOMContentLoaded', () => {
        addLog('테스트 페이지 준비 완료','info');
        addLog('🚀 버튼을 클릭하여 테스트를 실행하세요','info');
    });
</script>
</body>
</html>
