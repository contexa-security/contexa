<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>재인증 필요 - AI3Security</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" th:href="@{/css/session-threat-monitor.css}">

    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .step-up-container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 500px;
            width: 100%;
        }

        .warning-badge {
            background: #fff3cd;
            border: 2px solid #ffc107;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 25px;
        }

        .warning-badge i {
            color: #ffc107;
            font-size: 2rem;
        }

        .countdown-display {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 10px 15px;
            text-align: center;
            margin-bottom: 20px;
        }

        .countdown-display .time-remaining {
            font-size: 1.5rem;
            font-weight: bold;
            color: #dc3545;
        }

        .threat-info {
            background: #f8f9fa;
            border-left: 4px solid #ffc107;
            padding: 10px 15px;
            margin-bottom: 20px;
        }

        .form-floating label {
            color: #6c757d;
        }

        .btn-step-up {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            padding: 12px;
            font-weight: 600;
            transition: transform 0.2s;
        }

        .btn-step-up:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }
    </style>
</head>
<body>
    <div class="step-up-container">
        <!-- 경고 배지 -->
        <div class="warning-badge">
            <div class="d-flex align-items-center">
                <i class="fas fa-exclamation-triangle me-3"></i>
                <div>
                    <h5 class="mb-1">재인증이 필요합니다</h5>
                    <p class="mb-0 text-muted">비정상적인 활동이 감지되어 보안을 위해 재인증이 필요합니다.</p>
                </div>
            </div>
        </div>

        <!-- 남은 시간 표시 -->
        <div class="countdown-display" th:if="${remainingTime}">
            <div>재인증 남은 시간</div>
            <div class="time-remaining">
                <span th:text="${remainingMinutes}">5</span>분
                <span th:text="${remainingTime % 60}">0</span>초
            </div>
        </div>

        <!-- 위협 정보 -->
        <div class="threat-info" th:if="${threatScore}">
            <small class="text-muted">
                <i class="fas fa-info-circle"></i>
                위협 점수: <span th:text="${threatScore}">0.75</span>
            </small>
        </div>

        <!-- 에러 메시지 -->
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <i class="fas fa-exclamation-circle"></i>
            <span th:text="${error}">오류 메시지</span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <!-- 성공 메시지 -->
        <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
            <i class="fas fa-check-circle"></i>
            <span th:text="${success}">성공 메시지</span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <!-- 재인증 폼 -->
        <form th:action="@{/auth/step-up}" method="post">
            <h4 class="mb-4 text-center">
                <i class="fas fa-user-shield"></i>
                본인 확인
            </h4>

            <div class="mb-3">
                <label class="form-label">사용자명</label>
                <input type="text" class="form-control" th:value="${username}" readonly>
            </div>

            <div class="form-floating mb-4">
                <input type="password" class="form-control" id="password" name="password"
                       placeholder="비밀번호" required autofocus>
                <label for="password">비밀번호를 입력하세요</label>
            </div>

            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

            <button type="submit" class="btn btn-step-up w-100 mb-3">
                <i class="fas fa-shield-alt"></i> 재인증하기
            </button>

            <div class="text-center">
                <a href="/logout" class="text-danger">
                    <i class="fas fa-sign-out-alt"></i> 로그아웃
                </a>
            </div>
        </form>

        <!-- 도움말 -->
        <div class="mt-4 p-3 bg-light rounded">
            <h6><i class="fas fa-question-circle"></i> 왜 재인증이 필요한가요?</h6>
            <small class="text-muted">
                귀하의 계정에서 평소와 다른 활동 패턴이 감지되었습니다.
                이는 계정 보안을 위한 예방 조치이며, 재인증을 완료하시면
                정상적으로 서비스를 계속 이용하실 수 있습니다.
            </small>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- 카운트다운 스크립트 -->
    <script th:if="${remainingTime}">
        let remainingSeconds = [[${remainingTime}]];

        function updateCountdown() {
            const minutes = Math.floor(remainingSeconds / 60);
            const seconds = remainingSeconds % 60;

            const display = document.querySelector('.time-remaining');
            if (display) {
                display.innerHTML = `${minutes}분 ${seconds}초`;
            }

            if (remainingSeconds <= 0) {
                window.location.href = '/logout';
            }

            remainingSeconds--;
        }

        setInterval(updateCountdown, 1000);
    </script>
</body>
</html>
