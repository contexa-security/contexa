<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head th:replace="~{fragments/common-head :: head-elements(pageTitle=#{zerotrust.pending.page.title})}"></head>
<body class="flex flex-col min-h-screen font-sans" style="background: #050810;">

<div class="flex items-center justify-center min-h-screen p-4">
    <div id="pending-container" class="w-full max-w-lg p-8 rounded-xl text-center"
         style="background: rgba(15, 23, 42, 0.8); border: 1px solid rgba(71, 85, 105, 0.3);"
         th:data-return-url="${returnUrl}">
        <div class="mb-6">
            <div id="spinner" class="mx-auto w-16 h-16 border-4 rounded-full animate-spin"
                 style="border-color: #334155; border-top-color: #6366f1;"></div>
        </div>
        <h1 class="text-2xl font-bold mb-3" style="color: #e2e8f0;" th:text="#{zerotrust.pending.title}">Security Analysis in Progress</h1>
        <p class="mb-6" style="color: #94a3b8;"
           th:utext="#{zerotrust.pending.desc}"></p>

        <div id="analysis-steps" class="text-left mb-6" style="color: #94a3b8;">
            <div id="step-layer1" class="flex items-center mb-3 p-3 rounded-lg"
                 style="background: rgba(15, 23, 42, 0.6);">
                <span id="step-layer1-icon" class="mr-3 text-lg" style="color: #475569;">&#9679;</span>
                <span th:text="#{zerotrust.pending.step.layer1}">Layer 1 Analysis</span>
            </div>
            <div id="step-layer2" class="flex items-center mb-3 p-3 rounded-lg"
                 style="background: rgba(15, 23, 42, 0.6);">
                <span id="step-layer2-icon" class="mr-3 text-lg" style="color: #475569;">&#9679;</span>
                <span th:text="#{zerotrust.pending.step.layer2}">Layer 2 Analysis</span>
            </div>
            <div id="step-decision" class="flex items-center p-3 rounded-lg"
                 style="background: rgba(15, 23, 42, 0.6);">
                <span id="step-decision-icon" class="mr-3 text-lg" style="color: #475569;">&#9679;</span>
                <span th:text="#{zerotrust.pending.step.decision}">Final Decision</span>
            </div>
        </div>

        <div id="sse-status" class="text-xs" style="color: #475569;">
            <span id="sse-indicator" style="color: #475569;">&#9679;</span>
            <span id="sse-text" th:text="#{zerotrust.pending.sse.waiting}">Waiting for connection</span>
        </div>

        <div id="error-message" class="hidden mt-4 p-3 rounded-lg text-sm"
             style="background: rgba(239, 68, 68, 0.1); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.3);">
        </div>
    </div>
</div>

<script th:src="@{/js/zero-trust/analysis-pending.js}"></script>
</body>
</html>
