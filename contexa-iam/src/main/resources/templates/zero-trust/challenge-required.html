<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head th:replace="~{fragments/common-head :: head-elements(pageTitle='추가 인증 필요')}"></head>
<body class="flex flex-col min-h-screen font-sans" style="background: #050810;">

<div class="flex items-center justify-center min-h-screen p-4">
    <div class="w-full max-w-lg p-8 rounded-xl text-center"
         style="background: rgba(15, 23, 42, 0.8); border: 1px solid rgba(71, 85, 105, 0.3);">
        <div class="mb-6">
            <svg class="mx-auto w-16 h-16" fill="none" stroke="#6366f1" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
            </svg>
        </div>
        <h1 class="text-2xl font-bold mb-3" style="color: #e2e8f0;">추가 인증이 필요합니다</h1>
        <p class="mb-8" style="color: #94a3b8;">
            보안 정책에 따라 본인 확인을 위한<br/>
            추가 인증(MFA)이 필요합니다.
        </p>

        <a th:href="${mfaUrl}"
           class="inline-block w-full py-3 px-6 rounded-lg text-sm font-semibold transition-all duration-300"
           style="background: rgba(99, 102, 241, 0.2); color: #818cf8; border: 1px solid rgba(99, 102, 241, 0.3);">
            MFA 인증 진행
        </a>
    </div>
</div>

</body>
</html>
