<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Password Change</title>
    <link href="/css/main.css" rel="stylesheet" />
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            background: rgba(15, 23, 42, 0.95);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        .content {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .card {
            width: 100%;
            max-width: 500px;
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(71, 85, 105, 0.3);
            padding: 2.5rem;
            border-radius: 1rem;
            box-shadow: 0 20px 40px -12px rgba(0, 0, 0, 0.5);
        }

        .card-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .card-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: linear-gradient(135deg, #6366f1, #818cf8);
            margin-bottom: 1rem;
        }

        .card-icon svg {
            width: 28px;
            height: 28px;
            fill: white;
        }

        .card-title {
            font-size: 1.75rem;
            font-weight: bold;
            background: linear-gradient(135deg, #6366f1, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin: 0 0 0.5rem 0;
        }

        .card-subtitle {
            color: #94a3b8;
            font-size: 0.875rem;
            margin: 0;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            color: #cbd5e1;
            margin-bottom: 0.5rem;
        }

        .form-input {
            display: block;
            width: 100%;
            padding: 0.75rem 1rem;
            background: rgba(30, 41, 59, 0.6);
            border: 2px solid rgba(71, 85, 105, 0.5);
            border-radius: 0.5rem;
            color: #e2e8f0;
            font-size: 0.875rem;
            transition: all 0.3s;
            -webkit-appearance: none;
            appearance: none;
        }

        .form-input:focus {
            outline: none;
            border-color: #6366f1;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
            background: rgba(30, 41, 59, 0.8);
        }

        .form-input::placeholder {
            color: #64748b;
        }

        input:-webkit-autofill,
        input:-webkit-autofill:hover,
        input:-webkit-autofill:focus {
            -webkit-box-shadow: 0 0 0 1000px rgba(30, 41, 59, 0.9) inset !important;
            -webkit-text-fill-color: #e2e8f0 !important;
        }

        .policy-section {
            margin: 1.5rem 0;
            padding: 1rem 1.25rem;
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid rgba(71, 85, 105, 0.3);
            border-radius: 0.75rem;
        }

        .policy-title {
            font-size: 0.8rem;
            font-weight: 600;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin: 0 0 0.75rem 0;
        }

        .policy-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .policy-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.35rem 0;
            font-size: 0.8rem;
            color: #94a3b8;
            transition: color 0.2s;
        }

        .policy-item .icon {
            flex-shrink: 0;
            width: 16px;
            height: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: bold;
        }

        .policy-item.pass {
            color: #4ade80;
        }

        .policy-item.pass .icon {
            color: #4ade80;
        }

        .policy-item.fail .icon {
            color: #f87171;
        }

        .btn-submit {
            width: 100%;
            padding: 0.75rem 1rem;
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            color: white;
            border: none;
            border-radius: 0.5rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
            transition: all 0.3s ease;
            margin-top: 0.5rem;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.6);
        }

        .btn-submit:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .alert {
            padding: 0.75rem 1rem;
            border-radius: 0.5rem;
            font-size: 0.875rem;
            margin-bottom: 1.25rem;
        }

        .alert-error {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
        }

        .alert-success {
            background: rgba(34, 197, 94, 0.15);
            border: 1px solid rgba(34, 197, 94, 0.3);
            color: #86efac;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 1.5rem;
            color: #818cf8;
            font-size: 0.875rem;
            text-decoration: none;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: #a5b4fc;
            text-decoration: underline;
        }
    </style>
</head>
<body>
<div class="content">
    <div class="card">
        <div class="card-header">
            <div class="card-icon">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                    <path d="M12 1C8.676 1 6 3.676 6 7v2H4a1 1 0 0 0-1 1v10a1 1 0 0 0 1 1h16a1 1 0 0 0 1-1V10a1 1 0 0 0-1-1h-2V7c0-3.324-2.676-6-6-6zm0 2c2.276 0 4 1.724 4 4v2H8V7c0-2.276 1.724-4 4-4zm0 10a2 2 0 0 1 1 3.732V18a1 1 0 1 1-2 0v-1.268A2 2 0 0 1 12 13z"/>
                </svg>
            </div>
            <h2 class="card-title">비밀번호 변경</h2>
            <p class="card-subtitle">비밀번호가 만료되었습니다. 새 비밀번호를 설정해 주세요.</p>
        </div>

        <!-- Flash messages -->
        <div th:if="${errorMessage}" class="alert alert-error" th:text="${errorMessage}"></div>
        <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>

        <form th:action="@{/password-change}" method="post">
            <input type="hidden" name="username" th:value="${username}" />

            <div class="form-group">
                <label for="currentPassword" class="form-label">현재 비밀번호</label>
                <input type="password" id="currentPassword" name="currentPassword"
                       class="form-input" placeholder="현재 비밀번호를 입력하세요" required autofocus />
            </div>

            <div class="form-group">
                <label for="newPassword" class="form-label">새 비밀번호</label>
                <input type="password" id="newPassword" name="newPassword"
                       class="form-input" placeholder="새 비밀번호를 입력하세요" required />
            </div>

            <div class="form-group">
                <label for="confirmPassword" class="form-label">새 비밀번호 확인</label>
                <input type="password" id="confirmPassword" name="confirmPassword"
                       class="form-input" placeholder="새 비밀번호를 다시 입력하세요" required />
            </div>

            <!-- Policy requirements checklist -->
            <div class="policy-section" th:object="${policy}">
                <p class="policy-title">비밀번호 정책 요구사항</p>
                <ul class="policy-list">
                    <li class="policy-item" id="rule-minLength">
                        <span class="icon">-</span>
                        <span>최소 <span th:text="${policy.minLength}">8</span>자 이상</span>
                    </li>
                    <li class="policy-item" id="rule-uppercase" th:if="${policy.requireUppercase}">
                        <span class="icon">-</span>
                        <span>대문자(A-Z) 포함</span>
                    </li>
                    <li class="policy-item" id="rule-lowercase" th:if="${policy.requireLowercase}">
                        <span class="icon">-</span>
                        <span>소문자(a-z) 포함</span>
                    </li>
                    <li class="policy-item" id="rule-digit" th:if="${policy.requireDigit}">
                        <span class="icon">-</span>
                        <span>숫자(0-9) 포함</span>
                    </li>
                    <li class="policy-item" id="rule-special" th:if="${policy.requireSpecialChar}">
                        <span class="icon">-</span>
                        <span>특수문자(!@#$%^&* 등) 포함</span>
                    </li>
                    <li class="policy-item" id="rule-match">
                        <span class="icon">-</span>
                        <span>비밀번호 확인 일치</span>
                    </li>
                </ul>
            </div>

            <button type="submit" class="btn-submit" id="submitBtn">비밀번호 변경</button>
        </form>

        <a th:href="@{/admin/mfa/login}" class="back-link">로그인 페이지로 돌아가기</a>
    </div>
</div>

<script th:inline="javascript">
    /*<![CDATA[*/
    var policyMinLength = /*[[${policy.minLength}]]*/ 8;
    var requireUppercase = /*[[${policy.requireUppercase}]]*/ true;
    var requireLowercase = /*[[${policy.requireLowercase}]]*/ true;
    var requireDigit = /*[[${policy.requireDigit}]]*/ true;
    var requireSpecialChar = /*[[${policy.requireSpecialChar}]]*/ false;

    function updatePolicyCheck(elementId, passed) {
        var el = document.getElementById(elementId);
        if (!el) return;
        var icon = el.querySelector('.icon');
        if (passed) {
            el.classList.add('pass');
            el.classList.remove('fail');
            icon.textContent = '\u2713';
        } else {
            el.classList.remove('pass');
            el.classList.add('fail');
            icon.textContent = '\u2717';
        }
    }

    function resetPolicyCheck(elementId) {
        var el = document.getElementById(elementId);
        if (!el) return;
        var icon = el.querySelector('.icon');
        el.classList.remove('pass', 'fail');
        icon.textContent = '-';
    }

    function validatePassword() {
        var newPw = document.getElementById('newPassword').value;
        var confirmPw = document.getElementById('confirmPassword').value;

        if (newPw.length === 0) {
            resetPolicyCheck('rule-minLength');
            resetPolicyCheck('rule-uppercase');
            resetPolicyCheck('rule-lowercase');
            resetPolicyCheck('rule-digit');
            resetPolicyCheck('rule-special');
        } else {
            updatePolicyCheck('rule-minLength', newPw.length >= policyMinLength);
            if (requireUppercase) updatePolicyCheck('rule-uppercase', /[A-Z]/.test(newPw));
            if (requireLowercase) updatePolicyCheck('rule-lowercase', /[a-z]/.test(newPw));
            if (requireDigit) updatePolicyCheck('rule-digit', /[0-9]/.test(newPw));
            if (requireSpecialChar) updatePolicyCheck('rule-special', /[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?]/.test(newPw));
        }

        if (confirmPw.length === 0 && newPw.length === 0) {
            resetPolicyCheck('rule-match');
        } else if (confirmPw.length > 0 || newPw.length > 0) {
            updatePolicyCheck('rule-match', newPw.length > 0 && newPw === confirmPw);
        }
    }

    document.addEventListener('DOMContentLoaded', function() {
        var newPwInput = document.getElementById('newPassword');
        var confirmPwInput = document.getElementById('confirmPassword');

        newPwInput.addEventListener('keyup', validatePassword);
        newPwInput.addEventListener('input', validatePassword);
        confirmPwInput.addEventListener('keyup', validatePassword);
        confirmPwInput.addEventListener('input', validatePassword);
    });
    /*]]>*/
</script>
</body>
</html>
