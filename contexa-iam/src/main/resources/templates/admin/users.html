<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="ko">
<head th:replace="~{fragments/common-head :: head-elements(pageTitle=#{admin.users.title})}"></head>
<body class="flex flex-col min-h-screen font-sans">

<div th:insert="~{fragments/header :: header}"></div>
<div id="toast-container" class="fixed top-5 right-5 z-50 w-full max-w-xs sm:max-w-sm"></div>

<div class="flex flex-1">
    <aside th:insert="~{fragments/admin-menu :: menu}" class="hidden md:block"></aside>

    <main class="flex-1 p-6 md:p-10">
        <div class="mx-auto dark-card p-6 sm:p-8 rounded-xl">
            <div class="mb-8 flex items-center justify-between">
                <div>
                    <h1 class="text-3xl font-bold text-gradient" th:text="#{admin.users.title}">Admin - User List</h1>
                    <p class="text-dark-muted mt-1" th:text="#{admin.users.subtitle}">Manage platform user accounts.</p>
                </div>
                <a th:href="@{/admin/users/new}"
                   class="px-6 py-3 rounded-xl font-semibold transition-all duration-300 text-white"
                   style="background: linear-gradient(135deg, #6366f1, #4f46e5); box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4); text-decoration:none;">
                    <span th:text="#{admin.users.new}">New User</span>
                </a>
            </div>

            <form th:action="@{/admin/users}" method="get" class="mb-6 flex gap-3">
                <div class="relative flex-1">
                    <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2" style="color:#64748b;"></i>
                    <input type="text" name="keyword" th:value="${keyword}"
                           class="w-full pl-10 pr-4 py-2.5 rounded-lg text-sm"
                           style="background:rgba(30,41,59,0.6);border:2px solid rgba(71,85,105,0.5);color:#e2e8f0;"
                           th:placeholder="#{admin.users.search.placeholder}" placeholder="Search...">
                </div>
                <button type="submit" class="px-4 py-2.5 rounded-lg text-sm font-medium text-white"
                        style="background:linear-gradient(135deg,#6366f1,#4f46e5);">
                    <i class="fas fa-search mr-1"></i> <span th:text="#{common.action.search}">Search</span>
                </button>
                <a th:href="@{/admin/users}" class="px-4 py-2.5 rounded-lg text-sm font-medium"
                   style="color:#94a3b8;border:1px solid rgba(71,85,105,0.5);"
                   th:text="#{common.action.reset}">
                    Reset
                </a>
            </form>

            <div class="overflow-x-auto shadow-md rounded-lg">
                <table id="usersTable" class="min-w-full w-full text-sm text-left">
                    <thead class="text-xs text-white uppercase" style="background: linear-gradient(135deg, #1e293b 0%, #334155 100%);">
                    <tr>
                        <th scope="col" class="py-3.5 px-6 font-semibold" th:text="#{common.table.id}">ID</th>
                        <th scope="col" class="py-3.5 px-6 font-semibold" th:text="#{admin.users.table.name}">Username</th>
                        <th scope="col" class="py-3.5 px-6 font-semibold" th:text="#{admin.users.table.email}">Email (ID)</th>
                        <th scope="col" class="py-3.5 px-6 font-semibold" th:text="#{admin.users.table.groups}">Groups</th>
                        <th scope="col" class="py-3.5 px-6 font-semibold" th:text="#{admin.users.table.roles}">Roles</th>
                        <th scope="col" class="py-3.5 px-6 font-semibold" th:text="#{admin.users.table.permissions}">Permissions</th>
                        <th scope="col" class="py-3.5 px-6 font-semibold" th:text="#{admin.users.table.mfa}">MFA Enabled</th>
                        <th scope="col" class="py-3.5 px-6 font-semibold" th:text="#{common.table.actions}">Actions</th>
                    </tr>
                    </thead>
                    <tbody class="divide-y" style="background: rgba(15, 23, 42, 0.6); color: #e2e8f0; border-color: rgba(71, 85, 105, 0.3);">
                    <tr th:each="user : ${users}" style="border-color: rgba(71, 85, 105, 0.3);">
                        <td class="py-4 px-6" th:text="${user.id}">1</td>
                        <td class="py-4 px-6" th:text="${user.name}">Admin</td>
                        <td class="py-4 px-6" th:text="${user.username}">admin@example.com</td>
                        <td class="py-4 px-6" th:text="${user.groupCount}"></td>
                        <td class="py-4 px-6" th:text="${user.roleCount}"></td>
                        <td class="py-4 px-6"></td>
                        <td class="py-4 px-6">
                            <span th:text="${user.mfaEnabled} ? #{admin.users.mfa.enabled} : #{admin.users.mfa.disabled}"
                                  th:style="${user.mfaEnabled ? 'background: rgba(34, 197, 94, 0.2); color: #4ade80; border: 1px solid rgba(34, 197, 94, 0.3);' : 'background: rgba(239, 68, 68, 0.2); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.3);'}"
                                  class="px-3 py-1 rounded-full text-xs font-semibold"></span>
                        </td>
                        <td class="py-4 px-6">
                            <a th:href="@{/admin/users/{id}(id=${user.id})}"
                               class="px-3 py-1.5 rounded-md text-sm font-medium transition-all duration-300 inline-block mr-2"
                               style="background: rgba(99, 102, 241, 0.2); color: #818cf8; border: 1px solid rgba(99, 102, 241, 0.3);"
                               th:text="#{common.action.edit}">Edit</a>
                            <form th:action="@{/admin/users/delete/{id}(id=${user.id})}" method="post" style="display:inline;"
                                  th:data-confirm-msg="#{common.confirm.delete.user}" onsubmit="return confirm(this.getAttribute('data-confirm-msg'));">
                                <button type="submit" class="px-3 py-1.5 rounded-md text-sm font-medium transition-all duration-300 inline-block"
                                        style="background: rgba(239, 68, 68, 0.2); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.3); cursor:pointer;"
                                        th:text="#{common.action.delete}">Delete</button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(users)}">
                        <td colspan="8" class="py-4 px-6 text-center" style="color: #94a3b8;">
                            <span th:text="#{admin.users.empty}">No users to display.</span>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <nav th:if="${page != null and page.totalPages > 1}" class="flex justify-center mt-6 gap-2">
                <a th:if="${!page.first}" th:href="@{/admin/users(keyword=${keyword},page=${page.number - 1},size=${page.size})}"
                   class="px-3 py-2 rounded text-sm" style="color:#94a3b8;border:1px solid rgba(71,85,105,0.3);">
                    <i class="fas fa-chevron-left"></i>
                </a>
                <th:block th:each="i : ${#numbers.sequence(0, page.totalPages - 1)}">
                    <a th:href="@{/admin/users(keyword=${keyword},page=${i},size=${page.size})}"
                       th:text="${i + 1}"
                       class="px-3 py-2 rounded text-sm"
                       th:style="${i == page.number} ? 'background:linear-gradient(135deg,#6366f1,#4f46e5);color:white;' : 'color:#94a3b8;border:1px solid rgba(71,85,105,0.3);'">
                    </a>
                </th:block>
                <a th:if="${!page.last}" th:href="@{/admin/users(keyword=${keyword},page=${page.number + 1},size=${page.size})}"
                   class="px-3 py-2 rounded text-sm" style="color:#94a3b8;border:1px solid rgba(71,85,105,0.3);">
                    <i class="fas fa-chevron-right"></i>
                </a>
            </nav>

            <div th:if="${message}" class="mt-6 text-center" style="color: #4ade80;">
                <p th:text="${message}"></p>
            </div>
            <div th:if="${errorMessage}" class="mt-6 text-center" style="color: #f87171;">
                <p th:text="${errorMessage}"></p>
            </div>
        </div>
    </main>
</div>

<div th:insert="~{fragments/footer :: footer}" class="mt-auto"></div>

<script th:inline="javascript">
    /*<![CDATA[*/
    document.addEventListener('DOMContentLoaded', () => {
        const message = /*[[${message}]]*/ null;
        if (message) {
            showToast(message, 'success');
        }
        const errorMessage = /*[[${errorMessage}]]*/ null;
        if (errorMessage) {
            showToast(errorMessage, 'error');
        }
    });
    /*]]>*/
</script>
</body>
</html>
