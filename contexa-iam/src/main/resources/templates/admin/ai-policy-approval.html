<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head th:replace="~{fragments/common-head :: head-elements(pageTitle='AI 정책 승인 관리')}"></head>
<body class="flex flex-col min-h-screen font-sans">

<div th:insert="~{fragments/header :: header}"></div>
<div id="toast-container" class="fixed top-5 right-5 z-50 w-full max-w-xs sm:max-w-sm"></div>

<div class="flex flex-1">
    <aside th:insert="~{fragments/admin-menu :: menu}" class="hidden md:block"></aside>

    <main class="flex-1 p-6 md:p-10">
        <div class="mx-auto dark-card p-6 sm:p-8 rounded-xl">
            <div class="mb-8 flex flex-col sm:flex-row justify-between items-center">
                <div class="text-center sm:text-left mb-4 sm:mb-0">
                    <h1 class="text-3xl font-bold text-gradient">AI 정책 승인 관리</h1>
                    <p class="text-dark-muted mt-1">AI가 생성하거나 진화시킨 정책을 검토하고 승인합니다.</p>
                </div>
                <div class="flex gap-2">
                    <button onclick="loadPolicies()"
                            class="px-4 py-2 rounded-xl font-semibold transition-all duration-300 text-white"
                            style="background: linear-gradient(135deg, #475569, #334155); box-shadow: 0 4px 15px rgba(71, 85, 105, 0.3);">
                        <i class="bi bi-arrow-clockwise"></i> 새로고침
                    </button>
                    <button onclick="batchApprove()" id="batchApproveBtn" disabled
                            class="px-4 py-2 rounded-xl font-semibold transition-all duration-300 text-white"
                            style="background: linear-gradient(135deg, #22c55e, #16a34a); box-shadow: 0 4px 15px rgba(34, 197, 94, 0.4);">
                        <i class="bi bi-check-all"></i> 일괄 승인
                    </button>
                </div>
            </div>

            <!-- 통계 카드 -->
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
                <div class="dark-card p-4 rounded-lg" style="background: rgba(15, 23, 42, 0.8);">
                    <div class="flex justify-between items-center">
                        <div>
                            <p class="text-dark-muted text-sm">총 AI 정책</p>
                            <p class="text-2xl font-bold text-gradient" id="totalPolicies">0</p>
                        </div>
                        <i class="bi bi-shield-check text-3xl" style="color: #818cf8;"></i>
                    </div>
                </div>
                <div class="dark-card p-4 rounded-lg" style="background: rgba(15, 23, 42, 0.8);">
                    <div class="flex justify-between items-center">
                        <div>
                            <p class="text-dark-muted text-sm">승인 대기</p>
                            <p class="text-2xl font-bold" style="color: #fbbf24;" id="pendingPolicies">0</p>
                        </div>
                        <i class="bi bi-clock-history text-3xl" style="color: #fbbf24;"></i>
                    </div>
                </div>
                <div class="dark-card p-4 rounded-lg" style="background: rgba(15, 23, 42, 0.8);">
                    <div class="flex justify-between items-center">
                        <div>
                            <p class="text-dark-muted text-sm">승인율 (30일)</p>
                            <p class="text-2xl font-bold" style="color: #4ade80;" id="approvalRate">0%</p>
                        </div>
                        <i class="bi bi-check-circle text-3xl" style="color: #4ade80;"></i>
                    </div>
                </div>
                <div class="dark-card p-4 rounded-lg" style="background: rgba(15, 23, 42, 0.8);">
                    <div class="flex justify-between items-center">
                        <div>
                            <p class="text-dark-muted text-sm">평균 신뢰도</p>
                            <p class="text-2xl font-bold" style="color: #60a5fa;" id="avgConfidence">0.0</p>
                        </div>
                        <i class="bi bi-graph-up text-3xl" style="color: #60a5fa;"></i>
                    </div>
                </div>
            </div>

            <!-- 필터 섹션 -->
            <div class="dark-card p-4 rounded-lg mb-6" style="background: rgba(15, 23, 42, 0.6);">
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                    <div>
                        <select id="sourceFilter" class="w-full px-3 py-2 rounded-lg"
                                style="background: rgba(30, 41, 59, 0.5); color: #e2e8f0; border: 1px solid rgba(71, 85, 105, 0.3);">
                            <option value="">모든 출처</option>
                            <option value="AI_GENERATED">AI 생성</option>
                            <option value="AI_EVOLVED">AI 진화</option>
                        </select>
                    </div>
                    <div>
                        <select id="statusFilter" class="w-full px-3 py-2 rounded-lg"
                                style="background: rgba(30, 41, 59, 0.5); color: #e2e8f0; border: 1px solid rgba(71, 85, 105, 0.3);">
                            <option value="">모든 상태</option>
                            <option value="PENDING">승인 대기</option>
                            <option value="APPROVED">승인됨</option>
                            <option value="REJECTED">거부됨</option>
                        </select>
                    </div>
                    <div class="md:col-span-2 flex justify-end items-center">
                        <label class="flex items-center cursor-pointer">
                            <input type="checkbox" id="autoRefresh" class="mr-2">
                            <span class="text-dark-muted">자동 새로고침 (10초)</span>
                        </label>
                    </div>
                </div>
            </div>

            <!-- 정책 테이블 -->
            <div class="overflow-x-auto shadow-md rounded-lg">
                <table class="min-w-full w-full text-sm text-left">
                    <thead class="text-xs text-white uppercase" style="background: linear-gradient(135deg, #1e293b 0%, #334155 100%);">
                    <tr>
                        <th scope="col" class="py-3.5 px-6 font-semibold">
                            <input type="checkbox" id="selectAll" class="rounded">
                        </th>
                        <th scope="col" class="py-3.5 px-6 font-semibold">정책명</th>
                        <th scope="col" class="py-3.5 px-6 font-semibold">출처</th>
                        <th scope="col" class="py-3.5 px-6 font-semibold">신뢰도</th>
                        <th scope="col" class="py-3.5 px-6 font-semibold">상태</th>
                        <th scope="col" class="py-3.5 px-6 font-semibold">생성일</th>
                        <th scope="col" class="py-3.5 px-6 font-semibold">관리</th>
                    </tr>
                    </thead>
                    <tbody id="policyTableBody" class="divide-y" style="background: rgba(15, 23, 42, 0.6); color: #e2e8f0; border-color: rgba(71, 85, 105, 0.3);">
                    <!-- 정책 행들이 여기에 동적으로 추가됨 -->
                    </tbody>
                </table>
            </div>

            <!-- 페이지네이션 -->
            <div class="flex justify-center mt-6">
                <nav aria-label="Page navigation">
                    <ul class="flex gap-1" id="pagination">
                        <!-- 페이지 버튼들이 여기에 동적으로 추가됨 -->
                    </ul>
                </nav>
            </div>
        </div>
    </main>
</div>

<!-- 정책 상세 모달 -->
<div id="policyDetailModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50">
    <div class="bg-dark-card rounded-xl p-6 max-w-4xl w-full mx-4 max-h-[90vh] overflow-y-auto">
        <div class="flex justify-between items-start mb-4">
            <h2 class="text-2xl font-bold text-gradient">정책 상세 정보</h2>
            <button onclick="closePolicyDetailModal()" class="text-dark-muted hover:text-white">
                <i class="bi bi-x-lg text-2xl"></i>
            </button>
        </div>
        <div id="policyDetailContent">
            <!-- 상세 정보가 여기에 표시됨 -->
        </div>
        <div class="flex justify-end gap-2 mt-6">
            <button id="modalApproveBtn" onclick="approvePolicyFromModal()"
                    class="px-4 py-2 rounded-lg font-semibold transition-all duration-300"
                    style="background: rgba(34, 197, 94, 0.2); color: #4ade80; border: 1px solid rgba(34, 197, 94, 0.3);">
                <i class="bi bi-check-circle"></i> 승인
            </button>
            <button id="modalRejectBtn" onclick="rejectPolicyFromModal()"
                    class="px-4 py-2 rounded-lg font-semibold transition-all duration-300"
                    style="background: rgba(239, 68, 68, 0.2); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.3);">
                <i class="bi bi-x-circle"></i> 거부
            </button>
            <button onclick="closePolicyDetailModal()"
                    class="px-4 py-2 rounded-lg font-semibold transition-all duration-300"
                    style="background: rgba(71, 85, 105, 0.5); color: #cbd5e1;">
                닫기
            </button>
        </div>
    </div>
</div>

<!-- 거부 사유 모달 -->
<div id="rejectReasonModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50">
    <div class="bg-dark-card rounded-xl p-6 max-w-md w-full mx-4">
        <h2 class="text-xl font-bold text-gradient mb-4">정책 거부 사유</h2>
        <textarea id="rejectReason" rows="4"
                  class="w-full px-3 py-2 rounded-lg mb-4"
                  style="background: rgba(30, 41, 59, 0.5); color: #e2e8f0; border: 1px solid rgba(71, 85, 105, 0.3);"
                  placeholder="AI 학습을 위해 구체적인 거부 사유를 입력해주세요"></textarea>
        <div class="flex justify-end gap-2">
            <button onclick="confirmReject()"
                    class="px-4 py-2 rounded-lg font-semibold transition-all duration-300"
                    style="background: rgba(239, 68, 68, 0.2); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.3);">
                <i class="bi bi-x-circle"></i> 거부 확인
            </button>
            <button onclick="closeRejectReasonModal()"
                    class="px-4 py-2 rounded-lg font-semibold transition-all duration-300"
                    style="background: rgba(71, 85, 105, 0.5); color: #cbd5e1;">
                취소
            </button>
        </div>
    </div>
</div>

<div th:insert="~{fragments/footer :: footer}" class="mt-auto"></div>

<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<script th:src="@{/js/ai-policy-approval.js}"></script>
</body>
</html>
