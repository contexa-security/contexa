<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <th:block th:replace="~{fragments/common-head :: head-elements(pageTitle=#{admin.granting.wizard.title})}"></th:block>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css">
</head>
<body class="flex flex-col min-h-screen font-sans">
<div th:insert="~{fragments/header :: header}"></div>
<div id="toast-container" class="fixed top-5 right-5 z-50"></div>

<div class="flex flex-1 overflow-hidden">
    <aside th:insert="~{fragments/admin-menu :: menu}"></aside>

    <main class="flex-1 p-6 lg:p-8 overflow-y-auto">
        <div id="granting-wizard-container" class="dark-card p-6 sm:p-8 rounded-xl"
             th:data-context-id="${contextId}"
             th:data-subject-type="${subjectType}"
             th:data-assignment-type="${assignmentType}">
            <div class="mb-8 flex justify-between items-center">
                <div>
                    <h1 class="text-3xl font-bold text-gradient" th:text="#{admin.granting.wizard.title}">Permission Grant Wizard</h1>
                    <p class="text-dark-muted mt-2">
                        <span th:text="#{admin.granting.wizard.subtitle.manage}">Manage membership of subject</span> <strong id="subject-name" class="text-indigo-300" th:text="${subjectName}"></strong>
                    </p>
                </div>
                <div>
                    <a th:href="@{/admin/studio}" class="dark-btn-secondary" th:text="#{admin.granting.wizard.cancel}">Cancel</a>
                    <button id="save-button" type="button" class="dark-btn-primary ml-2">
                        <i class="fas fa-save mr-2"></i><span th:text="#{admin.granting.wizard.save}">Save</span>
                    </button>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
                <div id="selection-panel" class="lg:col-span-4 dark-card p-4">
                    <h3 class="font-semibold text-lg text-slate-300 mb-4" th:text="${assignmentType == 'GROUP'} ? #{admin.granting.wizard.all.groups} : #{admin.granting.wizard.all.roles}"></h3>
                    <div class="h-96 overflow-y-auto space-y-2 pr-2 dark-scroll">
                        <div th:each="item : ${allAssignments}" class="dark-checkbox-item">
                            <input type="checkbox" th:value="${item.id}" th:id="'item-'+${item.id}"
                                   th:checked="${#lists.contains(selectedAssignmentIds, item.id)}" class="dark-checkbox assignment-checkbox">
                            <label th:for="'item-'+${item.id}" class="text-slate-200" th:text="${assignmentType == 'GROUP' ? item.name : item.roleName}"></label>
                        </div>
                    </div>
                </div>

                <div class="lg:col-span-4 dark-card p-4">
                    <h3 class="font-semibold text-lg text-slate-300 mb-4" th:text="${assignmentType == 'GROUP'} ? #{admin.granting.wizard.current.groups} : #{admin.granting.wizard.current.roles}"></h3>
                    <div id="assignment-list" class="h-96 overflow-y-auto space-y-2 pr-2 dark-scroll">
                    </div>
                </div>

                <div class="lg:col-span-4 dark-card p-4">
                    <h3 class="font-semibold text-lg text-slate-300 mb-4" th:text="#{admin.granting.wizard.impact.title}">Real-time Impact Analysis</h3>
                    <div id="simulation-result-container" class="h-96 overflow-y-auto space-y-4 dark-scroll">
                        <div class="flex items-center justify-center h-full text-slate-500" th:text="#{admin.granting.wizard.impact.placeholder}">
                            Analysis results will be displayed when membership changes.
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>
<script th:src="@{/js/toast.js}"></script>
<script th:src="@{/js/granting-wizard.js}"></script>
</body>
</html>
