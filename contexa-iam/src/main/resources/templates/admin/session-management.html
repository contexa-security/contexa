<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head th:replace="~{fragments/common-head :: head-elements(pageTitle=#{admin.session.title})}"></head>
<body class="flex flex-col min-h-screen font-sans">

<div th:insert="~{fragments/header :: header}"></div>
<div id="toast-container" class="fixed top-5 right-5 z-50 w-full max-w-xs sm:max-w-sm"></div>

<div class="flex flex-1 overflow-hidden">
    <aside th:insert="~{fragments/admin-menu :: menu}"></aside>

    <main class="flex-1 p-6 lg:p-8 overflow-y-auto">
        <div class="modern-card p-6 sm:p-8 rounded-xl">
            <!-- Header -->
            <div class="mb-6 flex items-center justify-between">
                <div>
                    <h1 class="text-2xl font-bold" style="background: linear-gradient(135deg, #6366f1, #818cf8, #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;">
                        <span th:text="#{admin.session.title}">Session Management</span>
                    </h1>
                    <p class="text-sm mt-1" style="color: #94a3b8;">
                        <span th:text="#{admin.session.active.count}">Active Sessions</span>:
                        <span class="font-bold" style="color: #6366f1;" th:text="${activeCount}">0</span>
                    </p>
                </div>
                <a th:href="@{/admin/session-management/export}"
                   class="text-xs px-3 py-1.5 rounded-full" style="background:rgba(34,197,94,0.2);color:#4ade80;border:1px solid rgba(34,197,94,0.4);text-decoration:none;">
                    <span th:text="#{admin.session.export.csv}">CSV Download</span>
                </a>
            </div>

            <!-- Session Table -->
            <div class="overflow-x-auto shadow-md rounded-lg">
                <table class="min-w-full w-full text-sm text-left">
                    <thead class="text-xs text-white uppercase" style="background: linear-gradient(135deg, #1e293b 0%, #334155 100%);">
                    <tr>
                        <th scope="col" class="py-3.5 px-6 font-semibold" th:text="#{admin.session.table.id}">Session ID</th>
                        <th scope="col" class="py-3.5 px-6 font-semibold" th:text="#{admin.session.table.user}">Username</th>
                        <th scope="col" class="py-3.5 px-6 font-semibold" th:text="#{admin.session.table.ip}">IP Address</th>
                        <th scope="col" class="py-3.5 px-6 font-semibold" th:text="#{admin.session.table.agent}">User Agent</th>
                        <th scope="col" class="py-3.5 px-6 font-semibold" th:text="#{admin.session.table.login}">Login Time</th>
                        <th scope="col" class="py-3.5 px-6 font-semibold" th:text="#{admin.session.table.last.active}">Last Active</th>
                        <th scope="col" class="py-3.5 px-6 font-semibold" th:text="#{admin.session.table.actions}">Actions</th>
                    </tr>
                    </thead>
                    <tbody class="divide-y" style="background: rgba(15, 23, 42, 0.6); color: #e2e8f0; border-color: rgba(71, 85, 105, 0.3);">
                    <tr th:each="s : ${sessionPage.content}" style="border-color: rgba(71, 85, 105, 0.3);">
                        <td class="py-4 px-6">
                            <span class="font-mono text-xs" style="color: #94a3b8;"
                                  th:title="${s.sessionId}"
                                  th:text="${#strings.abbreviate(s.sessionId, 20)}"></span>
                        </td>
                        <td class="py-4 px-6 font-medium" th:text="${s.username}"></td>
                        <td class="py-4 px-6 font-mono text-xs" style="color: #22d3ee;" th:text="${s.clientIp ?: '-'}"></td>
                        <td class="py-4 px-6">
                            <span class="text-xs" style="color: #94a3b8; max-width: 16rem; display: inline-block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;"
                                  th:title="${s.userAgent}"
                                  th:text="${s.userAgent != null ? #strings.abbreviate(s.userAgent, 50) : '-'}"></span>
                        </td>
                        <td class="py-4 px-6 text-xs" style="color: #94a3b8;" th:text="${s.createdAt != null ? #temporals.format(s.createdAt, 'yyyy-MM-dd HH:mm') : '-'}"></td>
                        <td class="py-4 px-6 text-xs" style="color: #94a3b8;" th:text="${s.lastAccessedAt != null ? #temporals.format(s.lastAccessedAt, 'yyyy-MM-dd HH:mm') : '-'}"></td>
                        <td class="py-4 px-6">
                            <div class="flex gap-2">
                                <form th:action="@{/admin/session-management/{id}/invalidate(id=${s.sessionId})}" method="post" class="inline-block">
                                    <input th:if="${_csrf != null}" type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                    <button type="submit"
                                            class="px-3 py-1.5 rounded-md text-xs font-medium transition-all duration-300"
                                            style="background: rgba(239, 68, 68, 0.2); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.3);"
                                            th:text="#{admin.session.invalidate}">Invalidate</button>
                                </form>
                                <form th:action="@{/admin/session-management/user/{uid}/invalidate-all(uid=${s.userId})}" method="post" class="inline-block"
                                      th:data-confirm-msg="#{admin.session.invalidate.all}" onsubmit="return confirm(this.getAttribute('data-confirm-msg') + '?');">
                                    <input th:if="${_csrf != null}" type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                    <button type="submit"
                                            class="px-3 py-1.5 rounded-md text-xs font-medium transition-all duration-300"
                                            style="background: rgba(251, 191, 36, 0.2); color: #fbbf24; border: 1px solid rgba(251, 191, 36, 0.3);"
                                            th:text="#{admin.session.invalidate.all}">Invalidate All</button>
                                </form>
                            </div>
                        </td>
                    </tr>
                    <tr th:if="${sessionPage.totalElements == 0}">
                        <td colspan="7" class="py-8 px-6 text-center" style="color: #94a3b8;" th:text="#{admin.session.empty}">
                            No active sessions.
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <!-- Pagination -->
            <div th:if="${sessionPage.totalPages > 1}" class="flex justify-center gap-2 mt-6">
                <a th:each="i : ${#numbers.sequence(0, sessionPage.totalPages - 1)}"
                   th:href="@{/admin/session-management(page=${i})}"
                   class="px-3 py-1 rounded text-sm"
                   th:style="${i == sessionPage.number ? 'background: linear-gradient(135deg, #6366f1, #4f46e5); color: white;' : 'background: rgba(30,41,59,0.6); color: #94a3b8; border: 1px solid rgba(71,85,105,0.3);'}"
                   style="text-decoration: none;"
                   th:text="${i + 1}"></a>
            </div>
        </div>
    </main>
</div>

<div th:insert="~{fragments/footer :: footer}" class="mt-auto"></div>

<script th:inline="javascript">
    /*<![CDATA[*/
    document.addEventListener('DOMContentLoaded', () => {
        const message = /*[[${message}]]*/ null;
        if (message) {
            showToast(message, 'success');
        }
        const errorMessage = /*[[${errorMessage}]]*/ null;
        if (errorMessage) {
            showToast(errorMessage, 'error');
        }
    });
    /*]]>*/
</script>

</body>
</html>
