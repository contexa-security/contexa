<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <th:block th:replace="~{fragments/common-head :: head-elements(pageTitle='Access Governance Analysis')}"></th:block>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/studio.css}" />
    <link rel="stylesheet" th:href="@{/css/ai-studio.css}" />
    <link rel="stylesheet" th:href="@{/css/access-governance.css}" />
    <style>
        /* Security Copilot과 동일한 파란색 스크롤바 - 최우선 적용 */
        #explorer-list-container::-webkit-scrollbar,
        #canvas-content::-webkit-scrollbar,
        #inspector-panel::-webkit-scrollbar,
        #ai-response-container::-webkit-scrollbar,
        .overflow-y-auto::-webkit-scrollbar,
        .dark-scroll::-webkit-scrollbar {
            width: 8px !important;
        }

        #explorer-list-container::-webkit-scrollbar-track,
        #canvas-content::-webkit-scrollbar-track,
        #inspector-panel::-webkit-scrollbar-track,
        #ai-response-container::-webkit-scrollbar-track,
        .overflow-y-auto::-webkit-scrollbar-track,
        .dark-scroll::-webkit-scrollbar-track {
            background: rgba(15, 23, 42, 0.5) !important;
            border-radius: 4px !important;
        }

        #explorer-list-container::-webkit-scrollbar-thumb,
        #canvas-content::-webkit-scrollbar-thumb,
        #inspector-panel::-webkit-scrollbar-thumb,
        #ai-response-container::-webkit-scrollbar-thumb,
        .overflow-y-auto::-webkit-scrollbar-thumb,
        .dark-scroll::-webkit-scrollbar-thumb {
            background: rgba(59, 130, 246, 0.5) !important;
            border-radius: 4px !important;
        }

        #explorer-list-container::-webkit-scrollbar-thumb:hover,
        #canvas-content::-webkit-scrollbar-thumb:hover,
        #inspector-panel::-webkit-scrollbar-thumb:hover,
        #ai-response-container::-webkit-scrollbar-thumb:hover,
        .overflow-y-auto::-webkit-scrollbar-thumb:hover,
        .dark-scroll::-webkit-scrollbar-thumb:hover {
            background: rgba(59, 130, 246, 0.7) !important;
        }

        /* 사용자/그룹 선택 스타일 */
        .accordion {
            border: 1px solid rgba(71, 85, 105, 0.3);
            border-radius: 8px;
            margin-bottom: 8px;
            overflow: hidden;
        }

        .accordion-header {
            background: rgba(30, 41, 59, 0.8);
            padding: 12px 16px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background-color 0.2s ease;
        }

        .accordion-header:hover {
            background: rgba(30, 41, 59, 1);
        }

        .accordion-header span {
            font-weight: 600;
            color: #e2e8f0;
            font-size: 14px;
        }

        .accordion-header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(99, 102, 241, 0.3), transparent);
        }

        .accordion:nth-child(1) .accordion-header::after {
            background: linear-gradient(90deg, transparent, rgba(59, 130, 246, 0.3), transparent);
        }

        .accordion:nth-child(2) .accordion-header::after {
            background: linear-gradient(90deg, transparent, rgba(16, 185, 129, 0.3), transparent);
        }

        .accordion-header .accordion-icon {
            transition: transform 0.2s ease;
            color: #94a3b8;
        }

        .accordion-content {
            background: rgba(15, 23, 42, 0.5);
            display: none;
            max-height: 300px;
            overflow-y: auto;
        }

        .explorer-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            cursor: pointer;
            transition: all 0.2s ease;
            border-bottom: 1px solid rgba(71, 85, 105, 0.1);
            position: relative;
        }

        .explorer-item[style*="display: none"] {
            display: none !important;
        }

        .explorer-item:not([style*="display: none"]) {
            display: flex;
        }

        .explorer-item:hover {
            background: rgba(59, 130, 246, 0.1);
            border-left: 3px solid rgba(59, 130, 246, 0.5);
        }

        .explorer-item .item-icon {
            width: 32px;
            height: 32px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(59, 130, 246, 0.1);
            color: #3b82f6;
            font-size: 14px;
            flex-shrink: 0;
        }

        .accordion:nth-child(1) .explorer-item .item-icon {
            background: rgba(59, 130, 246, 0.1);
            color: #3b82f6;
        }

        .accordion:nth-child(2) .explorer-item .item-icon {
            background: rgba(16, 185, 129, 0.1);
            color: #10b981;
        }

        .explorer-item .item-text {
            flex: 1;
            min-width: 0;
        }

        .explorer-item .item-text .item-name {
            font-weight: 500;
            color: #e2e8f0;
            font-size: 14px;
            margin-bottom: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .explorer-item .item-text .item-description {
            color: #94a3b8;
            font-size: 12px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .explorer-item.selected {
            background: rgba(59, 130, 246, 0.15);
            border-left: 3px solid #3b82f6;
            position: relative;
        }

        .explorer-item.selected::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, rgba(59, 130, 246, 0.1), transparent);
            pointer-events: none;
        }

        .explorer-item.selected .item-icon {
            background: rgba(59, 130, 246, 0.2);
            color: #60a5fa;
        }

        .explorer-item.selected .item-text .item-name {
            color: #60a5fa;
        }

        .explorer-item.selected .item-text .item-description {
            color: #93c5fd;
        }


    </style>
    <!-- Mermaid 추가 (레거시 지원) -->
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
    
    <!-- 🔥 Cytoscape.js 라이브러리 - Mermaid 대체용 -->
    <script src="https://unpkg.com/cytoscape@3.26.0/dist/cytoscape.min.js"></script>
    <!-- Cytoscape 레이아웃 확장 -->
    <script src="https://unpkg.com/webcola@3.4.0/WebCola/cola.min.js"></script>
    <script src="https://unpkg.com/dagre@0.8.5/dist/dagre.min.js"></script>
    <script src="https://unpkg.com/cytoscape-cola@2.5.1/cytoscape-cola.js"></script>
    <script src="https://unpkg.com/cytoscape-dagre@2.5.0/cytoscape-dagre.js"></script>
    <!-- 레이아웃 의존성 -->
</head>
<body class="h-screen flex flex-col bg-app-dark-bg-secondary font-sans">

<header th:insert="~{fragments/header :: header}" class="flex-shrink-0"></header>
<div id="toast-container" class="fixed top-5 right-5 z-50 w-full max-w-xs sm:max-w-sm"></div>

<div class="flex-1 flex min-h-0">
    <aside th:insert="~{fragments/admin-menu :: menu}" class="hidden md:block flex-shrink-0 w-64 bg-app-dark-bg-tertiary shadow-lg"></aside>

    <!-- 🚀 3-패널 구조: Explorer + Canvas + Inspector -->
    <main id="studio-main" class="flex-1 flex flex-col xl:flex-row gap-4 p-4 overflow-y-auto">
        
        <!-- Explorer Panel (사용자/그룹 선택) -->
        <div id="explorer-panel" class="w-full xl:w-3/12 bg-slate-900/50 rounded-xl shadow-lg flex flex-col border border-slate-700">
            <div class="p-3 border-b border-slate-700">
                <h3 class="text-lg font-bold text-slate-200 mb-3">
                    <i class="fas fa-users mr-2 text-indigo-400"></i>사용자/그룹 선택
                </h3>
                
                <!-- 검색창 -->
                <div class="relative mb-3">
                    <input type="search" id="user-group-search" placeholder="사용자 또는 그룹 검색..."
                           class="w-full pl-10 pr-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 bg-slate-800 border-slate-600 text-slate-200">
                    <i class="fas fa-search absolute left-3 top-1/2 transform -translate-y-1/2 text-slate-400"></i>
                </div>
                
                <!-- 선택된 항목들 -->
                <div class="mb-3">
                    <h4 class="text-sm font-medium text-slate-300 mb-2">선택된 항목</h4>
                    <div id="selected-items" class="space-y-2 max-h-20 overflow-y-auto">
                        <!-- 선택된 사용자/그룹들이 여기에 표시됩니다 -->
                    </div>
                </div>
            </div>
            <div id="user-group-list" class="flex-1 p-2 overflow-y-auto">
                <!-- 사용자/그룹 목록이 여기에 동적으로 로드됩니다 -->
            </div>
        </div>
        
                 <!-- 🎨 Canvas Panel (분석 유형 및 설정) -->
         <div id="canvas-panel" class="w-full xl:w-4/12 bg-slate-900/50 rounded-xl shadow-lg flex flex-col border border-slate-700">
            <div class="p-4 border-b border-slate-700">
                <h3 class="text-lg font-bold text-slate-200 mb-4">
                    <i class="fas fa-cogs mr-2 text-indigo-400"></i>분석 설정
                </h3>
                
                <!-- 분석 유형 선택 -->
                <div class="mb-4">
                    <h4 class="text-sm font-medium text-slate-300 mb-2">분석 유형</h4>
                    <div id="analysisTypes" class="grid grid-cols-2 gap-2">
                        <!-- 분석 유형들이 동적으로 로드됩니다 -->
                    </div>
                </div>
                
                <!-- 분석 설정 폼 -->
                <form id="analysisForm" class="space-y-3">
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label for="auditScope" class="block text-sm font-medium text-slate-300 mb-1">감사 범위</label>
                            <select class="w-full px-3 py-2 bg-slate-800 border border-slate-600 rounded-lg text-slate-200 text-sm" id="auditScope" name="auditScope" required>
                                <option value="">감사 범위를 선택하세요</option>
                                <option value="ALL_USERS">전체 사용자</option>
                                <option value="ACTIVE_USERS">활성 사용자</option>
                                <option value="ADMIN_USERS">관리자 사용자</option>
                                <option value="DORMANT_USERS">비활성 사용자</option>
                            </select>
                        </div>
                        <div>
                            <label for="priority" class="block text-sm font-medium text-slate-300 mb-1">우선순위</label>
                            <select class="w-full px-3 py-2 bg-slate-800 border border-slate-600 rounded-lg text-slate-200 text-sm" id="priority" name="priority">
                                <option value="LOW">낮음</option>
                                <option value="NORMAL" selected>보통</option>
                                <option value="HIGH">높음</option>
                                <option value="CRITICAL">긴급</option>
                            </select>
                        </div>
                    </div>
                    
                    <!-- 분석 옵션 -->
                    <div>
                        <label class="block text-sm font-medium text-slate-300 mb-2">분석 옵션</label>
                        <div class="space-y-2">
                            <div class="flex items-center">
                                <input class="w-4 h-4 text-indigo-600 bg-slate-800 border-slate-600 rounded focus:ring-indigo-500" type="checkbox" id="enableDormantPermissionAnalysis" name="enableDormantPermissionAnalysis" checked>
                                <label class="ml-2 text-sm text-slate-300" for="enableDormantPermissionAnalysis">미사용 권한 분석</label>
                            </div>
                            <div class="flex items-center">
                                <input class="w-4 h-4 text-indigo-600 bg-slate-800 border-slate-600 rounded focus:ring-indigo-500" type="checkbox" id="enableExcessivePermissionDetection" name="enableExcessivePermissionDetection" checked>
                                <label class="ml-2 text-sm text-slate-300" for="enableExcessivePermissionDetection">과도한 권한 탐지</label>
                            </div>
                            <div class="flex items-center">
                                <input class="w-4 h-4 text-indigo-600 bg-slate-800 border-slate-600 rounded focus:ring-indigo-500" type="checkbox" id="enableSodViolationCheck" name="enableSodViolationCheck" checked>
                                <label class="ml-2 text-sm text-slate-300" for="enableSodViolationCheck">업무 분리 위반 검사</label>
                            </div>
                        </div>
                    </div>
                </form>
            </div>
            
            <div class="p-4 border-t border-slate-700">
                <button id="analyze-btn" onclick="analyzeStream()" class="w-full px-4 py-3 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 transition-colors font-medium">
                    <i class="fas fa-search mr-2"></i>분석 시작
                </button>
            </div>
            
            <div id="canvas-content" class="flex-1 p-4 overflow-auto relative">
                <button id="diagram-fullscreen-btn" class="absolute top-2 right-2 z-10 px-3 py-1 bg-slate-700 text-slate-200 rounded shadow hover:bg-slate-600 transition">전체보기</button>
                <!-- Cytoscape.js 다이어그램이 여기에 렌더링됨 -->
            </div>
        </div>
        
                 <!-- 📊 Inspector Panel (분석 결과) -->
        <div id="inspector-panel" class="w-full xl:w-5/12 bg-slate-900/50 rounded-xl shadow-lg flex flex-col border border-slate-700 p-4 overflow-y-auto">
            <!-- Inspector 결과가 여기에 동적으로 렌더링됩니다 -->
        </div>
    </main>
</div>

<!-- 전체보기 모달 -->
<div id="fullscreen-modal" class="fixed inset-0 bg-black/80 z-50 hidden flex-col items-center justify-center">
    <div class="relative w-full h-full flex flex-col items-center justify-center">
        <button id="fullscreen-close-btn" class="absolute top-4 right-8 z-20 px-4 py-2 bg-slate-800 text-slate-200 rounded shadow hover:bg-slate-700 transition text-lg"><i class="fas fa-times"></i> 닫기</button>
        <div id="fullscreen-canvas" class="w-[90vw] h-[80vh] bg-slate-900 rounded-lg shadow-lg overflow-hidden flex items-center justify-center"></div>
        <div class="zoom-controls absolute bottom-8 left-1/2 -translate-x-1/2 flex gap-2 z-20">
            <button class="zoom-btn zoom-in px-3 py-2 bg-slate-700 text-slate-200 rounded hover:bg-slate-600"><i class="fas fa-plus"></i></button>
            <button class="zoom-btn zoom-out px-3 py-2 bg-slate-700 text-slate-200 rounded hover:bg-slate-600"><i class="fas fa-minus"></i></button>
            <button class="zoom-btn zoom-reset px-3 py-2 bg-slate-700 text-slate-200 rounded hover:bg-slate-600"><i class="fas fa-home"></i></button>
            <span class="zoom-level text-slate-300 ml-2">100%</span>
        </div>
    </div>
</div>


<footer th:insert="~{fragments/footer :: footer}" class="flex-shrink-0"></footer>
<script th:src="@{/js/toast.js}"></script>
<script th:src="@{/js/access-governance.js}"></script>
</body>
</html>
