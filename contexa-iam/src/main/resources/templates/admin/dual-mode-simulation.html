<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI3Security - 무방비 vs 방어 모드 시뮬레이션</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>

    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --danger-gradient: linear-gradient(135deg, #FF512F 0%, #DD2476 100%);
            --warning-gradient: linear-gradient(135deg, #FFB75E 0%, #ED8F03 100%);
            --success-gradient: linear-gradient(135deg, #56ab2f 0%, #a8e6cf 100%);
            --dark-bg: rgba(15, 23, 42, 0.95);
            --card-bg: rgba(30, 41, 59, 0.8);
            --card-hover-bg: rgba(51, 65, 85, 0.9);
            --text-primary: rgba(255, 255, 255, 0.95);
            --text-secondary: rgba(148, 163, 184, 0.8);
            --border-color: rgba(71, 85, 105, 0.3);
        }

        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            color: var(--text-primary);
        }

        .navbar {
            background: var(--dark-bg);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-color);
            padding: 1rem 2rem;
        }

        .navbar-brand {
            color: var(--text-primary) !important;
            font-weight: 700;
            font-size: 1.5rem;
        }

        .main-container {
            padding: 2rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        .page-title {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 2rem;
            text-align: center;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .simulation-control {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 2rem;
            margin-bottom: 2rem;
        }

        .attack-selector {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .attack-option {
            background: rgba(71, 85, 105, 0.2);
            border: 2px solid transparent;
            border-radius: 12px;
            padding: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
        }

        .attack-option:hover {
            background: rgba(71, 85, 105, 0.4);
            transform: translateY(-2px);
        }

        .attack-option.selected {
            border-color: #667eea;
            background: rgba(102, 126, 234, 0.2);
        }

        .attack-option i {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            display: block;
        }

        .parameters-section {
            margin-top: 1.5rem;
        }

        .parameter-input {
            background: rgba(71, 85, 105, 0.2);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            border-radius: 8px;
            padding: 0.5rem 1rem;
            width: 100%;
            margin-bottom: 1rem;
        }

        .execute-btn {
            background: var(--primary-gradient);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 1rem 3rem;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: block;
            margin: 2rem auto 0;
        }

        .execute-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .execute-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .comparison-results {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            margin-top: 2rem;
        }

        .mode-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 2rem;
            position: relative;
            overflow: hidden;
        }

        .mode-card.unprotected {
            border-color: rgba(255, 81, 47, 0.5);
        }

        .mode-card.protected {
            border-color: rgba(86, 171, 47, 0.5);
        }

        .mode-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .mode-title {
            font-size: 1.5rem;
            font-weight: 600;
        }

        .mode-badge {
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .unprotected .mode-badge {
            background: var(--danger-gradient);
        }

        .protected .mode-badge {
            background: var(--success-gradient);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .stat-box {
            background: rgba(71, 85, 105, 0.2);
            border-radius: 12px;
            padding: 1rem;
            text-align: center;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.25rem;
        }

        .stat-label {
            font-size: 0.85rem;
            color: var(--text-secondary);
            text-transform: uppercase;
        }

        .progress-container {
            margin-top: 1.5rem;
        }

        .progress {
            background: rgba(71, 85, 105, 0.2);
            border-radius: 10px;
            height: 30px;
            overflow: hidden;
        }

        .progress-bar {
            background: var(--primary-gradient);
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            transition: width 0.3s ease;
        }

        .comparison-chart {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 2rem;
            margin-top: 2rem;
        }

        .chart-container {
            position: relative;
            height: 400px;
        }

        .improvement-card {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.1), rgba(118, 75, 162, 0.1));
            border: 2px solid rgba(102, 126, 234, 0.5);
            border-radius: 20px;
            padding: 2rem;
            margin-top: 2rem;
            text-align: center;
        }

        .improvement-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
        }

        .improvement-stats {
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 2rem;
        }

        .improvement-item {
            flex: 1;
            min-width: 150px;
        }

        .improvement-value {
            font-size: 3rem;
            font-weight: 700;
            background: var(--success-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .improvement-label {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-top: 0.5rem;
        }

        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .alert-custom {
            background: rgba(71, 85, 105, 0.2);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1rem;
            margin-bottom: 1rem;
            display: none;
        }

        .alert-custom.show {
            display: block;
        }

        .alert-success {
            border-color: rgba(86, 171, 47, 0.5);
            background: rgba(86, 171, 47, 0.1);
        }

        .alert-danger {
            border-color: rgba(255, 81, 47, 0.5);
            background: rgba(255, 81, 47, 0.1);
        }

        .alert-info {
            border-color: rgba(102, 126, 234, 0.5);
            background: rgba(102, 126, 234, 0.1);
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">
                <i class="fas fa-shield-alt me-2"></i>
                AI3Security - 무방비 vs 방어 모드 시뮬레이션
            </a>
            <div class="ms-auto">
                <a href="/admin/dashboard" class="btn btn-outline-light">
                    <i class="fas fa-arrow-left me-2"></i>대시보드로 돌아가기
                </a>
            </div>
        </div>
    </nav>

    <div class="main-container">
        <h1 class="page-title">
            <i class="fas fa-balance-scale me-3"></i>
            보안 시스템 효과성 비교 분석
        </h1>

        <!-- Alert Messages -->
        <div id="alertMessage" class="alert-custom"></div>

        <!-- Simulation Control Panel -->
        <div class="simulation-control">
            <h3 class="mb-4">시뮬레이션 설정</h3>

            <!-- Attack Type Selection -->
            <div class="attack-selector" id="attackSelector">
                <div class="attack-option" data-attack="BRUTE_FORCE">
                    <i class="fas fa-hammer"></i>
                    <div>브루트포스</div>
                </div>
                <div class="attack-option" data-attack="CREDENTIAL_STUFFING">
                    <i class="fas fa-key"></i>
                    <div>크리덴셜 스터핑</div>
                </div>
                <div class="attack-option" data-attack="SQL_INJECTION">
                    <i class="fas fa-database"></i>
                    <div>SQL 인젝션</div>
                </div>
                <div class="attack-option" data-attack="ACCOUNT_TAKEOVER">
                    <i class="fas fa-user-secret"></i>
                    <div>계정 탈취</div>
                </div>
                <div class="attack-option" data-attack="SESSION_HIJACKING">
                    <i class="fas fa-cookie-bite"></i>
                    <div>세션 하이재킹</div>
                </div>
                <div class="attack-option" data-attack="ANOMALY_BEHAVIOR">
                    <i class="fas fa-exclamation-triangle"></i>
                    <div>이상 행동</div>
                </div>
            </div>

            <!-- Parameters -->
            <div class="parameters-section">
                <h4 class="mb-3">시뮬레이션 매개변수</h4>
                <div class="row">
                    <div class="col-md-6">
                        <label class="form-label">대상 사용자 수</label>
                        <input type="number" id="targetUserCount" class="parameter-input" value="10" min="1" max="100">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">공격 강도</label>
                        <select id="attackIntensity" class="parameter-input">
                            <option value="LOW">낮음</option>
                            <option value="MEDIUM" selected>중간</option>
                            <option value="HIGH">높음</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- Execute Button -->
            <button id="executeBtn" class="execute-btn">
                <i class="fas fa-play me-2"></i>
                비교 시뮬레이션 실행
            </button>
        </div>

        <!-- Comparison Results -->
        <div id="resultsSection" style="display: none;">
            <div class="comparison-results">
                <!-- Unprotected Mode Card -->
                <div class="mode-card unprotected">
                    <div class="mode-header">
                        <h3 class="mode-title">무방비 모드</h3>
                        <span class="mode-badge">보안 OFF</span>
                    </div>

                    <div class="stats-grid">
                        <div class="stat-box">
                            <div class="stat-value" id="unprotectedDetection">0%</div>
                            <div class="stat-label">탐지율</div>
                        </div>
                        <div class="stat-box">
                            <div class="stat-value" id="unprotectedBlocking">0%</div>
                            <div class="stat-label">차단율</div>
                        </div>
                        <div class="stat-box">
                            <div class="stat-value" id="unprotectedSuccess">0</div>
                            <div class="stat-label">성공한 공격</div>
                        </div>
                        <div class="stat-box">
                            <div class="stat-value" id="unprotectedTime">0ms</div>
                            <div class="stat-label">평균 처리시간</div>
                        </div>
                    </div>

                    <div class="progress-container">
                        <div class="progress">
                            <div class="progress-bar" id="unprotectedProgress" style="width: 0%">0%</div>
                        </div>
                    </div>
                </div>

                <!-- Protected Mode Card -->
                <div class="mode-card protected">
                    <div class="mode-header">
                        <h3 class="mode-title">방어 모드</h3>
                        <span class="mode-badge">보안 ON</span>
                    </div>

                    <div class="stats-grid">
                        <div class="stat-box">
                            <div class="stat-value" id="protectedDetection">0%</div>
                            <div class="stat-label">탐지율</div>
                        </div>
                        <div class="stat-box">
                            <div class="stat-value" id="protectedBlocking">0%</div>
                            <div class="stat-label">차단율</div>
                        </div>
                        <div class="stat-box">
                            <div class="stat-value" id="protectedSuccess">0</div>
                            <div class="stat-label">성공한 공격</div>
                        </div>
                        <div class="stat-box">
                            <div class="stat-value" id="protectedTime">0ms</div>
                            <div class="stat-label">평균 처리시간</div>
                        </div>
                    </div>

                    <div class="progress-container">
                        <div class="progress">
                            <div class="progress-bar" id="protectedProgress" style="width: 0%">0%</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Improvement Card -->
            <div class="improvement-card">
                <h3 class="improvement-title">
                    <i class="fas fa-chart-line me-2"></i>
                    보안 시스템 개선 효과
                </h3>
                <div class="improvement-stats">
                    <div class="improvement-item">
                        <div class="improvement-value" id="detectionImprovement">+0%</div>
                        <div class="improvement-label">탐지율 향상</div>
                    </div>
                    <div class="improvement-item">
                        <div class="improvement-value" id="blockingImprovement">+0%</div>
                        <div class="improvement-label">차단율 향상</div>
                    </div>
                    <div class="improvement-item">
                        <div class="improvement-value" id="overallImprovement">+0%</div>
                        <div class="improvement-label">전체 보안 향상</div>
                    </div>
                </div>
            </div>

            <!-- Comparison Chart -->
            <div class="comparison-chart">
                <h3 class="mb-4">성능 비교 차트</h3>
                <div class="chart-container">
                    <canvas id="comparisonChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <!-- JavaScript -->
    <script>
        // Global variables
        let selectedAttackType = null;
        let currentComparisonId = null;
        let pollingInterval = null;
        let comparisonChart = null;

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            setupEventListeners();
        });

        // Setup event listeners
        function setupEventListeners() {
            // Attack type selection
            document.querySelectorAll('.attack-option').forEach(option => {
                option.addEventListener('click', function() {
                    document.querySelectorAll('.attack-option').forEach(o => o.classList.remove('selected'));
                    this.classList.add('selected');
                    selectedAttackType = this.dataset.attack;
                });
            });

            // Execute button
            document.getElementById('executeBtn').addEventListener('click', executeComparison);
        }

        // Execute comparison simulation
        async function executeComparison() {
            if (!selectedAttackType) {
                showAlert('공격 유형을 선택해주세요.', 'danger');
                return;
            }

            const btn = document.getElementById('executeBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="loading-spinner"></span> 실행 중...';

            const targetUserCount = document.getElementById('targetUserCount').value;
            const intensity = document.getElementById('attackIntensity').value;

            const requestData = {
                attackType: selectedAttackType,
                targetUserCount: parseInt(targetUserCount),
                attackParams: {
                    intensity: intensity
                }
            };

            try {
                const response = await fetch('/api/simulation/dual-mode/execute', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(requestData)
                });

                const result = await response.json();

                if (response.ok) {
                    currentComparisonId = result.comparisonId;
                    showAlert('시뮬레이션이 시작되었습니다.', 'info');
                    document.getElementById('resultsSection').style.display = 'block';

                    // Start polling for results
                    startPolling();
                } else {
                    showAlert('시뮬레이션 실행 실패: ' + (result.error || '알 수 없는 오류'), 'danger');
                }
            } catch (error) {
                showAlert('네트워크 오류: ' + error.message, 'danger');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-play me-2"></i>비교 시뮬레이션 실행';
            }
        }

        // Start polling for results
        function startPolling() {
            if (pollingInterval) {
                clearInterval(pollingInterval);
            }

            // Poll every 2 seconds
            pollingInterval = setInterval(async () => {
                await checkStatus();
                await checkResults();
            }, 2000);

            // Initial check
            checkStatus();
            checkResults();
        }

        // Check simulation status
        async function checkStatus() {
            if (!currentComparisonId) return;

            try {
                const response = await fetch(`/api/simulation/dual-mode/status/${currentComparisonId}`);
                const status = await response.json();

                if (response.ok) {
                    updateProgress(status);

                    if (status.status === 'COMPLETED') {
                        clearInterval(pollingInterval);
                        showAlert('시뮬레이션이 완료되었습니다!', 'success');
                    }
                }
            } catch (error) {
                console.error('Status check error:', error);
            }
        }

        // Check simulation results
        async function checkResults() {
            if (!currentComparisonId) return;

            try {
                const response = await fetch(`/api/simulation/dual-mode/results/${currentComparisonId}`);
                const results = await response.json();

                if (response.ok && results.unprotected && results.protected) {
                    updateResults(results);
                    updateChart(results);
                }
            } catch (error) {
                console.error('Results check error:', error);
            }
        }

        // Update progress bars
        function updateProgress(status) {
            // Update unprotected progress
            const unprotectedProgress = status.unprotectedProgress === 'COMPLETED' ? 100 :
                                       status.unprotectedProgress === 'RUNNING' ? 50 : 0;
            const unprotectedBar = document.getElementById('unprotectedProgress');
            unprotectedBar.style.width = unprotectedProgress + '%';
            unprotectedBar.textContent = unprotectedProgress + '%';

            // Update protected progress
            const protectedProgress = status.protectedProgress === 'COMPLETED' ? 100 :
                                    status.protectedProgress === 'RUNNING' ? 50 : 0;
            const protectedBar = document.getElementById('protectedProgress');
            protectedBar.style.width = protectedProgress + '%';
            protectedBar.textContent = protectedProgress + '%';
        }

        // Update results display
        function updateResults(results) {
            // Update unprotected stats
            if (results.unprotected) {
                const unprotected = results.unprotected;
                document.getElementById('unprotectedDetection').textContent =
                    Math.round(unprotected.detectionRate * 100) + '%';
                document.getElementById('unprotectedBlocking').textContent =
                    Math.round(unprotected.blockingRate * 100) + '%';
                document.getElementById('unprotectedSuccess').textContent =
                    unprotected.totalCount - unprotected.blockedCount;
                document.getElementById('unprotectedTime').textContent =
                    Math.round(unprotected.averageProcessingTime) + 'ms';
            }

            // Update protected stats
            if (results.protected) {
                const protected = results.protected;
                document.getElementById('protectedDetection').textContent =
                    Math.round(protected.detectionRate * 100) + '%';
                document.getElementById('protectedBlocking').textContent =
                    Math.round(protected.blockingRate * 100) + '%';
                document.getElementById('protectedSuccess').textContent =
                    protected.totalCount - protected.blockedCount;
                document.getElementById('protectedTime').textContent =
                    Math.round(protected.averageProcessingTime) + 'ms';
            }

            // Update improvement stats
            if (results.improvement) {
                const improvement = results.improvement;
                document.getElementById('detectionImprovement').textContent =
                    '+' + Math.round(improvement.detectionImprovement * 100) + '%';
                document.getElementById('blockingImprovement').textContent =
                    '+' + Math.round(improvement.blockingImprovement * 100) + '%';
                document.getElementById('overallImprovement').textContent =
                    '+' + Math.round(improvement.overallImprovement * 100) + '%';
            }
        }

        // Update comparison chart
        function updateChart(results) {
            const ctx = document.getElementById('comparisonChart');

            if (comparisonChart) {
                comparisonChart.destroy();
            }

            comparisonChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['탐지율', '차단율', '평균 처리시간 (ms)'],
                    datasets: [
                        {
                            label: '무방비 모드',
                            data: [
                                results.unprotected ? results.unprotected.detectionRate * 100 : 0,
                                results.unprotected ? results.unprotected.blockingRate * 100 : 0,
                                results.unprotected ? results.unprotected.averageProcessingTime : 0
                            ],
                            backgroundColor: 'rgba(255, 81, 47, 0.5)',
                            borderColor: 'rgba(255, 81, 47, 1)',
                            borderWidth: 2
                        },
                        {
                            label: '방어 모드',
                            data: [
                                results.protected ? results.protected.detectionRate * 100 : 0,
                                results.protected ? results.protected.blockingRate * 100 : 0,
                                results.protected ? results.protected.averageProcessingTime : 0
                            ],
                            backgroundColor: 'rgba(86, 171, 47, 0.5)',
                            borderColor: 'rgba(86, 171, 47, 1)',
                            borderWidth: 2
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            labels: {
                                color: 'rgba(255, 255, 255, 0.8)'
                            }
                        },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    let label = context.dataset.label || '';
                                    if (label) {
                                        label += ': ';
                                    }
                                    if (context.dataIndex < 2) {
                                        label += context.parsed.y.toFixed(1) + '%';
                                    } else {
                                        label += context.parsed.y.toFixed(0) + 'ms';
                                    }
                                    return label;
                                }
                            }
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            ticks: {
                                color: 'rgba(255, 255, 255, 0.8)'
                            },
                            grid: {
                                color: 'rgba(255, 255, 255, 0.1)'
                            }
                        },
                        x: {
                            ticks: {
                                color: 'rgba(255, 255, 255, 0.8)'
                            },
                            grid: {
                                color: 'rgba(255, 255, 255, 0.1)'
                            }
                        }
                    }
                }
            });
        }

        // Show alert message
        function showAlert(message, type) {
            const alertDiv = document.getElementById('alertMessage');
            alertDiv.className = 'alert-custom alert-' + type + ' show';
            alertDiv.innerHTML = '<i class="fas fa-info-circle me-2"></i>' + message;

            setTimeout(() => {
                alertDiv.classList.remove('show');
            }, 5000);
        }
    </script>
</body>
</html>
