<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>contexa - 자율보안지능 시뮬레이션 대시보드</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>
    <!-- SockJS & STOMP -->
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1.5.2/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
    
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --secondary-gradient: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            --success-gradient: linear-gradient(135deg, #56ab2f 0%, #a8e6cf 100%);
            --warning-gradient: linear-gradient(135deg, #FFB75E 0%, #ED8F03 100%);
            --danger-gradient: linear-gradient(135deg, #FF512F 0%, #DD2476 100%);
            --dark-bg: rgba(15, 23, 42, 0.95);
            --card-bg: rgba(30, 41, 59, 0.8);
            --card-hover-bg: rgba(51, 65, 85, 0.9);
            --text-primary: rgba(255, 255, 255, 0.95);
            --text-secondary: rgba(148, 163, 184, 0.8);
            --border-color: rgba(71, 85, 105, 0.3);
            --accent-blue: #3b82f6;
            --accent-purple: #8b5cf6;
            --accent-cyan: #06b6d4;
            --glass-effect: rgba(255, 255, 255, 0.1);
        }

        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            color: var(--text-primary);
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 50%, rgba(120, 119, 198, 0.3), transparent 50%),
                        radial-gradient(circle at 80% 20%, rgba(255, 119, 198, 0.3), transparent 50%),
                        radial-gradient(circle at 40% 80%, rgba(120, 219, 255, 0.3), transparent 50%);
            pointer-events: none;
            z-index: -1;
        }
        
        .dashboard-container {
            padding: 2rem;
            position: relative;
        }
        
        .card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3),
                        0 10px 10px -5px rgba(0, 0, 0, 0.2);
            margin-bottom: 2rem;
            animation: fadeIn 0.6s ease-out;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .card:hover {
            background: var(--card-hover-bg);
            transform: translateY(-4px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.4);
        }

        .card-body {
            padding: 2rem;
        }

        .card-title {
            color: var(--text-primary);
            font-weight: 600;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .card-title i {
            color: var(--accent-blue);
            font-size: 1.25rem;
        }
        
        @keyframes fadeIn {
            from { 
                opacity: 0; 
                transform: translateY(30px) scale(0.95); 
            }
            to { 
                opacity: 1; 
                transform: translateY(0) scale(1); 
            }
        }
        
        .metric-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 1.5rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .metric-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: var(--gradient);
        }

        .metric-card:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.4);
        }
        
        .metric-card.success { --gradient: var(--success-gradient); }
        .metric-card.warning { --gradient: var(--warning-gradient); }
        .metric-card.danger { --gradient: var(--danger-gradient); }
        .metric-card.info { --gradient: var(--primary-gradient); }

        .metric-card h6 {
            color: var(--text-secondary);
            font-size: 0.875rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .metric-card h2 {
            color: var(--text-primary);
            font-weight: 700;
            font-size: 2.5rem;
            margin-bottom: 0.25rem;
        }

        .metric-card small {
            color: var(--text-secondary);
            font-size: 0.75rem;
        }
        
        .attack-event {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1rem;
            margin: 0.75rem 0;
            animation: slideIn 0.4s ease-out;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .attack-event::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 4px;
            background: var(--severity-color);
        }

        .attack-event:hover {
            background: var(--card-hover-bg);
            transform: translateX(8px);
        }
        
        @keyframes slideIn {
            from { 
                transform: translateX(-100%) scale(0.9);
                opacity: 0;
            }
            to { 
                transform: translateX(0) scale(1);
                opacity: 1;
            }
        }
        
        .severity-CRITICAL { --severity-color: #ef4444; }
        .severity-HIGH { --severity-color: #f97316; }
        .severity-MEDIUM { --severity-color: #eab308; }
        .severity-LOW { --severity-color: #22c55e; }
        
        .tier-flow {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 2rem;
            gap: 1rem;
        }
        
        .tier-box {
            flex: 1;
            text-align: center;
            padding: 2rem 1.5rem;
            border-radius: 20px;
            position: relative;
            background: var(--tier-gradient);
            box-shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.3);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .tier-box:hover {
            transform: translateY(-8px) scale(1.05);
            box-shadow: 0 20px 40px -5px rgba(0, 0, 0, 0.4);
        }
        
        .tier-1 { --tier-gradient: var(--primary-gradient); }
        .tier-2 { --tier-gradient: var(--secondary-gradient); }
        .tier-3 { --tier-gradient: var(--danger-gradient); }

        .tier-box h3 {
            color: white;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .tier-box p {
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 1rem;
        }

        .tier-box h4 {
            color: white;
            font-weight: 800;
            font-size: 2rem;
        }
        
        .tier-arrow {
            position: absolute;
            right: -20px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 2rem;
            color: var(--accent-cyan);
            filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.3));
            z-index: 10;
        }
        
        .soar-queue {
            max-height: 400px;
            overflow-y: auto;
            padding-right: 0.5rem;
        }

        .soar-queue::-webkit-scrollbar {
            width: 6px;
        }

        .soar-queue::-webkit-scrollbar-track {
            background: rgba(71, 85, 105, 0.2);
            border-radius: 3px;
        }

        .soar-queue::-webkit-scrollbar-thumb {
            background: var(--accent-blue);
            border-radius: 3px;
        }
        
        .approval-item {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 1.5rem;
            margin: 1rem 0;
            transition: all 0.3s ease;
        }

        .approval-item:hover {
            background: var(--card-hover-bg);
            transform: translateY(-2px);
        }
        
        .btn {
            border-radius: 12px;
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: none;
            backdrop-filter: blur(10px);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
        }

        .btn-primary {
            background: var(--primary-gradient);
            box-shadow: 0 4px 15px -3px rgba(102, 126, 234, 0.4);
        }

        .btn-info {
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-blue));
            box-shadow: 0 4px 15px -3px rgba(6, 182, 212, 0.4);
        }

        .btn-warning {
            background: var(--warning-gradient);
            box-shadow: 0 4px 15px -3px rgba(255, 183, 94, 0.4);
        }

        .btn-danger {
            background: var(--danger-gradient);
            box-shadow: 0 4px 15px -3px rgba(255, 81, 47, 0.4);
        }

        .btn-approve { 
            background: var(--success-gradient);
            box-shadow: 0 4px 15px -3px rgba(34, 197, 94, 0.4);
        }
        
        .btn-reject { 
            background: var(--danger-gradient);
            box-shadow: 0 4px 15px -3px rgba(239, 68, 68, 0.4);
        }
        
        .live-indicator {
            display: inline-block;
            width: 12px;
            height: 12px;
            background: var(--accent-cyan);
            border-radius: 50%;
            animation: pulse 2s infinite;
            margin-right: 0.5rem;
            box-shadow: 0 0 0 0 rgba(6, 182, 212, 0.4);
        }
        
        @keyframes pulse {
            0% { 
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(6, 182, 212, 0.7);
            }
            70% { 
                transform: scale(1.1);
                box-shadow: 0 0 0 10px rgba(6, 182, 212, 0);
            }
            100% { 
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(6, 182, 212, 0);
            }
        }
        
        .simulation-control {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
        }

        .simulation-control h5 {
            color: var(--text-primary);
            font-weight: 600;
            margin-bottom: 1.5rem;
        }

        .form-select {
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: var(--text-primary);
            padding: 0.75rem 1rem;
            transition: all 0.3s ease;
        }

        .form-select:focus {
            background: rgba(51, 65, 85, 0.9);
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
            color: var(--text-primary);
        }

        .form-select option {
            background: #1e293b;
            color: var(--text-primary);
        }
        
        .attack-type-badge {
            display: inline-block;
            padding: 0.375rem 0.75rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 500;
            margin: 0.125rem;
            background: linear-gradient(135deg, var(--accent-purple), var(--accent-blue));
            color: white;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .text-white {
            color: var(--text-primary) !important;
        }

        .text-muted {
            color: var(--text-secondary) !important;
        }

        /* Chart containers */
        .chart-container {
            position: relative;
            height: 300px;
            background: rgba(15, 23, 42, 0.3);
            border-radius: 16px;
            padding: 1rem;
        }

        /* Header styling */
        .dashboard-container > .text-center {
            margin-bottom: 3rem;
        }

        .dashboard-container > .text-center h1 {
            font-size: 3rem;
            font-weight: 800;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 1rem;
        }

        .dashboard-container > .text-center p {
            font-size: 1.125rem;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        /* Responsive adjustments */
        @media (max-width: 768px) {
            .dashboard-container {
                padding: 1rem;
            }
            
            .tier-flow {
                flex-direction: column;
                gap: 1rem;
            }
            
            .tier-arrow {
                display: none;
            }
            
            .card-body {
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <!-- 헤더 -->
        <div class="text-center text-white mb-4">
            <h1><i class="fas fa-shield-alt"></i> contexa 자율보안지능 시뮬레이션</h1>
            <p><span class="live-indicator"></span> 실시간 모니터링 중</p>
        </div>
        
        <!-- 시뮬레이션 제어 패널 -->
        <div class="simulation-control">
            <div class="row">
                <div class="col-md-3">
                    <h5>시뮬레이션 제어</h5>
                    <div class="btn-group-vertical w-100">
                        <button class="btn btn-primary mb-2" onclick="startComprehensive()">
                            <i class="fas fa-play"></i> 종합 시뮬레이션
                        </button>
                        <button class="btn btn-info mb-2" onclick="startTierEscalation()">
                            <i class="fas fa-layer-group"></i> 3-Tier 테스트
                        </button>
                        <button class="btn btn-warning mb-2" onclick="startContinuous()">
                            <i class="fas fa-stream"></i> 연속 스트림
                        </button>
                        <button class="btn btn-danger" onclick="stopAll()">
                            <i class="fas fa-stop"></i> 모두 중지
                        </button>
                    </div>
                </div>
                
                <div class="col-md-3">
                    <h5>공격 주입</h5>
                    <select id="attackType" class="form-select mb-2">
                        <option value="BRUTE_FORCE">Brute Force</option>
                        <option value="CREDENTIAL_STUFFING">Credential Stuffing</option>
                        <option value="SESSION_HIJACKING">Session Hijacking</option>
                        <option value="PRIVILEGE_ESCALATION">Privilege Escalation</option>
                        <option value="IDOR">IDOR</option>
                        <option value="API_BYPASS">API Bypass</option>
                        <option value="IMPOSSIBLE_TRAVEL">Impossible Travel</option>
                        <option value="ABNORMAL_BEHAVIOR">Abnormal Behavior</option>
                    </select>
                    <button class="btn btn-warning w-100" onclick="injectAttack()">
                        <i class="fas fa-virus"></i> 공격 주입
                    </button>
                </div>
                
                <div class="col-md-6">
                    <h5>실시간 통계</h5>
                    <div class="row">
                        <div class="col-6">
                            <small class="text-muted">총 이벤트</small>
                            <h3 id="totalEvents">0</h3>
                        </div>
                        <div class="col-6">
                            <small class="text-muted">처리 완료</small>
                            <h3 id="processedEvents">0</h3>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 메트릭 카드 -->
        <div class="row">
            <div class="col-md-3">
                <div class="metric-card success">
                    <h6 class="text-muted">Layer 1 이벤트</h6>
                    <h2 id="layer1Count">0</h2>
                    <small>낮은 위험도</small>
                </div>
            </div>
            <div class="col-md-3">
                <div class="metric-card warning">
                    <h6 class="text-muted">Layer 2 이벤트</h6>
                    <h2 id="layer2Count">0</h2>
                    <small>중간 위험도</small>
                </div>
            </div>
            <div class="col-md-3">
                <div class="metric-card danger">
                    <h6 class="text-muted">Layer 3 이벤트</h6>
                    <h2 id="layer3Count">0</h2>
                    <small>높은 위험도</small>
                </div>
            </div>
            <div class="col-md-3">
                <div class="metric-card info">
                    <h6 class="text-muted">SOAR 실행</h6>
                    <h2 id="soarCount">0</h2>
                    <small>도구 실행 수</small>
                </div>
            </div>
        </div>
        
        <!-- 3-Tier 라우팅 플로우 -->
        <div class="card">
            <div class="card-body">
                <h5 class="card-title">3-Tier 라우팅 플로우</h5>
                <div class="tier-flow">
                    <div class="tier-box tier-1">
                        <h3>Layer 1</h3>
                        <p>자동 차단</p>
                        <h4 id="tier1Percent">0%</h4>
                        <div class="tier-arrow">→</div>
                    </div>
                    <div class="tier-box tier-2">
                        <h3>Layer 2</h3>
                        <p>AI 분석</p>
                        <h4 id="tier2Percent">0%</h4>
                        <div class="tier-arrow">→</div>
                    </div>
                    <div class="tier-box tier-3">
                        <h3>Layer 3</h3>
                        <p>SOAR 대응</p>
                        <h4 id="tier3Percent">0%</h4>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 실시간 공격 이벤트 & SOAR 승인 큐 -->
        <div class="row">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">
                            <i class="fas fa-exclamation-triangle"></i> 실시간 공격 이벤트
                        </h5>
                        <div id="attackEvents" class="attack-events" style="max-height: 400px; overflow-y: auto;">
                            <!-- 실시간 이벤트가 여기 표시됨 -->
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="col-md-6">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">
                            <i class="fas fa-user-check"></i> SOAR 승인 큐
                        </h5>
                        <div id="soarQueue" class="soar-queue">
                            <!-- SOAR 승인 대기 항목이 여기 표시됨 -->
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 성능 차트 -->
        <div class="row mt-4">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">처리 성능</h5>
                        <canvas id="performanceChart"></canvas>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">공격 유형 분포</h5>
                        <canvas id="attackTypeChart"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- JavaScript -->
    <script th:inline="javascript">
        /*<![CDATA[*/
        // WebSocket 연결
        let stompClient = null;
        let eventSource = null;
        
        // 통계 데이터
        let stats = {
            totalEvents: 0,
            processedEvents: 0,
            layer1: 0,
            layer2: 0,
            layer3: 0,
            soar: 0,
            attackTypes: {}
        };
        
        // 차트 초기화
        const performanceCtx = document.getElementById('performanceChart').getContext('2d');
        const performanceChart = new Chart(performanceCtx, {
            type: 'line',
            data: {
                labels: [],
                datasets: [{
                    label: '처리 시간 (ms)',
                    data: [],
                    borderColor: 'rgb(75, 192, 192)',
                    tension: 0.1
                }]
            },
            options: {
                responsive: true,
                scales: {
                    y: {
                        beginAtZero: true
                    }
                }
            }
        });
        
        const attackTypeCtx = document.getElementById('attackTypeChart').getContext('2d');
        const attackTypeChart = new Chart(attackTypeCtx, {
            type: 'doughnut',
            data: {
                labels: [],
                datasets: [{
                    data: [],
                    backgroundColor: [
                        '#FF6384', '#36A2EB', '#FFCE56', '#4BC0C0',
                        '#9966FF', '#FF9F40', '#FF6384', '#C9CBCF'
                    ]
                }]
            },
            options: {
                responsive: true
            }
        });
        
        // WebSocket 연결 설정
        function connect() {
            const socket = new SockJS('/ws');
            stompClient = Stomp.over(socket);
            
            stompClient.connect({}, function(frame) {
                console.log('WebSocket 연결됨: ' + frame);
                
                // 시뮬레이션 이벤트 구독
                stompClient.subscribe('/topic/simulation/events', function(message) {
                    const event = JSON.parse(message.body);
                    handleSimulationEvent(event);
                });
                
                // SOAR 승인 큐 구독
                stompClient.subscribe('/topic/soar/approvals', function(message) {
                    const approval = JSON.parse(message.body);
                    handleSoarApproval(approval);
                });
                
                // 파이프라인 업데이트 구독
                stompClient.subscribe('/topic/soar/pipeline', function(message) {
                    const update = JSON.parse(message.body);
                    handlePipelineUpdate(update);
                });
            });
        }
        
        // SSE 연결 (실시간 이벤트 스트림)
        function connectEventStream(sessionId) {
            if (eventSource) {
                eventSource.close();
            }
            
            eventSource = new EventSource('/simulation/stream/' + sessionId);
            
            eventSource.onmessage = function(event) {
                const data = JSON.parse(event.data);
                updateStats(data.data);
            };
            
            eventSource.onerror = function(error) {
                console.error('SSE 에러:', error);
                eventSource.close();
            };
        }
        
        // 시뮬레이션 이벤트 처리
        function handleSimulationEvent(event) {
            stats.totalEvents++;
            updateStatsDisplay();
            
            // 공격 이벤트 표시
            addAttackEvent(event);
            
            // 차트 업데이트
            updateCharts(event);
        }
        
        // 공격 이벤트 추가
        function addAttackEvent(event) {
            const container = document.getElementById('attackEvents');
            const eventDiv = document.createElement('div');
            eventDiv.className = 'attack-event severity-' + (event.data.severity || 'MEDIUM');
            
            const attackType = event.data.attackType || 'UNKNOWN';
            const riskScore = event.data.riskScore || 0;
            
            eventDiv.innerHTML = `
                <div class="d-flex justify-content-between">
                    <div>
                        <strong>${attackType}</strong>
                        <span class="attack-type-badge">${event.eventType}</span>
                    </div>
                    <small>${new Date().toLocaleTimeString()}</small>
                </div>
                <div>위험도: ${riskScore.toFixed(1)} | ${event.data.sourceIp || 'Unknown'}</div>
            `;
            
            container.insertBefore(eventDiv, container.firstChild);
            
            // 최대 20개만 표시
            if (container.children.length > 20) {
                container.removeChild(container.lastChild);
            }
        }
        
        // SOAR 승인 처리
        function handleSoarApproval(approval) {
            const queue = document.getElementById('soarQueue');
            const approvalDiv = document.createElement('div');
            approvalDiv.className = 'approval-item';
            approvalDiv.id = 'approval-' + approval.approvalId;
            
            approvalDiv.innerHTML = `
                <div class="d-flex justify-content-between">
                    <div>
                        <strong>${approval.toolName}</strong>
                        <p class="mb-1">${approval.reason || '고위험 도구 실행 승인 필요'}</p>
                    </div>
                    <div>
                        <button class="btn btn-sm btn-approve" onclick="approveTools('${approval.approvalId}')">
                            승인
                        </button>
                        <button class="btn btn-sm btn-reject" onclick="rejectTools('${approval.approvalId}')">
                            거부
                        </button>
                    </div>
                </div>
            `;
            
            queue.insertBefore(approvalDiv, queue.firstChild);
            stats.soar++;
            updateStatsDisplay();
        }
        
        // 통계 업데이트
        function updateStats(data) {
            if (data.totalEvents) stats.totalEvents = data.totalEvents;
            if (data.processedEvents) stats.processedEvents = data.processedEvents;
            updateStatsDisplay();
        }
        
        function updateStatsDisplay() {
            document.getElementById('totalEvents').textContent = stats.totalEvents;
            document.getElementById('processedEvents').textContent = stats.processedEvents;
            document.getElementById('layer1Count').textContent = stats.layer1;
            document.getElementById('layer2Count').textContent = stats.layer2;
            document.getElementById('layer3Count').textContent = stats.layer3;
            document.getElementById('soarCount').textContent = stats.soar;
            
            // 3-Tier 백분율 계산
            const total = stats.layer1 + stats.layer2 + stats.layer3;
            if (total > 0) {
                document.getElementById('tier1Percent').textContent = 
                    Math.round(stats.layer1 / total * 100) + '%';
                document.getElementById('tier2Percent').textContent = 
                    Math.round(stats.layer2 / total * 100) + '%';
                document.getElementById('tier3Percent').textContent = 
                    Math.round(stats.layer3 / total * 100) + '%';
            }
        }
        
        // Tier별 통계 업데이트
        function updateTierStats(tier, data) {
            if (tier === 1) stats.layer1 += data.results ? data.results.length : 0;
            else if (tier === 2) stats.layer2 += data.results ? data.results.length : 0;
            else if (tier === 3) stats.layer3 += data.results ? data.results.length : 0;
            updateStatsDisplay();
        }
        
        // 스트리밍 통계 업데이트
        function updateStreamingStats() {
            fetch('/api/simulation/statistics')
                .then(response => response.json())
                .then(data => {
                    stats.totalEvents = data.totalAttacks || stats.totalEvents;
                    stats.processedEvents = data.detectedAttacks || stats.processedEvents;
                    updateStatsDisplay();
                })
                .catch(error => console.error('스트리밍 통계 업데이트 오류:', error));
        }
        
        // 차트 업데이트
        function updateCharts(event) {
            // 성능 차트
            const now = new Date().toLocaleTimeString();
            performanceChart.data.labels.push(now);
            performanceChart.data.datasets[0].data.push(Math.random() * 100 + 50);
            
            if (performanceChart.data.labels.length > 20) {
                performanceChart.data.labels.shift();
                performanceChart.data.datasets[0].data.shift();
            }
            performanceChart.update();
            
            // 공격 유형 차트
            const attackType = event.data.attackType || 'UNKNOWN';
            if (!stats.attackTypes[attackType]) {
                stats.attackTypes[attackType] = 0;
            }
            stats.attackTypes[attackType]++;
            
            attackTypeChart.data.labels = Object.keys(stats.attackTypes);
            attackTypeChart.data.datasets[0].data = Object.values(stats.attackTypes);
            attackTypeChart.update();
        }
        
        // 시뮬레이션 제어 함수
        function startComprehensive() {
            const campaignId = 'COMP-' + Date.now();
            fetch('/api/simulation/campaign/start', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    campaignId: campaignId,
                    name: 'Comprehensive Test',
                    description: '종합 보안 시뮬레이션',
                    strategies: ['BRUTE_FORCE', 'CREDENTIAL_STUFFING', 'PRIVILEGE_ESCALATION', 'IDOR', 'IMPOSSIBLE_TRAVEL'],
                    targetUsers: ['admin', 'user1', 'user2', 'test_user'],
                    duration: 300000,  // 5분
                    intensity: 7
                })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    alert('종합 시뮬레이션 시작: ' + campaignId);
                    connectEventStream(campaignId);
                } else {
                    alert('시뮬레이션 시작 실패: ' + data.message);
                }
            });
        }
        
        function startTierEscalation() {
            // 3-Tier 에스컬레이션 테스트 - 점진적으로 강도를 높이는 공격
            const strategies = [
                ['BRUTE_FORCE'],  // Tier 1
                ['SESSION_HIJACKING', 'IDOR'],  // Tier 2
                ['PRIVILEGE_ESCALATION', 'API_BYPASS']  // Tier 3
            ];
            
            let tier = 1;
            strategies.forEach(tierStrategies => {
                setTimeout(() => {
                    fetch('/api/simulation/attack/parallel', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({
                            strategies: tierStrategies,
                            targetUsers: ['tier' + tier + '_user'],
                            parallel: true
                        })
                    })
                    .then(response => response.json())
                    .then(data => {
                        console.log('Tier ' + tier + ' 공격 실행:', data);
                        updateTierStats(tier, data);
                    });
                    tier++;
                }, (tier - 1) * 10000);  // 10초 간격
            });
            
            alert('3-Tier 에스컬레이션 테스트 시작');
        }
        
        function startContinuous() {
            // 연속 공격 스트림 - 10분간 지속적인 공격 시뮬레이션
            const campaignId = 'STREAM-' + Date.now();
            
            fetch('/api/simulation/attack/adaptive', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    targetUser: 'stream_target',
                    iterations: 60,  // 10분간 10초마다 = 60회
                    adaptToDefenses: true
                })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    alert('연속 스트림 시작');
                    // 10초마다 상태 업데이트
                    const intervalId = setInterval(() => {
                        updateStreamingStats();
                    }, 10000);
                    
                    // 10분 후 중지
                    setTimeout(() => {
                        clearInterval(intervalId);
                        alert('연속 스트림 완료');
                    }, 600000);
                }
            });
        }
        
        function stopAll() {
            // 현재는 개별 캠페인 중지 API가 없으므로 프론트엔드에서 관리
            if (eventSource) {
                eventSource.close();
            }
            
            // WebSocket 연결 종료
            if (stompClient && stompClient.connected) {
                stompClient.disconnect();
            }
            
            // 통계 초기화
            stats = {
                totalEvents: 0,
                processedEvents: 0,
                layer1: 0,
                layer2: 0,
                layer3: 0,
                soar: 0,
                attackTypes: {}
            };
            updateStatsDisplay();
            
            alert('모든 시뮬레이션 중지됨');
        }
        
        function injectAttack() {
            const attackType = document.getElementById('attackType').value;
            
            fetch('/api/simulation/attack/single', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    strategyName: attackType,
                    targetUser: 'injected_target_' + Date.now(),
                    parameters: {
                        source: 'manual_injection',
                        timestamp: new Date().toISOString()
                    }
                })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    console.log('공격 주입 성공:', data);
                    // 공격 결과를 UI에 반영
                    if (data.result) {
                        const event = {
                            eventType: 'ATTACK_INJECTED',
                            data: {
                                attackType: data.result.type || attackType,
                                severity: data.result.riskLevel || 'MEDIUM',
                                riskScore: data.result.riskScore || 0.5,
                                sourceIp: '127.0.0.1'
                            }
                        };
                        handleSimulationEvent(event);
                    }
                } else {
                    alert('공격 주입 실패: ' + data.message);
                }
            })
            .catch(error => {
                console.error('공격 주입 오류:', error);
                alert('공격 주입 중 오류 발생');
            });
        }
        
        function approveTools(approvalId) {
            // TODO: SOAR 도구 승인 API 호출
            document.getElementById('approval-' + approvalId).style.background = '#d4edda';
        }
        
        function rejectTools(approvalId) {
            // TODO: SOAR 도구 거부 API 호출
            document.getElementById('approval-' + approvalId).style.background = '#f8d7da';
        }
        
        // 페이지 로드 시 초기화
        window.onload = function() {
            connect();
            updateStatsDisplay();
            
            // 시뮬레이션 상태 주기적 업데이트
            setInterval(function() {
                fetch('/api/simulation/statistics')
                    .then(response => response.json())
                    .then(data => {
                        // 통계 업데이트
                        if (data.totalAttacks) {
                            stats.totalEvents = data.totalAttacks;
                        }
                        if (data.detectedAttacks) {
                            stats.processedEvents = data.detectedAttacks;
                        }
                        
                        // Layer별 분류 (위험도 기준)
                        if (data.riskLevelDistribution) {
                            stats.layer1 = data.riskLevelDistribution.LOW || 0;
                            stats.layer2 = data.riskLevelDistribution.MEDIUM || 0;
                            stats.layer3 = data.riskLevelDistribution.HIGH || 0;
                        }
                        
                        // 공격 유형 분포
                        if (data.attackTypeBreakdown) {
                            stats.attackTypes = data.attackTypeBreakdown;
                        }
                        
                        updateStatsDisplay();
                        
                        // 차트 업데이트
                        if (data.attackTypeBreakdown) {
                            attackTypeChart.data.labels = Object.keys(data.attackTypeBreakdown);
                            attackTypeChart.data.datasets[0].data = Object.values(data.attackTypeBreakdown);
                            attackTypeChart.update();
                        }
                    })
                    .catch(error => console.error('통계 업데이트 오류:', error));
            }, 5000);
        };
        /*]]>*/
    </script>
