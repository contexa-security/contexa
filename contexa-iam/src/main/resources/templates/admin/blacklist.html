<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="ko">
<head th:replace="~{fragments/common-head :: head-elements(pageTitle='Zero Trust - 차단 사용자')}"></head>
<body class="flex flex-col min-h-screen font-sans">

<div th:insert="~{fragments/header :: header}"></div>
<div id="toast-container" class="fixed top-5 right-5 z-50 w-full max-w-xs sm:max-w-sm"></div>

<div class="flex flex-1">
    <aside th:insert="~{fragments/admin-menu :: menu}" class="hidden md:block"></aside>

    <main class="flex-1 p-6 md:p-10">
        <div class="mx-auto dark-card p-6 sm:p-8 rounded-xl">
            <div class="mb-8 text-center sm:text-left">
                <h1 class="text-3xl font-bold text-gradient">Zero Trust - 차단 사용자</h1>
                <p class="text-dark-muted mt-1">AI Native Zero Trust 차단 사용자 관리</p>
            </div>

            <div class="flex gap-2 mb-6">
                <a th:href="@{/admin/blacklist(filter='all')}"
                   th:classappend="${currentFilter == 'all'} ? 'filter-active' : 'filter-inactive'"
                   class="px-4 py-2 rounded-lg text-sm font-medium transition-all duration-300">전체</a>
                <a th:href="@{/admin/blacklist(filter='blocked')}"
                   th:classappend="${currentFilter == 'blocked'} ? 'filter-active' : 'filter-inactive'"
                   class="px-4 py-2 rounded-lg text-sm font-medium transition-all duration-300">차단중</a>
                <a th:href="@{/admin/blacklist(filter='unblock_requested')}"
                   th:classappend="${currentFilter == 'unblock_requested'} ? 'filter-active-warn' : 'filter-inactive'"
                   class="px-4 py-2 rounded-lg text-sm font-medium transition-all duration-300">해지 요청</a>
                <a th:href="@{/admin/blacklist(filter='resolved')}"
                   th:classappend="${currentFilter == 'resolved'} ? 'filter-active' : 'filter-inactive'"
                   class="px-4 py-2 rounded-lg text-sm font-medium transition-all duration-300">해제됨</a>
            </div>

            <div class="overflow-x-auto shadow-md rounded-lg">
                <table class="min-w-full w-full text-sm text-left">
                    <thead class="text-xs text-white uppercase" style="background: linear-gradient(135deg, #1e293b 0%, #334155 100%);">
                    <tr>
                        <th scope="col" class="py-3.5 px-6 font-semibold">ID</th>
                        <th scope="col" class="py-3.5 px-6 font-semibold">User ID</th>
                        <th scope="col" class="py-3.5 px-6 font-semibold">Username</th>
                        <th scope="col" class="py-3.5 px-6 font-semibold">Risk Score</th>
                        <th scope="col" class="py-3.5 px-6 font-semibold">Confidence</th>
                        <th scope="col" class="py-3.5 px-6 font-semibold">차단 일시</th>
                        <th scope="col" class="py-3.5 px-6 font-semibold">차단 횟수</th>
                        <th scope="col" class="py-3.5 px-6 font-semibold">상태</th>
                        <th scope="col" class="py-3.5 px-6 font-semibold">관리</th>
                    </tr>
                    </thead>
                    <tbody class="divide-y" style="background: rgba(15, 23, 42, 0.6); color: #e2e8f0; border-color: rgba(71, 85, 105, 0.3);">
                    <tr th:each="b : ${blockedUsers}" style="border-color: rgba(71, 85, 105, 0.3);">
                        <td class="py-4 px-6" th:text="${b.id}"></td>
                        <td class="py-4 px-6" th:text="${b.userId}"></td>
                        <td class="py-4 px-6" th:text="${b.username}"></td>
                        <td class="py-4 px-6">
                            <span th:text="${b.riskScore != null} ? ${#numbers.formatDecimal(b.riskScore, 1, 3)} : '-'"
                                  th:style="${b.riskScore != null AND b.riskScore >= 0.8} ? 'color: #f87171;' : (${b.riskScore != null AND b.riskScore >= 0.5} ? 'color: #fbbf24;' : 'color: #4ade80;')"></span>
                        </td>
                        <td class="py-4 px-6" th:text="${b.confidence != null} ? ${#numbers.formatDecimal(b.confidence, 1, 3)} : '-'"></td>
                        <td class="py-4 px-6" th:text="${#temporals.format(b.blockedAt, 'yyyy-MM-dd HH:mm')}"></td>
                        <td class="py-4 px-6 text-center" th:text="${b.blockCount}"></td>
                        <td class="py-4 px-6">
                            <span th:if="${b.status.name() == 'BLOCKED'}"
                                  class="px-3 py-1 rounded-full text-xs font-semibold"
                                  style="background: rgba(239, 68, 68, 0.2); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.3);">BLOCKED</span>
                            <span th:if="${b.status.name() == 'UNBLOCK_REQUESTED'}"
                                  class="px-3 py-1 rounded-full text-xs font-semibold"
                                  style="background: rgba(251, 191, 36, 0.2); color: #fbbf24; border: 1px solid rgba(251, 191, 36, 0.3);">UNBLOCK REQUESTED</span>
                            <span th:if="${b.status.name() == 'RESOLVED'}"
                                  class="px-3 py-1 rounded-full text-xs font-semibold"
                                  style="background: rgba(34, 197, 94, 0.2); color: #4ade80; border: 1px solid rgba(34, 197, 94, 0.3);">RESOLVED</span>
                        </td>
                        <td class="py-4 px-6">
                            <a th:href="@{/admin/blacklist/{id}(id=${b.id})}"
                               class="px-3 py-1.5 rounded-md text-sm font-medium transition-all duration-300 inline-block mr-2"
                               style="background: rgba(99, 102, 241, 0.2); color: #818cf8; border: 1px solid rgba(99, 102, 241, 0.3);">상세</a>
                            <a th:if="${b.status.name() == 'RESOLVED'}"
                               th:href="@{/admin/blacklist/delete/{id}(id=${b.id})}"
                               class="px-3 py-1.5 rounded-md text-sm font-medium transition-all duration-300 inline-block"
                               style="background: rgba(239, 68, 68, 0.2); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.3);"
                               onclick="return confirm('이 기록을 삭제하시겠습니까?');">삭제</a>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(blockedUsers)}">
                        <td colspan="9" class="py-4 px-6 text-center" style="color: #94a3b8;">
                            차단된 사용자 기록이 없습니다.
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <div th:if="${message}" class="mt-6 text-center" style="color: #4ade80;">
                <p th:text="${message}"></p>
            </div>
            <div th:if="${errorMessage}" class="mt-6 text-center" style="color: #f87171;">
                <p th:text="${errorMessage}"></p>
            </div>
        </div>
    </main>
</div>

<div th:insert="~{fragments/footer :: footer}" class="mt-auto"></div>

<script th:inline="javascript">
    /*<![CDATA[*/
    document.addEventListener('DOMContentLoaded', () => {
        const message = /*[[${message}]]*/ null;
        if (message) {
            showToast(message, 'success');
        }
        const errorMessage = /*[[${errorMessage}]]*/ null;
        if (errorMessage) {
            showToast(errorMessage, 'error');
        }
    });
    /*]]>*/
</script>

<style>
    .filter-active {
        background: rgba(99, 102, 241, 0.3);
        color: #818cf8;
        border: 1px solid rgba(99, 102, 241, 0.5);
    }
    .filter-active-warn {
        background: rgba(251, 191, 36, 0.3);
        color: #fbbf24;
        border: 1px solid rgba(251, 191, 36, 0.5);
    }
    .filter-inactive {
        background: rgba(30, 41, 59, 0.5);
        color: #94a3b8;
        border: 1px solid rgba(71, 85, 105, 0.3);
    }
    .filter-inactive:hover {
        background: rgba(51, 65, 85, 0.5);
        color: #e2e8f0;
    }
</style>

</body>
</html>
