<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head th:replace="~{fragments/common-head :: head-elements(pageTitle='정책 목록')}"></head>
<body class="flex flex-col min-h-screen font-sans">

<div th:insert="~{fragments/header :: header}"></div>
<div id="toast-container" class="fixed top-5 right-5 z-50 w-full max-w-xs sm:max-w-sm"></div>

<div class="flex flex-1">
    <aside th:insert="~{fragments/admin-menu :: menu}" class="hidden md:block"></aside>

    <main class="flex-1 p-6 md:p-10">
        <div class="mx-auto dark-card p-6 sm:p-8 rounded-xl">
            <div class="mb-8 flex flex-col sm:flex-row justify-between items-center">
                <div class="text-center sm:text-left mb-4 sm:mb-0">
                    <h1 class="text-3xl font-bold text-gradient">정책 목록 (Policy List)</h1>
                    <p class="text-dark-muted mt-1">접근 제어 정책을 정의하고 관리합니다.</p>
                </div>
                <a th:href="@{/admin/policies/register}"
                   class="px-6 py-3 rounded-xl font-semibold transition-all duration-300 text-white"
                   style="background: linear-gradient(135deg, #6366f1, #4f46e5); box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);">
                    새 정책 등록
                </a>
            </div>

            <div class="overflow-x-auto shadow-md rounded-lg">
                <table class="min-w-full w-full text-sm text-left">
                    <thead class="text-xs text-white uppercase" style="background: linear-gradient(135deg, #1e293b 0%, #334155 100%);">
                    <tr>
                        <th scope="col" class="py-3.5 px-6 font-semibold">ID</th>
                        <th scope="col" class="py-3.5 px-6 font-semibold">정책명 (Name)</th>
                        <th scope="col" class="py-3.5 px-6 font-semibold">설명</th>
                        <th scope="col" class="py-3.5 px-6 font-semibold">적용대상</th>
                        <th scope="col" class="py-3.5 px-6 font-semibold">효과 (Effect)</th>
                        <th scope="col" class="py-3.5 px-6 font-semibold">출처</th>
                        <th scope="col" class="py-3.5 px-6 font-semibold">승인 상태</th>
                        <th scope="col" class="py-3.5 px-6 font-semibold">우선순위</th>
                        <th scope="col" class="py-3.5 px-6 font-semibold">관리</th>
                    </tr>
                    </thead>
                    <tbody class="divide-y" style="background: rgba(15, 23, 42, 0.6); color: #e2e8f0; border-color: rgba(71, 85, 105, 0.3);">
                    <tr th:each="policy : ${policies}" style="border-color: rgba(71, 85, 105, 0.3);">
                        <td class="py-4 px-6" th:text="${policy.id}">1</td>
                        <td class="py-4 px-6">
                            <p class="font-medium" th:text="${policy.name}">Admin Full Access</p>
                            <p style="color: #94a3b8;" th:text="${policy.description}">관리자 전체 접근 권한</p>
                        </td>
                        <td class="py-4 px-6 text-sm font-mono" style="color: #cbd5e1;" th:text="${policy.description}"></td>
                        <td class="py-4 px-6">
                            <div th:each="target : ${policy.targets}" class="mb-1">
                                <span th:text="${target.targetType}" class="font-bold text-xs p-1 rounded"
                                      th:style="${target.targetType == 'URL' ? 'background: rgba(51, 65, 85, 0.5); color: #cbd5e1;' : 'background: rgba(71, 85, 105, 0.5); color: #e2e8f0;'}">URL</span>
                                <span th:text="${target.httpMethod == null ? 'ALL' : target.httpMethod}"
                                      class="font-semibold text-xs p-1 rounded"
                                      style="background: rgba(59, 130, 246, 0.2); color: #60a5fa;"
                                      th:if="${target.targetType == 'URL'}">GET</span>
                                <span th:text="${target.targetIdentifier}" class="font-mono text-sm" style="color: #e2e8f0;">/admin/**</span>
                            </div>
                        </td>
                        <td class="py-4 px-6">
                            <span th:text="${policy.effect}"
                                  th:style="${policy.effect.name() == 'ALLOW' ? 'background: rgba(34, 197, 94, 0.2); color: #4ade80; border: 1px solid rgba(34, 197, 94, 0.3);' : 'background: rgba(239, 68, 68, 0.2); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.3);'}"
                                  class="font-bold px-2 py-1 rounded-full text-xs">ALLOW</span>
                        </td>
                        <!-- Source -->
                        <td class="py-4 px-6">
                            <span th:if="${policy.source != null && policy.source.name() == 'AI_GENERATED'}"
                                  class="px-2 py-0.5 rounded-full text-xs font-semibold"
                                  style="background: rgba(168, 85, 247, 0.2); color: #c084fc; border: 1px solid rgba(168, 85, 247, 0.3);">AI</span>
                            <span th:if="${policy.source != null && policy.source.name() == 'AI_EVOLVED'}"
                                  class="px-2 py-0.5 rounded-full text-xs font-semibold"
                                  style="background: rgba(168, 85, 247, 0.2); color: #c084fc; border: 1px solid rgba(168, 85, 247, 0.3);">AI Evolved</span>
                            <span th:if="${policy.source == null || policy.source.name() == 'MANUAL'}"
                                  class="px-2 py-0.5 rounded-full text-xs font-semibold"
                                  style="background: rgba(71, 85, 105, 0.3); color: #94a3b8; border: 1px solid rgba(71, 85, 105, 0.3);">Manual</span>
                            <span th:if="${policy.source != null && policy.source.name() == 'IMPORTED'}"
                                  class="px-2 py-0.5 rounded-full text-xs font-semibold"
                                  style="background: rgba(59, 130, 246, 0.2); color: #60a5fa; border: 1px solid rgba(59, 130, 246, 0.3);">Import</span>
                        </td>
                        <!-- Approval Status -->
                        <td class="py-4 px-6">
                            <span th:if="${policy.approvalStatus != null && policy.approvalStatus.name() == 'PENDING'}"
                                  class="px-2 py-0.5 rounded-full text-xs font-semibold"
                                  style="background: rgba(245, 158, 11, 0.2); color: #fbbf24; border: 1px solid rgba(245, 158, 11, 0.3);">Pending</span>
                            <span th:if="${policy.approvalStatus != null && policy.approvalStatus.name() == 'APPROVED'}"
                                  class="px-2 py-0.5 rounded-full text-xs font-semibold"
                                  style="background: rgba(34, 197, 94, 0.2); color: #4ade80; border: 1px solid rgba(34, 197, 94, 0.3);">Approved</span>
                            <span th:if="${policy.approvalStatus != null && policy.approvalStatus.name() == 'REJECTED'}"
                                  class="px-2 py-0.5 rounded-full text-xs font-semibold"
                                  style="background: rgba(239, 68, 68, 0.2); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.3);">Rejected</span>
                            <span th:if="${policy.approvalStatus == null || policy.approvalStatus.name() == 'NOT_REQUIRED'}"
                                  class="px-2 py-0.5 rounded-full text-xs font-semibold"
                                  style="background: rgba(71, 85, 105, 0.3); color: #94a3b8; border: 1px solid rgba(71, 85, 105, 0.3);">-</span>
                        </td>
                        <td class="py-4 px-6" th:text="${policy.priority}">10</td>
                        <td class="py-4 px-6 whitespace-nowrap">
                            <a th:href="@{/admin/policies/{id}(id=${policy.id})}"
                               class="px-3 py-1.5 rounded-md text-sm font-medium transition-all duration-300 inline-block mr-1"
                               style="background: rgba(99, 102, 241, 0.2); color: #818cf8; border: 1px solid rgba(99, 102, 241, 0.3);">수정</a>
                            <!-- Approve button (not shown if already APPROVED) -->
                            <form th:if="${policy.approvalStatus == null || policy.approvalStatus.name() != 'APPROVED'}"
                                  th:action="@{/admin/policies/{id}/approve(id=${policy.id})}" method="post" class="inline">
                                <button type="submit"
                                        class="px-3 py-1.5 rounded-md text-sm font-medium transition-all duration-300 mr-1"
                                        style="background: rgba(34, 197, 94, 0.2); color: #4ade80; border: 1px solid rgba(34, 197, 94, 0.3);">승인</button>
                            </form>
                            <!-- Reject button (not shown if already REJECTED) -->
                            <form th:if="${policy.approvalStatus == null || policy.approvalStatus.name() != 'REJECTED'}"
                                  th:action="@{/admin/policies/{id}/reject(id=${policy.id})}" method="post" class="inline"
                                  onsubmit="return confirm('이 정책을 거절하시겠습니까? 거절 시 비활성화됩니다.');">
                                <button type="submit"
                                        class="px-3 py-1.5 rounded-md text-sm font-medium transition-all duration-300 mr-1"
                                        style="background: rgba(239, 68, 68, 0.2); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.3);">거절</button>
                            </form>
                            <form th:action="@{/admin/policies/delete/{id}(id=${policy.id})}" method="post" class="inline"
                                  onsubmit="return confirm('정말로 이 정책을 삭제하시겠습니까?');">
                                <button type="submit"
                                        class="px-3 py-1.5 rounded-md text-sm font-medium transition-all duration-300"
                                        style="background: rgba(239, 68, 68, 0.2); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.3);">삭제</button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(policies)}">
                        <td colspan="9" class="py-4 px-6 text-center" style="color: #94a3b8;">
                            표시할 정책이 없습니다.
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</div>

<div th:insert="~{fragments/footer :: footer}" class="mt-auto"></div>
<script th:src="@{/js/toast.js}"></script>
<script th:inline="javascript">
    document.addEventListener('DOMContentLoaded', () => {
        const message = /*[[${message}]]*/ null;
        if (message) showToast(message, 'success');
        const error = /*[[${errorMessage}]]*/ null;
        if (error) showToast(error, 'error');
    });
</script>
</body>
</html>
