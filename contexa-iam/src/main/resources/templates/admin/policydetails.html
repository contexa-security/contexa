<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head th:replace="~{fragments/common-head :: head-elements(pageTitle=${policy.id != null ? #{admin.policy.detail.edit.title} : #{admin.policy.detail.create.title}})}"></head>
<body class="flex flex-col min-h-screen font-sans">

<div th:insert="~{fragments/header :: header}"></div>
<div id="toast-container" class="fixed top-5 right-5 z-50 w-full max-w-xs sm:max-w-sm"></div>

<div class="flex flex-1">
    <aside th:insert="~{fragments/admin-menu :: menu}" class="hidden md:block"></aside>

    <main class="flex-1 p-6 md:p-10 flex items-center justify-center">
        <div class="w-full max-w-3xl p-8 sm:p-10 rounded-xl shadow-2xl" style="background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(71, 85, 105, 0.3);">
            <div class="text-center mb-8">
                <h2 class="mt-4 text-3xl font-bold text-gradient" th:text="${policy.id != null} ? #{admin.policy.detail.edit.title} : #{admin.policy.detail.create.title}"></h2>
            </div>
            <div class="mb-6 p-4 rounded-lg border" style="background: rgba(59, 130, 246, 0.1); border-color: rgba(59, 130, 246, 0.3);">
                <h3 class="font-semibold text-lg" style="color: #93c5fd;" th:text="#{admin.policy.detail.summary.title}">Policy Summary (Auto-generated)</h3>
                <p class="mt-2 text-sm font-mono" style="color: #dbeafe;" th:text="${policy.description} ?: #{admin.policy.detail.summary.empty}"></p>
            </div>
            <form th:action="${policy.id != null ? '/admin/policies/' + policy.id + '/edit' : '/admin/policies'}" method="post" th:object="${policy}" class="space-y-6">
                <input type="hidden" th:field="*{id}" th:if="${policy.id != null}" />

                <div>
                    <label for="name" class="block text-sm font-medium" style="color: #cbd5e1;" th:text="#{admin.policy.detail.name}">Policy Name (Unique):</label>
                    <input type="text" id="name" th:field="*{name}"
                           class="mt-1 block w-full px-4 py-2.5 rounded-lg shadow-sm sm:text-sm"
                           style="background: rgba(30, 41, 59, 0.6); border: 2px solid rgba(71, 85, 105, 0.5); color: #e2e8f0;" required />
                </div>
                <div>
                    <label for="description" class="block text-sm font-medium" style="color: #cbd5e1;" th:text="#{admin.policy.detail.description}">Description:</label>
                    <input type="text" id="description" th:field="*{description}"
                           class="mt-1 block w-full px-4 py-2.5 rounded-lg shadow-sm sm:text-sm"
                           style="background: rgba(30, 41, 59, 0.6); border: 2px solid rgba(71, 85, 105, 0.5); color: #e2e8f0;" />
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label for="effect" class="block text-sm font-medium" style="color: #cbd5e1;" th:text="#{admin.policy.detail.effect}">Effect:</label>
                        <select id="effect" th:field="*{effect}"
                                class="mt-1 block w-full px-4 py-2.5 rounded-lg shadow-sm sm:text-sm"
                                style="background: rgba(30, 41, 59, 0.6); border: 2px solid rgba(71, 85, 105, 0.5); color: #e2e8f0;">
                            <option th:each="eff : ${T(io.contexa.contexaiam.domain.entity.policy.Policy.Effect).values()}" th:value="${eff}" th:text="${eff.name()}"></option>
                        </select>
                    </div>
                    <div>
                        <label for="priority" class="block text-sm font-medium" style="color: #cbd5e1;" th:text="#{admin.policy.detail.priority}">Priority (lower = evaluated first):</label>
                        <input type="number" id="priority" th:field="*{priority}"
                               class="mt-1 block w-full px-4 py-2.5 rounded-lg shadow-sm sm:text-sm"
                               style="background: rgba(30, 41, 59, 0.6); border: 2px solid rgba(71, 85, 105, 0.5); color: #e2e8f0;" required />
                    </div>
                </div>
                <div class="space-y-4">
                    <label class="block text-sm font-medium" style="color: #cbd5e1;" th:text="#{admin.policy.detail.targets}">Targets</label>
                    <div id="targets-container" class="space-y-4">
                        <div th:each="target, stat : *{targets}" class="target-block grid grid-cols-12 gap-2 items-center">
                            <div class="col-span-3">
                                <select th:field="*{targets[__${stat.index}__].targetType}" onchange="toggleHttpMethod(this)"
                                        class="block w-full px-4 py-2.5 rounded-lg shadow-sm"
                                        style="background: rgba(30, 41, 59, 0.6); border: 2px solid rgba(71, 85, 105, 0.5); color: #e2e8f0;">
                                    <option value="URL">URL</option>
                                    <option value="METHOD">METHOD</option>
                                </select>
                            </div>
                            <div class="col-span-2">
                                <select th:field="*{targets[__${stat.index}__].httpMethod}"
                                        class="http-method-select block w-full px-4 py-2.5 rounded-lg shadow-sm"
                                        style="background: rgba(30, 41, 59, 0.6); border: 2px solid rgba(71, 85, 105, 0.5); color: #e2e8f0;">
                                    <option value="ALL">ALL</option> <option value="GET">GET</option> <option value="POST">POST</option>
                                    <option value="PUT">PUT</option> <option value="DELETE">DELETE</option>
                                </select>
                            </div>
                            <div class="col-span-6">
                                <input type="text" th:field="*{targets[__${stat.index}__].targetIdentifier}"
                                       class="block w-full px-4 py-2.5 rounded-lg shadow-sm"
                                       style="background: rgba(30, 41, 59, 0.6); border: 2px solid rgba(71, 85, 105, 0.5); color: #e2e8f0;"
                                       placeholder="/admin/** or com.example.Service.*" required />
                            </div>
                            <div class="col-span-1">
                                <button type="button" onclick="removeElement(this, '.target-block')"
                                        class="hover:text-red-400" style="color: #94a3b8;">&times;</button>
                            </div>
                        </div>
                    </div>
                    <button type="button" id="add-target-btn" class="text-sm font-medium hover:underline" style="color: #818cf8;" th:text="#{admin.policy.detail.add.target}">+ Add Target</button>
                </div>

                <div class="space-y-4">
                    <label class="block text-sm font-medium" style="color: #cbd5e1;" th:text="#{admin.policy.detail.rules}">Rules (each rule combined with OR)</label>
                    <div id="rules-container" class="space-y-4">
                        <div th:each="rule, ruleStat : *{rules}" class="rule-block p-4 rounded-lg space-y-3 relative" style="background: rgba(30, 41, 59, 0.4); border: 1px solid rgba(71, 85, 105, 0.3);">
                            <button type="button" onclick="removeRule(this)" class="absolute top-2 right-2 hover:text-red-400" style="color: #94a3b8;">&times;</button>
                            <h3 class="font-semibold" style="color: #e2e8f0;" th:text="'Rule #' + ${ruleStat.index + 1}"></h3>
                            <div>
                                <label th:for="${'ruleDesc' + ruleStat.index}" class="block text-sm font-medium" style="color: #cbd5e1;" th:text="#{admin.policy.detail.rule.desc}">Rule Description:</label>
                                <input type="text" th:id="${'ruleDesc' + ruleStat.index}" th:field="*{rules[__${ruleStat.index}__].description}"
                                       class="mt-1 block w-full px-4 py-2.5 rounded-lg shadow-sm sm:text-sm"
                                       style="background: rgba(30, 41, 59, 0.6); border: 2px solid rgba(71, 85, 105, 0.5); color: #e2e8f0;" />
                            </div>
                            <div>
                                <label class="block text-sm font-medium" style="color: #cbd5e1;" th:text="#{admin.policy.detail.conditions}">Conditions (AND within Rule):</label>
                                <div class="conditions-list space-y-2 mt-2">
                                    <div th:each="cond, condStat : ${rule.conditions}" class="condition-block grid grid-cols-12 gap-2 items-center">
                                        <div class="col-span-3">
                                            <select th:field="*{rules[__${ruleStat.index}__].conditions[__${condStat.index}__].authorizationPhase}"
                                                    class="block w-full px-4 py-2.5 rounded-lg shadow-sm text-sm"
                                                    style="background: rgba(30, 41, 59, 0.6); border: 2px solid rgba(71, 85, 105, 0.5); color: #e2e8f0;">
                                                <option th:value="'PRE_AUTHORIZE'" th:text="#{admin.policy.detail.pre.authorize}"></option>
                                                <option th:value="'POST_AUTHORIZE'" th:text="#{admin.policy.detail.post.authorize}"></option>
                                            </select>
                                        </div>
                                        <div class="col-span-8">
                                            <input type="text" th:field="*{rules[__${ruleStat.index}__].conditions[__${condStat.index}__].expression}"
                                                   class="block w-full px-4 py-2.5 rounded-lg shadow-sm font-mono text-sm"
                                                   style="background: rgba(30, 41, 59, 0.6); border: 2px solid rgba(71, 85, 105, 0.5); color: #e2e8f0;"
                                                   th:placeholder="#{admin.policy.detail.spel.placeholder}">
                                        </div>
                                        <div class="col-span-1 text-center">
                                            <button type="button" onclick="removeElement(this, '.condition-block')"
                                                    class="text-xl hover:text-red-400" style="color: #94a3b8;">&times;</button>
                                        </div>
                                    </div>
                                </div>
                                <button type="button" onclick="addCondition(this)" class="mt-2 text-sm font-medium hover:underline" style="color: #818cf8;" th:text="#{admin.policy.detail.add.condition}">+ Add Condition</button>
                            </div>
                        </div>
                    </div>
                    <button type="button" id="add-rule-btn" class="text-sm font-medium hover:underline" style="color: #818cf8;" th:text="#{admin.policy.detail.add.rule}">+ Add Rule</button>
                </div>

                <div class="pt-2">
                    <button type="submit"
                            class="w-full flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-sm text-sm font-medium text-white focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-app-accent transition-all duration-150 ease-in-out transform hover:scale-105"
                            style="background: linear-gradient(135deg, #6366f1, #4f46e5); box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);">
                        <span th:text="#{admin.policy.detail.save}">Save</span>
                    </button>
                </div>
            </form>
            <div class="mt-6 text-center">
                <a th:href="@{/admin/policies}" class="text-sm font-medium hover:underline" style="color: #818cf8;" th:text="#{admin.policy.detail.back}">Back to Policy List</a>
            </div>
        </div>
    </main>
</div>

<div th:insert="~{fragments/footer :: footer}" class="mt-auto"></div>

<!-- i18n data for JS -->
<div id="i18nPolicyDetail" style="display:none"
     th:data-rule-title="#{admin.policy.detail.js.rule.title}"
     th:data-rule-desc-label="#{admin.policy.detail.js.rule.desc.label}"
     th:data-conditions-label="#{admin.policy.detail.js.conditions.label}"
     th:data-add-condition="#{admin.policy.detail.js.add.condition}"
     th:data-pre-authorize="#{admin.policy.detail.js.pre.authorize}"
     th:data-post-authorize="#{admin.policy.detail.js.post.authorize}"
     th:data-spel-placeholder="#{admin.policy.detail.js.spel.placeholder}"></div>

<script>
    document.getElementById('add-target-btn').addEventListener('click', function() {
        const targetsContainer = document.getElementById('targets-container');
        const targetBlocks = targetsContainer.getElementsByClassName('target-block');
        const newIndex = targetBlocks.length;

        const newTargetBlock = document.createElement('div');
        newTargetBlock.className = 'target-block grid grid-cols-12 gap-2 items-center';
        newTargetBlock.innerHTML = `
            <div class="col-span-3">
                <select name="targets[${newIndex}].targetType" onchange="toggleHttpMethod(this)"
                        class="block w-full px-4 py-2.5 rounded-lg shadow-sm"
                        style="background: rgba(30, 41, 59, 0.6); border: 2px solid rgba(71, 85, 105, 0.5); color: #e2e8f0;">
                    <option value="URL">URL</option>
                    <option value="METHOD">METHOD</option>
                </select>
            </div>
            <div class="col-span-2">
                <select name="targets[${newIndex}].httpMethod"
                        class="http-method-select block w-full px-4 py-2.5 rounded-lg shadow-sm"
                        style="background: rgba(30, 41, 59, 0.6); border: 2px solid rgba(71, 85, 105, 0.5); color: #e2e8f0;">
                    <option value="ALL">ALL</option>
                    <option value="GET">GET</option>
                    <option value="POST">POST</option>
                    <option value="PUT">PUT</option>
                    <option value="DELETE">DELETE</option>
                </select>
            </div>
            <div class="col-span-6">
                <input type="text" name="targets[${newIndex}].targetIdentifier"
                       class="block w-full px-4 py-2.5 rounded-lg shadow-sm"
                       style="background: rgba(30, 41, 59, 0.6); border: 2px solid rgba(71, 85, 105, 0.5); color: #e2e8f0;"
                       placeholder="/admin/** or com.example.Service.*" required />
            </div>
            <div class="col-span-1">
                <button type="button" onclick="removeElement(this, '.target-block')"
                        class="hover:text-red-400" style="color: #94a3b8;">&times;</button>
            </div>
        `;
        targetsContainer.appendChild(newTargetBlock);
    });

    document.getElementById('add-rule-btn').addEventListener('click', function() {
        const rulesContainer = document.getElementById('rules-container');
        const ruleBlocks = rulesContainer.getElementsByClassName('rule-block');
        const newIndex = ruleBlocks.length;

        const newRuleBlock = document.createElement('div');
        newRuleBlock.className = 'rule-block p-4 rounded-lg space-y-3 relative';
        newRuleBlock.style = 'background: rgba(30, 41, 59, 0.4); border: 1px solid rgba(71, 85, 105, 0.3);';
        var _i18n = document.getElementById('i18nPolicyDetail').dataset;
        newRuleBlock.innerHTML = `
            <button type="button" onclick="removeRule(this)" class="absolute top-2 right-2 hover:text-red-400" style="color: #94a3b8;">&times;</button>
            <h3 class="font-semibold" style="color: #e2e8f0;">${_i18n.ruleTitle.replace('{0}', newIndex + 1)}</h3>
            <div>
                <label for="ruleDesc${newIndex}" class="block text-sm font-medium" style="color: #cbd5e1;">${_i18n.ruleDescLabel}</label>
                <input type="text" id="ruleDesc${newIndex}" name="rules[${newIndex}].description"
                       class="mt-1 block w-full px-4 py-2.5 rounded-lg shadow-sm sm:text-sm"
                       style="background: rgba(30, 41, 59, 0.6); border: 2px solid rgba(71, 85, 105, 0.5); color: #e2e8f0;" />
            </div>
            <div>
                <label class="block text-sm font-medium" style="color: #cbd5e1;">${_i18n.conditionsLabel}</label>
                <div class="conditions-list space-y-2 mt-2">
                </div>
                <button type="button" onclick="addCondition(this)" class="mt-2 text-sm font-medium hover:underline" style="color: #818cf8;">${_i18n.addCondition}</button>
            </div>
        `;
        rulesContainer.appendChild(newRuleBlock);
    });

    function toggleHttpMethod(selectElement) {
        const targetBlock = selectElement.closest('.target-block');
        const httpMethodSelect = targetBlock.querySelector('.http-method-select');
        if (selectElement.value === 'URL') {
            httpMethodSelect.style.display = 'block';
        } else {
            httpMethodSelect.style.display = 'none';
            httpMethodSelect.value = 'ALL';
        }
    }

    // 페이지 로드 시 기존 값에 따라 HTTP 메서드 표시 여부 결정
    document.addEventListener('DOMContentLoaded', function() {
        document.querySelectorAll('.target-block').forEach(block => {
            const typeSelect = block.querySelector('select[name*="targetType"]');
            if (typeSelect) {
                toggleHttpMethod(typeSelect);
            }
        });
    });

    function removeRule(button) {
        const ruleBlock = button.closest('.rule-block');
        ruleBlock.remove();
        // 인덱스를 다시 정렬하여 form 전송 시 데이터가 누락되지 않도록 함
        updateRuleIndices();
    }

    function updateRuleIndices() {
        const rulesContainer = document.getElementById('rules-container');
        const ruleBlocks = rulesContainer.getElementsByClassName('rule-block');
        for (let i = 0; i < ruleBlocks.length; i++) {
            const block = ruleBlocks[i];
            var _i18n = document.getElementById('i18nPolicyDetail').dataset;
            block.querySelector('h3').textContent = _i18n.ruleTitle.replace('{0}', i + 1);

            // Update rule description field
            const descLabel = block.querySelector('label[for^="ruleDesc"]');
            const descInput = block.querySelector('input[id^="ruleDesc"]');
            if (descLabel && descInput) {
                descLabel.setAttribute('for', `ruleDesc${i}`);
                descInput.id = `ruleDesc${i}`;
                descInput.name = `rules[${i}].description`;
            }

            // 조건 필드들 업데이트
            const conditionBlocks = block.querySelectorAll('.condition-block');
            conditionBlocks.forEach((condBlock, j) => {
                const phaseSelect = condBlock.querySelector('select[name*="authorizationPhase"]');
                const expressionInput = condBlock.querySelector('input[name*="expression"]');
                if (phaseSelect) phaseSelect.name = `rules[${i}].conditions[${j}].authorizationPhase`;
                if (expressionInput) expressionInput.name = `rules[${i}].conditions[${j}].expression`;
            });
        }
    }

    function addCondition(button) {
        const ruleBlock = button.closest('.rule-block');
        const conditionsList = ruleBlock.querySelector('.conditions-list');
        const ruleIndex = Array.from(document.querySelectorAll('.rule-block')).indexOf(ruleBlock);
        const conditionIndex = conditionsList.children.length;

        const newCondition = document.createElement('div');
        newCondition.className = 'condition-block grid grid-cols-12 gap-2 items-center';
        var _i18n = document.getElementById('i18nPolicyDetail').dataset;
        newCondition.innerHTML = `
            <div class="col-span-3">
                <select name="rules[${ruleIndex}].conditions[${conditionIndex}].authorizationPhase"
                        class="block w-full px-4 py-2.5 rounded-lg shadow-sm text-sm"
                        style="background: rgba(30, 41, 59, 0.6); border: 2px solid rgba(71, 85, 105, 0.5); color: #e2e8f0;">
                    <option value="PRE_AUTHORIZE">${_i18n.preAuthorize}</option>
                    <option value="POST_AUTHORIZE">${_i18n.postAuthorize}</option>
                </select>
            </div>
            <div class="col-span-8">
                <input type="text" name="rules[${ruleIndex}].conditions[${conditionIndex}].expression"
                       class="block w-full px-4 py-2.5 rounded-lg shadow-sm font-mono text-sm"
                       style="background: rgba(30, 41, 59, 0.6); border: 2px solid rgba(71, 85, 105, 0.5); color: #e2e8f0;"
                       placeholder="${_i18n.spelPlaceholder}">
            </div>
            <div class="col-span-1 text-center">
                <button type="button" onclick="removeElement(this, '.condition-block')"
                        class="text-xl hover:text-red-400" style="color: #94a3b8;">&times;</button>
            </div>
        `;
        conditionsList.appendChild(newCondition);
    }

    function removeElement(button, selector) {
        const element = button.closest(selector);
        const parent = element.parentNode;
        element.remove();

        // 타겟 요소들의 인덱스 재정렬
        if (selector === '.target-block') {
            updateTargetIndices();
        }
        // 조건 요소들의 인덱스 재정렬
        else if (selector === '.condition-block') {
            const ruleBlock = parent.closest('.rule-block');
            updateConditionIndices(ruleBlock);
        }
    }

    function updateTargetIndices() {
        const targetsContainer = document.getElementById('targets-container');
        const targetBlocks = targetsContainer.getElementsByClassName('target-block');
        for (let i = 0; i < targetBlocks.length; i++) {
            const block = targetBlocks[i];
            const typeSelect = block.querySelector('select[name*="targetType"]');
            const methodSelect = block.querySelector('select[name*="httpMethod"]');
            const identifierInput = block.querySelector('input[name*="targetIdentifier"]');

            if (typeSelect) typeSelect.name = `targets[${i}].targetType`;
            if (methodSelect) methodSelect.name = `targets[${i}].httpMethod`;
            if (identifierInput) identifierInput.name = `targets[${i}].targetIdentifier`;
        }
    }

    function updateConditionIndices(ruleBlock) {
        const ruleIndex = Array.from(document.querySelectorAll('.rule-block')).indexOf(ruleBlock);
        const conditionBlocks = ruleBlock.querySelectorAll('.condition-block');

        conditionBlocks.forEach((block, i) => {
            const phaseSelect = block.querySelector('select[name*="authorizationPhase"]');
            const expressionInput = block.querySelector('input[name*="expression"]');

            if (phaseSelect) phaseSelect.name = `rules[${ruleIndex}].conditions[${i}].authorizationPhase`;
            if (expressionInput) expressionInput.name = `rules[${ruleIndex}].conditions[${i}].expression`;
        });
    }
</script>

</body>
</html>
