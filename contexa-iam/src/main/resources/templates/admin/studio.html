<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <th:block th:replace="~{fragments/common-head :: head-elements(pageTitle='AI-Native Authorization Studio')}"></th:block>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/studio.css}" />
    <link rel="stylesheet" th:href="@{/css/ai-studio.css}" />
    <style>
        /* Security Copilot과 동일한 파란색 스크롤바 - 최우선 적용 */
        #explorer-list-container::-webkit-scrollbar,
        #canvas-content::-webkit-scrollbar,
        #inspector-panel::-webkit-scrollbar,
        #ai-response-container::-webkit-scrollbar,
        .overflow-y-auto::-webkit-scrollbar,
        .dark-scroll::-webkit-scrollbar {
            width: 8px !important;
        }

        #explorer-list-container::-webkit-scrollbar-track,
        #canvas-content::-webkit-scrollbar-track,
        #inspector-panel::-webkit-scrollbar-track,
        #ai-response-container::-webkit-scrollbar-track,
        .overflow-y-auto::-webkit-scrollbar-track,
        .dark-scroll::-webkit-scrollbar-track {
            background: rgba(15, 23, 42, 0.5) !important;
            border-radius: 4px !important;
        }

        #explorer-list-container::-webkit-scrollbar-thumb,
        #canvas-content::-webkit-scrollbar-thumb,
        #inspector-panel::-webkit-scrollbar-thumb,
        #ai-response-container::-webkit-scrollbar-thumb,
        .overflow-y-auto::-webkit-scrollbar-thumb,
        .dark-scroll::-webkit-scrollbar-thumb {
            background: rgba(59, 130, 246, 0.5) !important;
            border-radius: 4px !important;
        }

        #explorer-list-container::-webkit-scrollbar-thumb:hover,
        #canvas-content::-webkit-scrollbar-thumb:hover,
        #inspector-panel::-webkit-scrollbar-thumb:hover,
        #ai-response-container::-webkit-scrollbar-thumb:hover,
        .overflow-y-auto::-webkit-scrollbar-thumb:hover,
        .dark-scroll::-webkit-scrollbar-thumb:hover {
            background: rgba(59, 130, 246, 0.7) !important;
        }
    </style>
    <!-- Mermaid 추가 (레거시 지원) -->
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
    
    <!-- 🔥 Cytoscape.js 라이브러리 - Mermaid 대체용 -->
    <script src="https://unpkg.com/cytoscape@3.26.0/dist/cytoscape.min.js"></script>
    <!-- Cytoscape 레이아웃 확장 -->
    <script src="https://unpkg.com/webcola@3.4.0/WebCola/cola.min.js"></script>
    <script src="https://unpkg.com/dagre@0.8.5/dist/dagre.min.js"></script>
    <script src="https://unpkg.com/cytoscape-cola@2.5.1/cytoscape-cola.js"></script>
    <script src="https://unpkg.com/cytoscape-dagre@2.5.0/cytoscape-dagre.js"></script>
    <!-- 레이아웃 의존성 -->
</head>
<body class="h-screen flex flex-col bg-app-dark-bg-secondary font-sans">

<header th:insert="~{fragments/header :: header}" class="flex-shrink-0"></header>
<div id="toast-container" class="fixed top-5 right-5 z-50 w-full max-w-xs sm:max-w-sm"></div>

<div class="flex-1 flex min-h-0">
    <aside th:insert="~{fragments/admin-menu :: menu}" class="hidden md:block flex-shrink-0 w-64 bg-app-dark-bg-tertiary shadow-lg"></aside>

    <!-- 🚀 3-패널 구조: Explorer + Canvas + Inspector -->
    <main id="studio-main" class="flex-1 flex flex-col xl:flex-row gap-4 p-4 overflow-y-auto">
        
        <!-- Explorer Panel (검색 기능만) -->
        <div id="explorer-panel" class="w-full xl:w-3/12 bg-slate-900/50 rounded-xl shadow-lg flex flex-col border border-slate-700">
            <div class="p-3 border-b border-slate-700">
                <!-- 기존 검색창 -->
                <div class="relative">
                    <input type="search" id="explorer-search" placeholder="사용자, 그룹 등 검색..."
                           class="w-full pl-10 pr-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 bg-slate-800 border-slate-600 text-slate-200">
                    <i class="fas fa-search absolute left-3 top-1/2 transform -translate-y-1/2 text-slate-400"></i>
                </div>
            </div>
            <div id="explorer-list-container" class="flex-1 p-2 overflow-y-auto"></div>
        </div>
        
        <!-- 🎨 Canvas Panel (AI 질의창 + Mermaid 시각화) -->
        <div id="canvas-panel" class="w-full xl:w-5/12 bg-slate-900/50 rounded-xl shadow-lg flex flex-col border border-slate-700">
            <!-- AI 자연어 질의창 (중앙 패널 상단으로 이동) -->
            <div class="p-4 border-b border-slate-700">
                <!-- 🤖 AI 질의 타이틀 -->
                <div class="mb-4">
                    <div class="flex items-center gap-3 mb-2">
                        <div class="flex items-center gap-2">
                            <div class="w-8 h-8 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-lg flex items-center justify-center ai-title-icon">
                                <i class="fas fa-brain text-white text-sm"></i>
                            </div>
                            <h2 class="text-xl font-bold text-slate-200">AI 권한 분석</h2>
                        </div>
                        <div class="flex-1 h-px bg-gradient-to-r from-indigo-500/30 to-transparent ai-title-line"></div>
                    </div>
                    <p class="text-sm text-slate-400 pl-10">자연어로 권한 구조를 질의하고 즉시 분석 결과를 확인하세요</p>
                </div>
                
                <!-- 🎯 강화된 AI 입력창 -->
                <div class="relative mb-4">
                    <div class="ai-query-input-container">
                        <textarea id="ai-query-input" placeholder="AI에게 자연어로 질의하세요&#10;예: '개발팀에서 누가 고객 데이터를 삭제할 수 있나요?'"
                               class="ai-query-input w-full border-2 rounded-xl focus:ring-2 focus:ring-indigo-500 bg-slate-800 border-slate-600 text-slate-200 h-20"></textarea>
                        <i class="fas fa-brain ai-query-icon text-indigo-400 text-lg"></i>
                        <button id="ai-query-btn" class="bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-700 hover:to-purple-700 rounded-lg text-white font-medium shadow-lg transition-all duration-200 transform hover:scale-105">
                            <i class="fas fa-paper-plane mr-1"></i>
                            질의
                        </button>
                    </div>
                </div>
                <div class="flex items-center justify-between">
                    <h3 class="text-lg font-bold text-slate-200">
                        <i class="fas fa-project-diagram mr-2 text-indigo-400"></i>
                        권한 시각화
                    </h3>
                    <div class="flex gap-2">
                        <button id="canvas-fullscreen-btn" class="px-3 py-1 bg-slate-700 hover:bg-slate-600 rounded text-slate-300 text-sm">
                            <i class="fas fa-expand mr-1"></i>
                            전체보기
                        </button>
                        <button id="canvas-export-btn" class="px-3 py-1 bg-slate-700 hover:bg-slate-600 rounded text-slate-300 text-sm">
                            <i class="fas fa-download mr-1"></i>
                            내보내기
                        </button>
                        <select id="visualization-type" class="px-3 py-1 bg-slate-700 border-slate-600 rounded text-slate-300 text-sm">
                            <option value="network">🌐 네트워크</option>
                            <option value="hierarchy">🏗️ 계층구조</option>
                            <option value="flowchart">📊 플로우차트</option>
                        </select>
                        <select id="ai-query-mode" class="px-3 py-1 bg-slate-700 border-slate-600 rounded text-slate-300 text-sm" title="AI 분석 모드">
                            <option value="streaming">⚡ 스트리밍 분석</option>
                            <option value="sync">🔄 일반 분석</option>
                        </select>
                    </div>
                </div>
            </div>
            <div id="canvas-content" class="flex-1 p-4 overflow-auto">
                <!-- AI 질의 결과 또는 시각화가 여기에 표시 -->
                <div id="canvas-placeholder" class="flex flex-col items-center justify-center h-full text-slate-500 text-center">
                    <i class="fas fa-brain text-6xl text-slate-600 mb-4"></i>
                    <h4 class="text-xl font-semibold mb-2">AI-Native Authorization Studio</h4>
                    <p class="text-sm mb-4">자연어로 권한 구조를 질의하거나<br/>주체를 선택하여 시각화를 시작하세요</p>
                    <div class="flex flex-wrap gap-2 justify-center">
                        <span class="px-3 py-1 bg-slate-800 rounded-full text-xs">"누가 ~할 수 있나요?"</span>
                        <span class="px-3 py-1 bg-slate-800 rounded-full text-xs">"왜 ~할 수 없나요?"</span>
                        <span class="px-3 py-1 bg-slate-800 rounded-full text-xs">"접근 경로는?"</span>
                    </div>
                </div>
                <!-- Mermaid 다이어그램 컨테이너 -->
                <div id="mermaid-container" class="hidden w-full h-full">
                    <div id="mermaid-diagram" class="mermaid w-full h-full"></div>
                </div>
                <!-- AI 응답 결과 컨테이너 -->
                <div id="ai-response-container" class="hidden space-y-4">
                    <!-- AI 응답이 여기에 동적으로 생성됨 -->
                </div>
            </div>
        </div>
        
        <!-- 📊 Inspector Panel (기존 확장) -->
        <div id="inspector-panel" class="w-full xl:w-4/12 bg-slate-900/50 rounded-xl shadow-inner flex flex-col p-6 overflow-y-auto border border-slate-700">
            <div id="inspector-placeholder" class="flex flex-col items-center justify-center h-full text-slate-500 text-center">
                <i class="fas fa-info-circle text-5xl text-slate-600"></i>
                <p class="mt-4 text-sm">좌측에서 주체를 선택하거나<br/>AI 질의 결과를 확인하세요</p>
            </div>
            <div id="inspector-content" class="hidden h-full flex flex-col"></div>
        </div>
    </main>
</div>

<!-- 전체화면 모달 -->
<div id="fullscreen-modal" class="fullscreen-modal">
    <div class="fullscreen-modal-content">
        <div class="fullscreen-modal-header">
            <h3 class="text-2xl font-bold text-slate-200">
                <i class="fas fa-project-diagram mr-2 text-indigo-400"></i>
                권한 구조 전체 보기
            </h3>
            <button type="button" id="close-fullscreen-btn" class="close-button">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <div class="fullscreen-modal-body">
            <div id="fullscreen-mermaid-container" class="w-full h-full"></div>
        </div>
    </div>
</div>

<!-- LLM Modal is dynamically created by ModalUIAdapter from contexa-llm.bundle.js -->

<footer th:insert="~{fragments/footer :: footer}" class="flex-shrink-0"></footer>
<script th:src="@{/js/toast.js}"></script>
<script th:src="@{/js/studio.js}"></script>
<!-- Contexa LLM library - MUST load before AI Studio modules -->
<script th:src="@{/js/contexa-llm.bundle.js}"></script>
<!-- AI Studio modular components -->
<script th:src="@{/js/ai-studio/config.js}"></script>
<script th:src="@{/js/ai-studio/StreamingHandler.js}"></script>
<script th:src="@{/js/ai-studio/DOMRenderer.js}"></script>
<script th:src="@{/js/ai-studio/GraphManager.js}"></script>
<script th:src="@{/js/ai-studio/ResponseParser.js}"></script>
<!-- AI Studio Core (uses StreamingClient from bundle) -->
<script th:src="@{/js/ai-studio/AIStudioCore.js}"></script>
<script th:src="@{/js/ai-studio/index.js}"></script>
<!-- Legacy integration script -->
<script th:src="@{/js/ai-studio.js(v=20250109-6-fixed)}"></script>
</body>
</html>
