<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head th:replace="~{fragments/common-head :: head-elements(pageTitle=#{admin.permissions.detail.title})}">
</head>
<body class="flex flex-col min-h-screen font-sans">

<div th:insert="~{fragments/header :: header}"></div>
<div id="toast-container" class="fixed top-5 right-5 z-50 w-full max-w-xs sm:max-w-sm"></div>

<div class="flex flex-1">
    <aside th:insert="~{fragments/admin-menu :: menu}" class="hidden md:block"></aside>

    <main class="flex-1 p-6 md:p-10 flex items-center justify-center">
        <div class="w-full max-w-2xl p-8 sm:p-10 rounded-xl shadow-2xl" style="background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(71, 85, 105, 0.3);">
            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-16 h-16 rounded-full mb-4" style="background: linear-gradient(135deg, #6366f1, #818cf8);">
                    <i class="fas fa-key text-2xl text-white"></i>
                </div>
                <h2 class="text-3xl font-bold text-gradient" th:text="${permission.id != null} ? #{admin.permissions.detail.edit.title} : #{admin.permissions.detail.create.title}">Permission Details</h2>
            </div>

            <form th:action="${permission.id != null ? '/admin/permissions/' + permission.id + '/edit' : '/admin/permissions'}" method="post" th:object="${permission}" class="space-y-6">
                <input type="hidden" th:field="*{id}" th:if="${permission.id != null}" />

                <!-- Basic Information Section -->
                <div class="space-y-4">
                    <h3 class="text-lg font-semibold flex items-center gap-2" style="color: #e2e8f0;">
                        <i class="fas fa-info-circle" style="color: #818cf8;"></i>
                        <span th:text="#{admin.permissions.detail.basic.info}">Basic Information</span>
                    </h3>

                    <!-- Permission Name -->
                    <div>
                        <label for="name" class="block text-sm font-medium mb-2" style="color: #cbd5e1;">
                            <i class="fas fa-tag mr-1" style="color: #94a3b8;"></i> <span th:text="#{admin.permissions.detail.name}">Permission Name (unique, uppercase)</span>
                        </label>
                        <input type="text" id="name" th:field="*{name}"
                               class="detail-input font-mono"
                               placeholder="READ_USERS" required />
                    </div>

                    <!-- Friendly Name -->
                    <div>
                        <label for="friendlyName" class="block text-sm font-medium mb-2" style="color: #cbd5e1;">
                            <i class="fas fa-smile mr-1" style="color: #94a3b8;"></i> <span th:text="#{admin.permissions.detail.friendly.name}">Friendly Name</span>
                        </label>
                        <input type="text" id="friendlyName" th:field="*{friendlyName}"
                               class="detail-input"
                               th:placeholder="#{admin.permissions.detail.friendly.name.placeholder}" placeholder="Read Users" />
                    </div>

                    <!-- Description -->
                    <div>
                        <label for="description" class="block text-sm font-medium mb-2" style="color: #cbd5e1;">
                            <i class="fas fa-align-left mr-1" style="color: #94a3b8;"></i> <span th:text="#{admin.permissions.detail.description}">Description</span>
                        </label>
                        <input type="text" id="description" th:field="*{description}"
                               class="detail-input"
                               th:placeholder="#{admin.permissions.detail.description.placeholder}" placeholder="Enter permission description" />
                    </div>
                </div>

                <!-- Access Control Section -->
                <div class="pt-6 border-t" style="border-color: rgba(71, 85, 105, 0.3);">
                    <h3 class="text-lg font-semibold flex items-center gap-2 mb-4" style="color: #e2e8f0;">
                        <i class="fas fa-crosshairs" style="color: #818cf8;"></i>
                        <span th:text="#{admin.permissions.detail.access.control}">Access Control</span>
                    </h3>

                    <div class="grid grid-cols-2 gap-4">
                        <!-- Target Type -->
                        <div>
                            <label for="targetType" class="block text-sm font-medium mb-2" style="color: #cbd5e1;">
                                <i class="fas fa-bullseye mr-1" style="color: #94a3b8;"></i> <span th:text="#{admin.permissions.detail.target.type}">Target Type</span>
                            </label>
                            <select id="targetType" th:field="*{targetType}" class="detail-input">
                                <option value="">-- Select --</option>
                                <option value="URL">URL</option>
                                <option value="METHOD">METHOD</option>
                            </select>
                        </div>

                        <!-- Action Type -->
                        <div>
                            <label for="actionType" class="block text-sm font-medium mb-2" style="color: #cbd5e1;">
                                <i class="fas fa-bolt mr-1" style="color: #94a3b8;"></i> <span th:text="#{admin.permissions.detail.action.type}">Action Type</span>
                            </label>
                            <select id="actionType" th:field="*{actionType}" class="detail-input">
                                <option value="">-- Select --</option>
                                <option value="READ">READ</option>
                                <option value="WRITE">WRITE</option>
                                <option value="EXECUTE">EXECUTE</option>
                                <option value="DELETE">DELETE</option>
                                <option value="ALL">ALL</option>
                            </select>
                        </div>
                    </div>
                </div>

                <!-- Managed Resource Section (edit mode, if linked) -->
                <div th:if="${permission.id != null and permission.managedResourceId != null}" class="pt-6 border-t" style="border-color: rgba(71, 85, 105, 0.3);">
                    <h3 class="text-lg font-semibold flex items-center gap-2 mb-4" style="color: #e2e8f0;">
                        <i class="fas fa-link" style="color: #818cf8;"></i>
                        <span th:text="#{admin.permissions.detail.linked.resource}">Linked Resource</span>
                    </h3>
                    <div class="p-4 rounded-lg" style="background: rgba(30, 41, 59, 0.4); border: 1px solid rgba(71, 85, 105, 0.3);">
                        <p class="text-sm font-mono" style="color: #94a3b8; word-break: break-all; overflow-wrap: break-word;" th:text="${permission.managedResourceIdentifier}"></p>
                        <a th:href="@{/admin/policy-center(tab='resources',keyword=${permission.managedResourceIdentifier})}" class="text-xs hover:underline mt-2 inline-block" style="color: #818cf8;">
                            <i class="fas fa-external-link-alt mr-1"></i> <span th:text="#{admin.permissions.detail.view.policy.center}">View in Policy Center</span>
                        </a>
                    </div>
                </div>

                <!-- Submit Button -->
                <div class="pt-4">
                    <button type="submit"
                            class="w-full flex justify-center items-center py-3 px-4 border border-transparent rounded-lg shadow-sm text-sm font-medium text-white focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-app-accent transition-all duration-150 ease-in-out transform hover:scale-105"
                            style="background: linear-gradient(135deg, #6366f1, #4f46e5); box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);">
                        <i class="fas fa-check mr-2"></i>
                        <span th:text="${permission.id != null} ? #{admin.permissions.detail.save} : #{admin.permissions.detail.register}">Save</span>
                    </button>
                </div>
            </form>

            <!-- Back Link -->
            <div class="mt-6 text-center">
                <a th:href="@{/admin/permissions}" class="inline-flex items-center text-sm font-medium hover:underline transition-all duration-200" style="color: #818cf8;">
                    <i class="fas fa-arrow-left mr-2"></i>
                    <span th:text="#{admin.permissions.detail.back}">Back to Permission List</span>
                </a>
            </div>
        </div>
    </main>
</div>

<div th:insert="~{fragments/footer :: footer}" class="mt-auto"></div>

<style>
    .text-gradient {
        background: linear-gradient(135deg, #6366f1, #818cf8);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
    }

    .detail-input {
        display: block;
        width: 100%;
        padding: 0.625rem 1rem;
        border-radius: 0.5rem;
        box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
        font-size: 0.875rem;
        line-height: 1.25rem;
        transition: all 0.3s;
        background: rgba(30, 41, 59, 0.6);
        border: 2px solid rgba(71, 85, 105, 0.5);
        color: #e2e8f0;
    }

    .detail-input:focus {
        outline: none;
        border-color: #6366f1;
        box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
    }

    .detail-input:disabled,
    .detail-input[readonly] {
        opacity: 0.6;
        cursor: not-allowed;
        background: rgba(15, 23, 42, 0.4);
    }
</style>

<script th:inline="javascript">
    /*<![CDATA[*/
    function showToast(message, type) {
        var toastContainer = document.getElementById('toast-container');
        if (!toastContainer) return;
        var toast = document.createElement('div');
        toast.className = 'toast-message toast-' + type;
        toast.textContent = message;
        toastContainer.appendChild(toast);
        setTimeout(function() {
            toast.classList.add('fade-out');
            setTimeout(function() {
                if (toast.parentNode) toast.parentNode.removeChild(toast);
            }, 500);
        }, 3000);
    }

    document.addEventListener('DOMContentLoaded', function() {
        if (typeof initAuth === 'function') {
            initAuth();
        }
        var message = /*[[${message}]]*/ null;
        if (message) {
            showToast(message, 'success');
        }
        var errorMessage = /*[[${errorMessage}]]*/ null;
        if (errorMessage) {
            showToast(errorMessage, 'error');
        }
    });
    /*]]>*/
</script>
</body>
</html>
