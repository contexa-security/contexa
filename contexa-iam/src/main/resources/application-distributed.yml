# 🌐 분산환경 Vector Store 및 Redis 최적화 설정
# application-distributed.yml

spring:
  ai:
    vectorstore:
      distributed:
        enabled: true
        cache-enabled: true
        read-replicas:
          - "jdbc:postgresql://pg-replica-1:5432/identity"
          - "jdbc:postgresql://pg-replica-2:5432/identity"
        connection-pool:
          max-pool-size: 20
          min-pool-size: 5
          
  # 분산환경용 PostgreSQL 클러스터 설정
  datasource:
    # Primary DB (Write)
    primary:
      url: jdbc:postgresql://pg-primary:5432/identity
      username: ${DB_USERNAME:admin}
      password: ${DB_PASSWORD:1111}
      hikari:
        maximum-pool-size: 20
        minimum-idle: 5
        connection-timeout: 30000
        idle-timeout: 600000
        max-lifetime: 1800000
        
    # Read Replica (Read)
    replica:
      url: jdbc:postgresql://pg-replica:5432/identity
      username: ${DB_USERNAME:admin}
      password: ${DB_PASSWORD:1111}
      hikari:
        maximum-pool-size: 15
        minimum-idle: 3
        connection-timeout: 30000
        
  # Redis Cluster 설정
  data:
    redis:
      cluster:
        nodes:
          - redis-node-1:6379
          - redis-node-2:6379
          - redis-node-3:6379
          - redis-node-4:6379
          - redis-node-5:6379
          - redis-node-6:6379
        max-redirects: 3
      password: ${REDIS_PASSWORD:}
      timeout: 5000ms
      jedis:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5
          max-wait: 2000ms

# 애플리케이션 노드 설정
app:
  node:
    id: ${NODE_ID:node-1}
    region: ${NODE_REGION:us-east-1}
    zone: ${NODE_ZONE:us-east-1a}
    
# 로드밸런서 설정
load-balancer:
  vector:
    read-strategy: ROUND_ROBIN # ROUND_ROBIN, LEAST_CONNECTIONS, WEIGHTED
    health-check:
      enabled: true
      interval: 30s
      timeout: 5s

# 모니터링 및 메트릭
management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus,vector-metrics
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      node: ${app.node.id}
      region: ${app.node.region}

# 로깅 설정
logging:
  level:
    io.spring.iam.config.DistributedVectorStoreService: DEBUG
    io.spring.iam.config.DistributedVectorStoreConfig: DEBUG
    org.springframework.ai.vectorstore: INFO
    org.springframework.data.redis: INFO
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level [%X{nodeId}] %logger{36} - %msg%n"
    
# Vector Store 최적화 설정
vector:
  optimization:
    batch-size: 1000
    parallel-processing: true
    cache:
      ttl: 30m
      max-entries: 10000
    indexing:
      strategy: ASYNC # SYNC, ASYNC
      buffer-size: 5000 