# 🏠 로컬 개발 환경 설정
# application-local.yml

spring:
  ai:
    vectorstore:
      distributed:
        enabled: false  # 로컬에서는 분산 비활성화

  # 로컬 PostgreSQL 설정
  datasource:
    url: jdbc:postgresql://localhost:5432/identity
    username: admin
    password: 1111
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  # 로컬 Redis 설정 (단일 노드)
  data:
    redis:
      host: localhost
      port: 6379
      password: ""
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: 2000ms
      # 클러스터 설정 비활성화
      cluster:
        enabled: false

# 애플리케이션 노드 설정
app:
  node:
    id: local-dev
    region: local
    zone: local

# 로드밸런서 설정 (로컬에서는 비활성화)
load-balancer:
  vector:
    read-strategy: SINGLE  # 단일 노드
    health-check:
      enabled: false

# 모니터링 및 메트릭
management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus,beans,conditions
  observations:
    enabled: true  # ⭐ Observation 활성화 (VectorStore 메트릭 수집)
  metrics:
    export:
      prometheus:
        enabled: true  # ⭐ Prometheus 활성화 (메트릭 export)

# 로깅 설정
logging:
  level:
    io.contexa.contexaiam.config.DistributedVectorStoreService: INFO
    io.contexa.contexaiam.config.DistributedVectorStoreConfig: INFO
    org.springframework.ai.vectorstore: INFO
    org.springframework.data.redis: INFO

# Vector Store 최적화 설정 (로컬용)
vector:
  optimization:
    batch-size: 100
    parallel-processing: false
    cache:
      ttl: 10m
      max-entries: 1000
    indexing:
      strategy: SYNC
      buffer-size: 500